    const totalDur=phrase.reduce((s,[,d])=>s+d*overlap,0)+phrase[phrase.length-1][1]*(1-overlap);
    const silence=8+Math.random()*10;
    _musicIv.push(setTimeout(()=>{ if(!_musicMuted) playMelPhrase(); }, (totalDur+silence)*1000));
  }
  _musicIv.push(setTimeout(playMelPhrase, 6000));
}
function toggleMusic(){
  _musicMuted=!_musicMuted;
  if(_musicMaster){
    const v=_musicMuted?0:1.0;
    _musicMaster.gain.setTargetAtTime(v,_ac.currentTime,1.5);
  }
}

let _gameStarted=false;
{
  const hiEl=document.getElementById('menu-hi-val');
  if(hiEl) hiEl.textContent=String(_highScore).padStart(6,'0');
  function startGame(){
    const inp=document.getElementById('menu-name');
    const n=(inp?inp.value.trim().toUpperCase():'');
    ship.name=n||'ACE';
    const menu=document.getElementById('start-menu');
    if(menu){ menu.style.opacity='0'; menu.style.transition='opacity 0.4s'; setTimeout(()=>menu.remove(),420); }
    _gameStarted=true;
    startBGMusic();
  }
  const btn=document.getElementById('menu-start');
  if(btn) btn.addEventListener('click', startGame);
  const inp=document.getElementById('menu-name');
  if(inp) inp.addEventListener('keydown', e=>{ if(e.key==='Enter') startGame(); inp.value=inp.value.toUpperCase(); });
}

function loop(){
  if(_gameStarted){
    if(_mpConnected){
      // Host : injecter touches locales dans la map → updateNetPlayer les applique
      if(_mpIsHost&&_mpMyShip&&_mpMySlot!==null){
        _mpNetKeys.set(_mpMyTeam+'_'+_mpMySlot,
          {left:!!keys.left,right:!!keys.right,fire:!!keys.fire});
      }
      if(_mpIsHost){
        update(); // host tourne la simulation complète
        mpSendState();
      } else {
        // Non-host : appliquer l'état reçu du host
        _gameTick++;  // avancer le compteur même sans update() pour les animations
        if(_mpPending){ mpApplyState(_mpPending); _mpPending=null; }
        // Nettoyage minimal non-hôte : bullets + particles + bannières expirent correctement
        for(let _bi=bullets.length-1;_bi>=0;_bi--){ bullets[_bi].x+=bullets[_bi].vx; bullets[_bi].y+=bullets[_bi].vy; if(--bullets[_bi].life<=0) bullets.splice(_bi,1); }
        for(let _pi=particles.length-1;_pi>=0;_pi--){ if(--particles[_pi].life<=0) particles.splice(_pi,1); }
        if(_rallyNotif){_rallyNotif.life--;if(_rallyNotif.life<=0)_rallyNotif=null;}
        // Dead reckoning : avancer tous les vaisseaux avec leur vitesse pour lisser entre syncs
        for(const _s of blues){
          if(_s.dead) continue;
          if(_s!==_mpMyShip){ _s.x+=_s.vx; _s.y+=_s.vy; if(_s.angVel){_s.angle+=_s.angVel;_s.angVel*=0.88;} }
          if(_s.hit>0) _s.hit--;
          if(_s!==_mpMyShip&&_s.immuneTimer>0) _s.immuneTimer--;
        }
        for(const _s of reds){
          if(_s.dead) continue;
          if(_s!==_mpMyShip){ _s.x+=_s.vx; _s.y+=_s.vy; if(_s.angVel){_s.angle+=_s.angVel;_s.angVel*=0.88;} }
          if(_s.hit>0) _s.hit--;
          if(_s!==_mpMyShip&&_s.immuneTimer>0) _s.immuneTimer--;
        }
        // Rotation locale des tourelles (tracking visuel sans tir — corrigé par l'état hôte)
        for(const sp of spawns){
          if(sp.team==='neutral') continue;
          const _tfoes=sp.team==='blue'?[...reds]:[...blues];
          for(const tr of sp.turrets){
            if(tr.hp<=0) continue;
            const _ttx=sp.x+Math.cos(tr.offsetAngle)*(tr.offsetRadius||0);
            const _tty=sp.y+Math.sin(tr.offsetAngle)*(tr.offsetRadius||0);
            let _tn=null,_tnd=680;
            for(const f of _tfoes){ if(f.dead) continue; const _td=Math.hypot(f.x-_ttx,f.y-_tty); if(_td<_tnd){_tnd=_td;_tn=f;} }
            if(_tn){ let _tda=Math.atan2(_tn.y-_tty,_tn.x-_ttx)-tr.angle; while(_tda>Math.PI)_tda-=Math.PI*2; while(_tda<-Math.PI)_tda+=Math.PI*2; tr.angle+=Math.sign(_tda)*Math.min(Math.abs(_tda),0.055); }
          }
        }
        // Prédiction locale du propre vaisseau (tir + physique côté client)
        try{
        if(_mpMyShip&&!_mpMyShip.dead&&_mpMySlot!==null){
          const _bBefore=bullets.length;
          updateNetPlayer(_mpMyShip,{left:!!keys.left,right:!!keys.right},false); // tir activé côté CLIENT
          // Balles nouvelles créées par le CLIENT → relayées à l'hôte + conservées localement
          const _newBuls=bullets.slice(_bBefore);
          _mpClientNewBullets=_newBuls.map(b=>{
            let _tt=-1,_ti=-1;
            if(b.target&&!b.target.dead){
              const _ta=b.target.team==='blue'?blues:reds;
              _ti=_ta.indexOf(b.target);
              _tt=b.target.team==='blue'?0:1;
            }
            return [Math.round(b.x),Math.round(b.y),+b.vx.toFixed(2),+b.vy.toFixed(2),_tt,_ti];
          });
          // Mémoriser les nouvelles balles locales (affichées sans latence)
          for(const _lb of _newBuls) _mpLocalBullets.push({x:_lb.x,y:_lb.y,vx:_lb.vx,vy:_lb.vy,team:_lb.team,life:_lb.life||80,_maxLife:_lb._maxLife||_lb.life||80,zeroDmg:!!_lb.zeroDmg,cosmetic:!!_lb.cosmetic,target:_lb.target||null});
          applyGravity(_mpMyShip,false);
          wallBounce(_mpMyShip);
        } else if(_mpMyShip&&_mpMyShip.dead){
          // Attendre le respawn décidé par l'HOST (pas d'auto-respawn côté CLIENT)
          _mpClientNewBullets=[];
        } else { _mpClientNewBullets=[]; }
        }catch(_ce){ console.error('[MP] Erreur client loop:',_ce); if(_mpConnected) mpLog(`❌ ${_ce.message||_ce}`); _mpClientNewBullets=[]; }
        mpSendInput();
      }
    } else {
      update(); // solo
    }
  }
  // ── Sync ship → _mpMyShip pour que radar/son/formation utilisent le bon vaisseau ──
  if(_mpConnected&&_mpMyShip){
    const _ms=_mpMyShip;
    ship.dead=_ms.dead; ship.team=_ms.team;
    ship.x=_ms.x; ship.y=_ms.y; ship.vx=_ms.vx; ship.vy=_ms.vy;
    ship.hp=_ms.hp; ship.maxHp=_ms.maxHp||ship.maxHp;
    ship.angle=_ms.angle; ship.angVel=_ms.angVel||0;
    ship.immuneTimer=_ms.immuneTimer||0; ship.hit=_ms.hit||0;
    ship.shield=_ms.shield||0; ship.shieldHit=_ms.shieldHit||0;
    ship.shipType=_ms.shipType||1; ship.radius=_ms.radius||SHIP_RADIUS;
  }
  updateCamera();
  updateEngineSound();
  updateDoppler();
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#07071a'; ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  ctx.translate(W/2, H/2);
  ctx.scale(ZOOM_WORLD, ZOOM_WORLD);
  ctx.translate(-W/2, -H/2);
  drawGrid(); drawBounds(); drawStars(); drawNebulae(); drawPlanet();
  drawEMP(); drawSpawns(); drawBeacon();
  drawAsteroids(); drawPickups(); drawWreckLoot();
  drawParticles(); drawBullets(); drawLasers(); drawMeteors();
  drawAIFleet(blues,'#0d2060','#4080f0','#4aadff','80,150,255');
  drawAIFleet(reds, '#601010','#e04040','#ff6050','255,80,60');

  drawFormationLinks(); drawPlayerShip(); drawRadarArrows(); drawMPNames(); drawMPRoster();
  if(_rallyMarkers.length>0&&!ship.dead){
    const cx2=canvas.width/2, cy2=canvas.height/2;
    const _myTeam=_mpConnected?_mpMyTeam:(ship.team||'blue');
    for(const _rm of _rallyMarkers){
      if(_rm.t3.dead) continue;
      // Attaque si la cible est dans l'équipe ennemie, défense sinon
      const _isAttack=(_rm.t3.team!==_myTeam);
      const _rfade=(_rm.life/_rm.maxLife);
      const _pulse=0.55+0.45*Math.sin(_gameTick*0.12);
      const _tx=_rm.t3.x-_camX+cx2, _ty=_rm.t3.y-_camY+cy2;
      ctx.save();
      ctx.setLineDash([10,8]);
      ctx.strokeStyle=_isAttack
        ?`rgba(255,220,40,${_rfade*_pulse*0.85})`
        :`rgba(255,100,80,${_rfade*_pulse*0.85})`;
      ctx.lineWidth=1.5;
      ctx.shadowColor=_isAttack?'#ffdd00':'#ff4422';
      ctx.shadowBlur=6;
      ctx.beginPath(); ctx.moveTo(cx2,cy2); ctx.lineTo(_tx,_ty); ctx.stroke();
      ctx.setLineDash([]);
      const _sz=8+_pulse*5;
      ctx.strokeStyle=_isAttack?`rgba(255,220,40,${_rfade*0.9})`:`rgba(255,100,80,${_rfade*0.9})`;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(_tx,_ty-_sz); ctx.lineTo(_tx+_sz,_ty);
      ctx.lineTo(_tx,_ty+_sz); ctx.lineTo(_tx-_sz,_ty);
      ctx.closePath(); ctx.stroke();
      ctx.restore();
    }
  }
  ctx.restore();
  {const nebInside=NEBULAE.find(n=>Math.hypot(_camX-n.x,_camY-n.y)<n.r);
  if(nebInside){ctx.fillStyle=`rgba(${nebInside.c[0]},${nebInside.c[1]},${nebInside.c[2]},0.13)`;ctx.fillRect(0,0,canvas.width,canvas.height);}}
  drawHUD();
  if(_deathFxTimer>0){
    const t=_deathFxTimer/75;
    ctx.fillStyle=`rgba(180,0,0,${t*t*0.55})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const W=canvas.width,H=canvas.height;
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,H*0.85);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(0,0,0,${t*0.7})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }
  if(gameOver) drawGameOver();
  _tickGameOverCountdown();
  _tickMPReconnect();
  if(_mpDisconnected) _drawDisconnectOverlay();
  requestAnimationFrame(loop);
}
loop();

// Compte a rebours fin de partie - relance automatique
function _tickGameOverCountdown(){
  if(!gameOver||!_gameStarted) return;
  _goCountdown++;
  if(_goCountdown>=1200){ // 20 secondes
    if(_mpConnected&&_mpIsHost&&_mpWs&&_mpWs.readyState===1){
      _mpWs.send(JSON.stringify({type:'restart'}));
    }
    setTimeout(()=>location.reload(),200);
  }
}

// Reconnexion automatique apres perte de connexion
function _tickMPReconnect(){
  if(!_mpDisconnected||!_mpSavedParams) return;
  if(_mpReconnectAttempts>=3){
    _mpDisconnected=false;
    mpStatus('Reconnexion impossible');
    setTimeout(()=>location.reload(),1500);
    return;
  }
  _mpReconnectTimer--;
  if(_mpReconnectTimer<=0){
    _mpReconnectAttempts++;
    _mpReconnectTimer=_mpReconnectAttempts*180;
    mpStatus('Reconnexion tentative '+_mpReconnectAttempts+'/3...');
    try{
      const _rWs=new WebSocket(_mpSavedParams.url);
      _mpWs=_rWs;
      _rWs.onopen=()=>{
        _mpConnected=true; _mpDisconnected=false; _mpReconnectAttempts=0;
        _mpSavedParams.reconnected=true;
        mpStatus('Connecté — reconnexion équipe '+_mpSavedParams.team+'...');
        _rWs.send(JSON.stringify({type:'join',team:_mpSavedParams.team,name:_mpSavedParams.name}));
      };
      _rWs.onmessage=e=>{ let m; try{m=JSON.parse(e.data);}catch{return;} mpHandleMsg(m); };
      _rWs.onclose=()=>{
        _mpConnected=false;
        if(_gameStarted&&_mpSavedParams&&!_mpDisconnected){
          _mpDisconnected=true; _mpReconnectTimer=180;
        }
      };
      _rWs.onerror=()=>{ mpStatus('Erreur reconnexion'); };
    }catch(e){ mpStatus('Erreur reconnexion'); }
  }
}

function _drawDisconnectOverlay(){
  if(!_mpDisconnected) return;
  const W=canvas.width, H=canvas.height;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.72)';
  ctx.fillRect(0,0,W,H);
  const cx=W/2, cy=H/2;
  ctx.strokeStyle='rgba(255,80,80,0.85)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.roundRect(cx-220,cy-90,440,180,12);
  ctx.stroke();
  ctx.fillStyle='rgba(20,0,0,0.7)';
  ctx.fill();
  ctx.font='bold 26px monospace';
  ctx.textAlign='center';
  ctx.shadowColor='#ff2222'; ctx.shadowBlur=18;
  ctx.fillStyle='rgba(255,100,80,0.95)';
  ctx.fillText('⚠ CONNEXION PERDUE', cx, cy-36);
  ctx.shadowBlur=0;
  ctx.font='15px monospace';
  ctx.fillStyle='rgba(200,180,180,0.9)';
  const _sec=Math.max(0,Math.ceil(_mpReconnectTimer/60));
  if(_mpReconnectAttempts>=3){
    ctx.fillText('Reconnexion impossible.', cx, cy+2);
    ctx.fillText('Rechargement...', cx, cy+24);
  } else {
    ctx.fillText('Tentative '+(_mpReconnectAttempts+1)+'/3 dans '+_sec+'s...', cx, cy+2);
    ctx.font='13px monospace';
    ctx.fillStyle='rgba(160,140,140,0.7)';
    ctx.fillText('La partie est en pause.', cx, cy+26);
  }
  ctx.restore();
}

// Migration d'host : resign quand onglet cache
let _bgLoopIv=null;
function _mpClientBgTick(){
  if(!_mpConnected||_mpIsHost||!_gameStarted){clearInterval(_bgLoopIv);_bgLoopIv=null;return;}
  _gameTick++;
  if(_mpPending){try{mpApplyState(_mpPending);}catch(_e){}; _mpPending=null;}
  try{
    if(_mpMyShip&&!_mpMyShip.dead&&_mpMySlot!==null){
      updateNetPlayer(_mpMyShip,{left:!!keys.left,right:!!keys.right},false);
      applyGravity(_mpMyShip,false);
      wallBounce(_mpMyShip);
    }
  }catch(_e){}
  mpSendInput();
}
document.addEventListener('visibilitychange',()=>{
  if(!_mpConnected||!_mpWs||_mpWs.readyState!==1) return;
  if(document.hidden){
    if(_mpIsHost){
      _mpWs.send(JSON.stringify({type:'resign_host'}));
      mpLog("Onglet caché - transfert hôte en cours...");
    } else if(_gameStarted&&!_bgLoopIv){
      // Onglet client en arrière-plan : setInterval pour continuer la physique
      _bgLoopIv=setInterval(_mpClientBgTick,1000/60);
    }
  } else {
    // Retour au premier plan : rAF reprend, on arrête le setInterval
    if(_bgLoopIv){clearInterval(_bgLoopIv);_bgLoopIv=null;}
  }
});

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
// Bloquer zoom navigateur ctrl+molette
window.addEventListener('wheel',e=>{if(e.ctrlKey)e.preventDefault();},{passive:false});
window.addEventListener('keydown',e=>{if(e.ctrlKey&&(e.key==='+'||e.key==='-'||e.key==='='||e.key==='0'))e.preventDefault();},{passive:false});
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', ()=>{
  setTimeout(resizeCanvas, 200);
});
