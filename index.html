<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vaisseau Spatial</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; user-select:none; }
  canvas { display:block; cursor:crosshair; touch-action:none; }
  #portrait-warn {
    display:none; position:fixed; inset:0; background:#000;
    color:#4aadff; font:bold 18px monospace;
    flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:999; text-align:center; padding:24px;
  }
  #portrait-warn span { font-size:64px; animation:spin 1.8s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* ── Menu de démarrage ────────────────────────────────────────────── */
  #start-menu {
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
    background:rgba(2,4,18,0.93);
    font-family:monospace;
  }
  #start-menu::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0.13) 0px,rgba(0,0,0,0.13) 1px,transparent 1px,transparent 3px);
    z-index:1;
  }
  .smenu {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center; gap:18px;
    padding:44px 56px; border-radius:10px;
    border:1px solid rgba(80,180,255,0.18);
    background:rgba(4,10,40,0.82);
    box-shadow:0 0 60px rgba(40,120,255,0.12), inset 0 0 40px rgba(10,20,80,0.4);
    min-width:320px;
  }
  .smenu-title {
    font-size:clamp(28px,5vw,52px); font-weight:900; letter-spacing:0.18em;
    color:#ffe060; text-shadow:0 0 18px #ffaa00, 0 0 40px #ff8800;
    animation:titlepulse 2.4s ease-in-out infinite;
  }
  @keyframes titlepulse {
    0%,100%{text-shadow:0 0 18px #ffaa00,0 0 40px #ff8800;}
    50%{text-shadow:0 0 30px #ffcc00,0 0 70px #ffaa00,0 0 100px #ff6600;}
  }
  .smenu-sub {
    font-size:11px; letter-spacing:0.35em; color:rgba(100,160,255,0.6);
    text-transform:uppercase; margin-top:-12px;
  }
  .smenu-hi {
    font-size:12px; color:rgba(180,160,255,0.55); letter-spacing:0.1em;
  }
  .smenu-hi span { color:rgba(210,190,255,0.85); }
  .smenu-sep {
    width:100%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(80,160,255,0.25),transparent);
  }
  .smenu-label {
    font-size:10px; letter-spacing:0.3em; color:rgba(80,160,255,0.6);
    text-transform:uppercase; align-self:flex-start;
  }
  #menu-name {
    width:100%; padding:10px 14px;
    background:rgba(0,10,40,0.8); border:1px solid rgba(80,160,255,0.35);
    border-radius:5px; color:#4adfff; font:bold 22px monospace;
    text-align:center; letter-spacing:0.2em; text-transform:uppercase;
    outline:none; caret-color:#4adfff;
    transition:border-color .2s, box-shadow .2s;
  }
  #menu-name:focus {
    border-color:rgba(80,200,255,0.7);
    box-shadow:0 0 12px rgba(60,160,255,0.3);
  }
  #menu-start {
    margin-top:4px; padding:12px 36px;
    background:linear-gradient(135deg,rgba(20,60,180,0.9),rgba(10,30,100,0.9));
    border:1px solid rgba(80,160,255,0.45); border-radius:6px;
    color:#4adfff; font:bold 15px monospace; letter-spacing:0.15em;
    cursor:pointer; text-transform:uppercase;
    transition:all .15s; box-shadow:0 0 16px rgba(40,120,255,0.2);
  }
  #menu-start:hover {
    background:linear-gradient(135deg,rgba(40,100,255,0.9),rgba(20,60,180,0.9));
    box-shadow:0 0 28px rgba(60,160,255,0.45);
    color:#fff;
  }
  #menu-start:active { transform:scale(0.97); }
  .smenu-controls {
    font-size:9px; letter-spacing:0.2em; color:rgba(80,100,160,0.55);
    text-transform:uppercase; text-align:center; line-height:1.8;
  }
  .smenu-blink { animation:blink 1.1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Multijoueur ── */
  #mp-panel { display:none; flex-direction:column; align-items:center; gap:10px; width:100%; }
  .mp-teams { display:flex; gap:12px; }
  .mp-btn-blue {
    padding:10px 22px; background:linear-gradient(135deg,rgba(20,60,200,0.9),rgba(10,30,100,0.9));
    border:1px solid rgba(80,160,255,0.5); border-radius:6px;
    color:#4adfff; font:bold 13px monospace; letter-spacing:0.12em; cursor:pointer;
    transition:all .15s;
  }
  .mp-btn-blue:hover { background:linear-gradient(135deg,rgba(40,100,255,0.9),rgba(20,60,180,0.9)); color:#fff; }
  .mp-btn-red {
    padding:10px 22px; background:linear-gradient(135deg,rgba(160,20,20,0.9),rgba(80,10,10,0.9));
    border:1px solid rgba(255,80,80,0.5); border-radius:6px;
    color:#ff8080; font:bold 13px monospace; letter-spacing:0.12em; cursor:pointer;
    transition:all .15s;
  }
  .mp-btn-red:hover { background:linear-gradient(135deg,rgba(220,40,40,0.9),rgba(140,20,20,0.9)); color:#fff; }
  #mp-status-txt { font-size:11px; color:rgba(80,160,120,0.8); letter-spacing:0.1em; min-height:16px; }
  #mp-toggle {
    padding:8px 22px; background:transparent;
    border:1px solid rgba(80,200,120,0.35); border-radius:5px;
    color:rgba(80,200,140,0.7); font:13px monospace; letter-spacing:0.12em; cursor:pointer;
    transition:all .15s;
  }
  #mp-toggle:hover { border-color:rgba(80,220,140,0.7); color:#8affcc; }
</style>
</head>
<body>
<div id="portrait-warn"><span>↻</span><p>Tournez votre appareil<br>en mode paysage</p></div>
<div id="start-menu">
  <div class="smenu">
    <div class="smenu-title">PEW PEW PEW</div>
    <div class="smenu-sub">Space Combat Simulator</div>
    <div class="smenu-hi">HI-SCORE &nbsp;<span id="menu-hi-val">000000</span></div>
    <div class="smenu-sep"></div>
    <div class="smenu-label">Nom du vaisseau</div>
    <input id="menu-name" type="text" maxlength="10" value="ACE" spellcheck="false" autocomplete="off">
    <button id="menu-start">▶ &nbsp;Jouer en solo</button>
    <div class="smenu-sep"></div>
    <button id="mp-toggle" onclick="mpTogglePanel()">🌐 &nbsp;Mode Multijoueur</button>
    <div id="mp-panel">
      <div style="margin:0 0 7px;display:flex;gap:5px;align-items:center">
        <span style="font:9px monospace;color:#5a8fc8;white-space:nowrap">SERVEUR</span>
        <input id="mp-url" type="text" value="wss://pew-pew-pew-online-production.up.railway.app"
          style="flex:1;background:rgba(5,15,50,0.8);border:1px solid #2a4a8a;border-radius:4px;
          color:#9ac8ff;font:10px monospace;padding:4px 6px;outline:none"
          spellcheck="false" autocomplete="off">
      </div>
      <div class="mp-teams">
        <button class="mp-btn-blue" onclick="mpJoin('blue')">▶ Équipe Bleue</button>
        <button class="mp-btn-red"  onclick="mpJoin('red')">▶ Équipe Rouge</button>
      </div>
      <div id="mp-status-txt">Entrez l'URL du serveur puis choisissez une équipe</div>
    </div>
    <div class="smenu-controls">
      Clic gauche ← rotation &nbsp;|&nbsp; clic droit → rotation<br>
      Les deux clics → propulsion directe
    </div>
    <div class="smenu-blink" style="font-size:10px;color:rgba(80,160,255,0.5);letter-spacing:0.3em;">— APPUYEZ SUR ENTRÉE —</div>
  </div>
</div>
<div id="fs-btn" style="display:none;position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(10,20,60,0.85);color:#4aadff;font:bold 14px monospace;border:1px solid #4aadff44;border-radius:8px;padding:8px 22px;pointer-events:auto;">⛶ Plein écran</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ── Audio (Web Audio API) ─────────────────────────────────────────────────
const _ac=(()=>{try{return new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}})();
// Buffer de bruit partagé pour les explosions (évite de recréer un ArrayBuffer à chaque son)
const _noiseBuffer=(()=>{
  if(!_ac) return null;
  const buf=_ac.createBuffer(1,Math.ceil(_ac.sampleRate*0.35),_ac.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  return buf;
})();

// ── Hitscan : balles cosmétiques + dégâts différés synchronisés ─────────
const _pendingHits=[];

function fireBulletHitscan(ai,vx,vy,speed,homing,zeroDmg){
  const tgt=ai.burstTarget&&!ai.burstTarget.dead?ai.burstTarget:null;
  // Durée de vol = distance / vitesse (ou BULLET_LIFE si pas de cible)
  const _dist=tgt?Math.hypot(tgt.x-ai.x,tgt.y-ai.y):FIRE_RANGE;
  const _fly=tgt?Math.max(4,Math.round(_dist/speed*(homing?1.25:1))):BULLET_LIFE;
  // Ajuster la vitesse du missile cosmétique pour qu'il arrive exactement au bon moment
  let _bvx=vx,_bvy=vy;
  if(tgt&&_fly>0){
    const _actualSpd=Math.hypot(vx,vy);
    if(_actualSpd>0){
      const _targetSpd=_dist/_fly;
      const _sAdj=_targetSpd/_actualSpd;
      _bvx=vx*_sAdj; _bvy=vy*_sAdj;
    }
  }
  // Missile cosmétique : même apparence, mais collision désactivée
  const _bLife=tgt?_fly+2:BULLET_LIFE; // +2 pour voir l'explosion avant disparition
  if(bullets.length<MAX_BULLETS){
    bullets.push({x:ai.x,y:ai.y,vx:_bvx,vy:_bvy,team:ai.team,
      life:_bLife,_maxLife:_bLife,
      target:tgt,shooter:ai,homing,zeroDmg:!!zeroDmg,cosmetic:true});
  }
  sfxShoot(ai.x,ai.y);
  // PendingHit : dégâts appliqués exactement quand le missile arrive
  if(tgt&&!zeroDmg){
    _pendingHits.push({target:tgt,shooter:ai,framesLeft:_fly,homing});
  }
}

function processPendingHits(){
  for(let _i=_pendingHits.length-1;_i>=0;_i--){
    const _ph=_pendingHits[_i];
    // Pour les guidés : recalculer la cible si elle a bougé de la trajectoire
    if(--_ph.framesLeft>0) continue;
    const _t=_ph.target;
    if(!_t||_t.dead){_pendingHits.splice(_i,1);continue;}
    // Appliquer les dégâts
    if(_t._hitImmune>0){_pendingHits.splice(_i,1);continue;}
    if(!takeHit(_t)){
      _t.hp--; _t.hit=10; _t._hitImmune=5;
      addSpark(_t.x,_t.y,_ph.shooter?.team||'blue');
      if(_t.hp<=0){
        _t.dead=true; _t.respawnTimer=RESPAWN_FRAMES;
        addExplosion(_t.x,_t.y,_t.team);
        if(!_t.isMercenary) teamLives[_t.team]--;
        dropPickup(_t.x,_t.y); playSound('explode',0.55,_t.x,_t.y);
        if(_mpConnected) mpLog(`DEATH ${_t.name} tué par ${_ph.shooter?.name||'?'}`);
        addLog([{text:_ph.shooter?.name||'?',col:teamCol(_ph.shooter?.team)},{text:' ✕ ',col:'#888'},{text:_t.name,col:teamCol(_t.team)}]);
      }
    } else {
      // Bouclier absorbé : effet visuel uniquement
      addSpark(_t.x,_t.y,_ph.shooter?.team||'blue');
    }
    _pendingHits.splice(_i,1);
  }
}

// ══════════════════════════════════════════════════════════════════
//  MULTIJOUEUR
// ══════════════════════════════════════════════════════════════════
let _mpWs=null, _mpConnected=false, _mpIsHost=false;
let _mpDisconnected=false; // true = connexion perdue en cours de partie
let _mpReconnectTimer=0, _mpReconnectAttempts=0;
let _mpSavedParams=null; // {url,team,name} pour reconnexion auto
let _mpMyPid=null, _mpMySlot=null, _mpMyTeam=null, _mpMyShip=null;
let _mpPlayers=new Map();       // pid → {team,slot,name}
let _mpNetKeys=new Map();       // 'blue_N' | 'red_N' → {left,right}
let _mpNetPos=new Map();        // 'blue_N' | 'red_N' → {x,y,vx,vy,angle} position autoritaire du client
let _mpDbgRx=0, _mpDbgTx=0;   // debug counters
let _mpLastClientT=0, _mpRTT=50, _mpLAG=2; // mesure latence
let _mpLogT0=Date.now();
function mpLog(){}
let _mpHostReportedX=null, _mpHostReportedY=null; // dernière position du client vue par l'host
let _mpLastSent=0;              // ts dernier state envoyé (host)
let _mpPending=null;
let _mpFirstState=true;  // snap complet sur le 1er état reçu
let _mpAstSnapTimer=0;   // resync forcée des astéroïdes toutes les ~5s            // dernier state reçu (non-host)
let _mpHostShipData=null;       // données du ship du host (pour les non-hosts)
let _mpHostShipObj=null;        // objet synthétique pour le rendu

function mpTogglePanel(){
  const p=document.getElementById('mp-panel');
  if(p) p.style.display=p.style.display==='flex'?'none':'flex';
}
function mpStatus(txt){ const el=document.getElementById('mp-status-txt'); if(el) el.textContent=txt; }

function mpJoin(team){
  const nameEl=document.getElementById('menu-name');
  const urlEl=document.getElementById('mp-url');
  const url=(urlEl?urlEl.value.trim():'')||'wss://pew-pew-pew-online-production.up.railway.app';
  const name=(nameEl?nameEl.value.trim():'JOUEUR')||'JOUEUR';
  mpStatus('Connexion à '+url+' …');
  try { _mpWs=new WebSocket(url); } catch(e){ mpStatus('URL invalide'); return; }
  _mpWs.onopen=()=>{ _mpConnected=true; _mpSavedParams={url,team,name}; _mpDisconnected=false; _mpReconnectAttempts=0; mpStatus('Connecté — rejoindre équipe '+team+'…'); _mpWs.send(JSON.stringify({type:'join',team,name})); };
  _mpWs.onmessage=e=>{ let m; try{m=JSON.parse(e.data);}catch{return;} mpHandleMsg(m); };
  _mpWs.onclose=()=>{
    _mpConnected=false;
    if(_gameStarted&&_mpSavedParams){
      // Connexion perdue en cours de partie : bloquer + reconnexion auto
      _mpDisconnected=true; _mpReconnectTimer=180; // 3s avant 1er essai
      mpStatus('Connexion perdue…');
    }
  };
  _mpWs.onerror=()=>{ mpStatus('Erreur de connexion — verifiez l URL'); };
}

function mpHandleMsg(msg){
  switch(msg.type){
    case 'assigned':{
      _mpMyPid=msg.pid; _mpMySlot=msg.slot; _mpMyTeam=msg.team; _mpIsHost=msg.isHost;
      mpLog(`✅ Assigné pid=${msg.pid} équipe=${msg.team} slot=${msg.slot} host=${msg.isHost}`);
      // Marquer tous les joueurs y compris soi-même
      for(const p of msg.players){ _mpPlayers.set(p.pid,p); mpMarkBot(p.team,p.slot,p.name,p.pid); }
      mpBegin(msg.name);
      break;
    }
    case 'player_joined':{
      _mpPlayers.set(msg.pid,msg);
      mpMarkBot(msg.team,msg.slot,msg.name,msg.pid);
      break;
    }
    case 'player_left':{
      _mpPlayers.delete(msg.pid);
      mpUnmarkBot(msg.team,msg.slot);
      break;
    }
    case 'promoted_host':{
      _mpIsHost=true;
      mpLog("⚡ Vous etes maintenant l'hote de la simulation");
      mpStatus("HOST — simulation active");
      break;
    }
    case 'demoted_client':{
      _mpIsHost=false;
      mpLog("Role d'hote transfere — vous etes maintenant client");
      mpStatus("CLIENT — en attente");
      break;
    }
    case 'restart':{
      setTimeout(()=>location.reload(),200);
      break;
    }
    case 'input':{
      _mpNetKeys.set(msg.team+'_'+msg.slot,msg.keys);
      if(msg.x!==undefined){
        // CLIENT envoie aussi son propre état (hp, dead) → modèle relay : HOST fait confiance
        _mpNetPos.set(msg.team+'_'+msg.slot,{x:msg.x,y:msg.y,vx:msg.vx||0,vy:msg.vy||0,
          angle:msg.angle||0,angVel:msg.angVel||0,_fresh:true,
          hp:msg.hp,dead:msg.dead,respawnTimer:msg.respawnTimer,
          immuneTimer:msg.immuneTimer,shield:msg.shield});
        _mpDbgRx=((_mpDbgRx||0)+1);
        if(msg.t) _mpLastClientT=msg.t;
      }
      // Balles tirées par le CLIENT ce frame → ajoutées à la simulation de l'hôte
      if(msg.bul&&msg.bul.length&&typeof bullets!=='undefined'){
        const _cfl=msg.team==='blue'?blues:reds;
        const _cai=_cfl[msg.slot];
        for(const _cb of msg.bul){
          if(bullets.length<(typeof MAX_BULLETS!=='undefined'?MAX_BULLETS:400)){
            let _cbtgt=null;
            if(_cb[4]>=0&&_cb[5]>=0){
              const _cba=_cb[4]===0?blues:reds;
              const _cbc=_cba[_cb[5]];
              if(_cbc&&!_cbc.dead) _cbtgt=_cbc;
            }
            // Missile cosmétique pour le CLIENT relay (hitscan)
            if(bullets.length<(typeof MAX_BULLETS!=='undefined'?MAX_BULLETS:400)){
              // Vie = distance/vitesse pour que la balle s'arrête exactement sur la cible
              const _cspd2=typeof BULLET_SPEED!=='undefined'?BULLET_SPEED:8;
              const _cbDist=_cbtgt?Math.hypot(_cbtgt.x-_cb[0],_cbtgt.y-_cb[1]):(typeof FIRE_RANGE!=='undefined'?FIRE_RANGE:400);
              const _cbL=_cbtgt?Math.max(4,Math.round(_cbDist/_cspd2)+2):80;
              bullets.push({x:_cb[0],y:_cb[1],vx:_cb[2],vy:_cb[3],
                team:msg.team,life:_cbL,_maxLife:_cbL,
                target:_cbtgt,shooter:_cai||null,homing:false,zeroDmg:false,
                _pSlot:msg.slot,cosmetic:true});
              sfxShoot(_cb[0],_cb[1]);
            }
            // PendingHit pour dégâts synchronisés
            if(_cbtgt&&_cai){
              const _cspd=typeof BULLET_SPEED!=='undefined'?BULLET_SPEED:8;
              const _cdist=Math.hypot(_cbtgt.x-_cb[0],_cbtgt.y-_cb[1]);
              const _cfly=Math.max(4,Math.round(_cdist/_cspd));
              _pendingHits.push({target:_cbtgt,shooter:_cai,framesLeft:_cfly,homing:false});
            }
          }
        }
      }
      break;
    }
    case 'state':{
      if(!_mpIsHost){
        // Mesure RTT : le HOST a echo notre timestamp
        if(msg._clientT){
          const _rtt=Date.now()-msg._clientT;
          _mpRTT=_mpRTT*0.85+_rtt*0.15; // lissage exponentiel
          // LAG = demi-RTT en frames (one-way latency / frame time)
          _mpLAG=Math.round(Math.max(1,Math.min(5,(_mpRTT/2)/(1000/60))));
        }
        _mpPending=msg;
      }
      break;
    }
    case 'error':{ mpStatus('Serveur: '+msg.msg); break; }
  }
}

function mpMarkBot(team,slot,name,pid){
  const fl=team==='blue'?blues:reds;
  if(slot<fl.length){
    fl[slot]._netPid=pid; fl[slot]._netSlot=slot; fl[slot]._netTeam=team; fl[slot].name=name;
    // Si ce slot a été tué par le mode test, le réanimer pour le joueur
    if(fl[slot].dead&&(fl[slot].respawnTimer||0)>=999999){
      fl[slot].dead=false; fl[slot].hp=fl[slot].maxHp;
      fl[slot].shield=fl[slot].maxShield??SHIELD_MAX;
      fl[slot].respawnTimer=0; fl[slot].immuneTimer=SPAWN_IMMUNE;
    }
  }
}
function mpUnmarkBot(team,slot){
  const fl=team==='blue'?blues:reds;
  if(slot<fl.length){
    delete fl[slot]._netPid; delete fl[slot]._netSlot; delete fl[slot]._netTeam;
    // Geler le slot : empêcher qu'il devienne un bot actif
    fl[slot].dead=true; fl[slot].respawnTimer=999999;
  }
}

function mpBegin(playerName){
  const fleet=_mpMyTeam==='blue'?blues:reds;
  _mpMyShip=fleet[_mpMySlot]||null;
  if(_mpMyShip) _mpMyShip.name=playerName;

  // Tout le monde (host compris) joue via un bot slot
  // Le ship traditionnel est désactivé
  ship.dead=true; ship.hp=0; _playerLives=0;

  // Mode MP : retirer astéroïdes et météores (solo uniquement) - les spawners restent actifs
  if(_mpConnected){ ASTEROIDS.length=0; meteors.length=0; meteorWarn=0; meteorNotif=0; }
  // IA normales actives en MP — bots non-joueurs conservés tels quels
  // Réinitialiser l'état de fin de partie
  gameOver=null;
  // Lancer la partie
  const menu=document.getElementById('start-menu');
  if(menu){ menu.style.opacity='0'; menu.style.transition='opacity 0.4s'; setTimeout(()=>menu.remove(),420); }
  _gameStarted=true;
  startBGMusic();
}

// ── Envoi state (host → clients, ~100ms) ──────────────────────────────────
function mpSendState(){
  if(!_mpIsHost||!_mpWs||_mpWs.readyState!==1) return;
  const now=Date.now(); if(now-_mpLastSent<16) return; _mpLastSent=now;
  const ser=s=>s?{x:s.x,y:s.y,vx:s.vx,vy:s.vy,angle:s.angle,angVel:+(s.angVel||0).toFixed(4),
    hp:s.hp,maxHp:s.maxHp,hit:s.hit||0,
    shield:s.shield,shieldHit:s.shieldHit||0,shieldTimer:s.shieldTimer||0,
    immuneTimer:s.immuneTimer||0,
    dead:s.dead,respawnTimer:s.respawnTimer||0,shipType:s.shipType,team:s.team,name:s.name,
    isMercenary:!!s.isMercenary,
    kills:s.kills||0,caps:s.caps||0,dmgDealt:s.dmgDealt||0}:null;
  _mpWs.send(JSON.stringify({
    type:'state',
    _clientT:_mpLastClientT||0,
    blues:blues.map(ser), reds:reds.map(ser),
    hostShip:ser(ship),

      let _fd=Math.atan2(_bTgt.y+_bTgt.vy*_t2-ai.y,_bTgt.x+_bTgt.vx*_t2-ai.x)-ai.angle;
      while(_fd>Math.PI)_fd-=Math.PI*2; while(_fd<-Math.PI)_fd+=Math.PI*2;

        ai.burstLeft=ai.burstSz||BURST_SIZE; ai.burstTimer=1;
        ai.fireTimer=Math.max(8,BURST_CD-(BURST_CD+22)+Math.floor(Math.random()*12)); // cadence joueur rapide
        ai.burstTarget=_bTgt;
      }
    }
  }

// ── Doppler bots (effet Star Wars) ───────────────────────────────────────
let _dopplerClock=0;
function updateDoppler(){
  if(!_ac) return;
  if(++_dopplerClock%6!==0) return; // vérif toutes les 6 frames
  const all=[...blues,...reds].filter(a=>!a.dead);
  let best=null, bestScore=-1;
  for(const ai of all){
    const dx=ai.x-ship.x, dy=ai.y-ship.y;
    const dist=Math.hypot(dx,dy);
    if(dist>520||dist<20) continue;
    const spd=Math.hypot(ai.vx,ai.vy);
    if(spd<0.5) continue;
    const score=spd*(1-dist/520);
    if(score>bestScore){bestScore=score;best={ai,dx,dy,dist,spd};}
  }
  if(!best||bestScore<0.01) return;
  const {ai,dx,dy,dist,spd}=best;
  // Vitesse radiale : positif = s'éloigne, négatif = approche
  const radVel=(ai.vx*dx+ai.vy*dy)/dist;
  const dopplerShift=1-radVel/12; // approche → aigu, fuite → grave
  const baseFreq=90;
  const freq=Math.max(35,Math.min(320,baseFreq*dopplerShift));
  const vol=0.06*(1-dist/520)*Math.min(1,spd/2.5);
  if(vol<0.008) return;
  const t=_ac.currentTime;
  const o=_ac.createOscillator(), g=_ac.createGain();
  const f=_ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=500;
  o.connect(f); f.connect(g); g.connect(_nebulaOut||_ac.destination);
  o.type='sawtooth';
  o.frequency.setValueAtTime(freq*(radVel<0?1.25:0.85),t);
  o.frequency.exponentialRampToValueAtTime(freq*(radVel<0?0.78:1.18),t+0.28);
  g.gain.setValueAtTime(0.001,t);
  g.gain.linearRampToValueAtTime(vol,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.start(t); o.stop(t+0.3);
}

// La graine est fixe → tous les clients génèrent le même monde
const _WORLD_SEED = 0xDEADBEEF;
let _prngState = _WORLD_SEED;
function _rng(){
  _prngState = (_prngState + 0x6D2B79F5) >>> 0;
  let t = Math.imul(_prngState ^ (_prngState >>> 15), 1 | _prngState);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) >>> 0;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}

    if(!agrid.has(key))agrid.set(key,[]);
    agrid.get(key).push(a);
  }
}
rebuildAGrid();
function nearA(x,y){
  const cx=Math.floor(x/AG),cy=Math.floor(y/AG),res=[];
  for(let dx=-2;dx<=2;dx++) for(let dy=-2;dy<=2;dy++)
    for(const a of(agrid.get(`${cx+dx},${cy+dy}`)||[]))res.push(a);
  return res;
}
// Cap de vitesse en fonction de la masse (r²) — les gros bougent peu
function aSpeedCap(r){ return Math.max(0.7, 4.5/(r*0.032+0.55)); }


// ── HP et éclatement des roches ───────────────────────────────────────────
function rockHp(r){ return r>=65?4:r>=48?3:r>=34?2:1; }
function rockSplits(r){ return r>=65?3:r>=48?2:r>=34?1:0; }

function splitAsteroid(a){
  const n=rockSplits(a.radius);
  for(let i=0;i<n;i++){

    const pts=6+Math.floor(Math.random()*4), verts=[];
    for(let j=0;j<pts;j++){
      const fa=(j/pts)*Math.PI*2+(Math.random()-0.5)*0.4;
      verts.push([Math.cos(fa)*fragR*(0.82+Math.random()*0.2),Math.sin(fa)*fragR*(0.82+Math.random()*0.2)]);
    }
    const frag={wx:a.wx+(Math.random()-0.5)*a.radius*0.6,wy:a.wy+(Math.random()-0.5)*a.radius*0.6,
      radius:fragR,verts,vx:a.vx+Math.cos(angle)*spd,vy:a.vy+Math.sin(angle)*spd,
      rot:Math.random()*Math.PI*2,rotVel:(Math.random()-0.5)*0.018,id:_aId++};
    frag.hp=rockHp(frag.radius); frag.maxHp=frag.hp;

}

function updateAsteroids(){
  const B=MAP_HALF;
  const _astImpact=[];
  for(let i=ASTEROIDS.length-1;i>=0;i--){
    const a=ASTEROIDS[i];
    a.wx+=a.vx; a.wy+=a.vy;
    a.rot+=a.rotVel; a.rotVel*=0.999;
    a.vx*=0.999; a.vy*=0.999;
    // Destruction au contact de la planète
    if(Math.hypot(a.wx-PLANET.x,a.wy-PLANET.y)<PLANET.r+a.radius){
      addSpark(a.wx,a.wy,'blue'); ASTEROIDS.splice(i,1); continue;
    }
    const ad=Math.hypot(a.wx,a.wy)||0.01;
    if(ad>B-a.radius){
      const anx=a.wx/ad, any=a.wy/ad;
      a.wx=anx*(B-a.radius); a.wy=any*(B-a.radius);
      const adot=a.vx*anx+a.vy*any;
      if(adot>0){a.vx-=2*adot*anx*0.6;a.vy-=2*adot*any*0.6;}
    }
    // ── Collision astéroïde–astéroïde avec masse ─────────────────────────
    for(const b of nearA(a.wx,a.wy)){
      if(b.id<=a.id) continue; // chaque paire une seule fois
      const cdx=a.wx-b.wx, cdy=a.wy-b.wy, cdist=Math.hypot(cdx,cdy)||0.01;
      if(cdist>=(a.radius+b.radius)*0.72) continue;
      const cnx=cdx/cdist, cny=cdy/cdist; // normale de b vers a
      const vRelN=(a.vx-b.vx)*cnx+(a.vy-b.vy)*cny; // <0 = approche
      if(vRelN>=-0.04) continue; // seuil minimal — ignore micro-contacts statiques
      const mA=a.radius*a.radius, mB=b.radius*b.radius, mT=mA+mB;
      // e=0.82 : quasi-élastique → l'impacteur rebondit, pas de "même direction"
      const e=0.82;
      const dvA=-(1+e)*mB/mT*vRelN; // >0 : pousse a dans +n (recul)
      const dvB= (1+e)*mA/mT*vRelN; // <0 : pousse b dans -n (éjecté)
      a.vx+=dvA*cnx; a.vy+=dvA*cny;
      b.vx+=dvB*cnx; b.vy+=dvB*cny;
      // Cap vitesse selon masse
      const capA=aSpeedCap(a.radius), capB=aSpeedCap(b.radius);
      const sA=Math.hypot(a.vx,a.vy); if(sA>capA){a.vx=a.vx/sA*capA;a.vy=a.vy/sA*capA;}
      const sB=Math.hypot(b.vx,b.vy); if(sB>capB){b.vx=b.vx/sB*capB;b.vy=b.vy/sB*capB;}
      // Séparation complète de l'overlap (évite imbrication persistante)
      const ov=((a.radius+b.radius)*0.72-cdist+0.2);
      a.wx+=cnx*ov*mB/mT; a.wy+=cny*ov*mB/mT;
      b.wx-=cnx*ov*mA/mT; b.wy-=cny*ov*mA/mT;
      // Rotation tangentielle au choc
      const tang=(a.vy-b.vy)*cnx-(a.vx-b.vx)*cny;
      a.rotVel+=tang*0.0008/(a.radius*0.04+0.5);
      b.rotVel-=tang*0.0008/(b.radius*0.04+0.5);
      // Dégâts de choc proportionnels à la vitesse d'impact
      const _impV=Math.abs(vRelN);
      if(_impV>1.2){
        const _dmg=Math.floor(_impV/1.2);
        if(a.hp===undefined){a.hp=rockHp(a.radius);a.maxHp=a.hp;}
        if(b.hp===undefined){b.hp=rockHp(b.radius);b.maxHp=b.hp;}
        a.hp-=_dmg; b.hp-=_dmg;
        addSpark((a.wx+b.wx)*0.5,(a.wy+b.wy)*0.5,'blue');
        _astImpact.push([a,b]);
      }
    }
  }
  // Traiter les destructions après les boucles
  const _toRemA=new Set();
  for(const [ra,rb] of _astImpact){
    if(ra.hp<=0&&!_toRemA.has(ra)){_toRemA.add(ra);splitAsteroid(ra);}
    if(rb.hp<=0&&!_toRemA.has(rb)){_toRemA.add(rb);splitAsteroid(rb);}
  }
  if(_toRemA.size){
    for(let i=ASTEROIDS.length-1;i>=0;i--){
      if(_toRemA.has(ASTEROIDS[i])){addExplosion(ASTEROIDS[i].wx,ASTEROIDS[i].wy,'blue');ASTEROIDS.splice(i,1);}
    }
  }
  rebuildAGrid();
}

// ── Physique ──────────────────────────────────────────────────────────────
function applyPhysics(obj,simL,simR){
  const boost=obj.speedBoost>0?1.45:1;
  const _spm=obj.speedMult||1, _thm=obj.thrustMult||1, _anm=obj.angMult||1;
  const thrust=THRUST_FWD*boost*_thm, maxSpd=MAX_SPEED*boost*_spm;
  const fwd=Math.cos(obj.angle), fup=Math.sin(obj.angle);
  // ── Zones EMP : coupure continue + répulsion magnétique ──────────────────
  let empBlocked=false;
  for(const ez of EMP_ZONES){
    const d=Math.hypot(obj.x-ez.x,obj.y-ez.y)||0.01;
    if(d<ez.r){
      empBlocked=true;
      // Poussée magnétique douce vers l'extérieur
      obj.vx+=(obj.x-ez.x)/d*0.06;
      obj.vy+=(obj.y-ez.y)/d*0.06;
    }
  }
  obj.empTimer=empBlocked?1:0; // pour le HUD uniquement
  if(!empBlocked){
    if(simL&&simR){obj.vx+=fwd*thrust; obj.vy+=fup*thrust;}
    else if(simL){obj.angVel+=THRUST_ANG*_anm; obj.vx+=fwd*thrust*0.35; obj.vy+=fup*thrust*0.35;}
    else if(simR){obj.angVel-=THRUST_ANG*_anm; obj.vx+=fwd*thrust*0.35; obj.vy+=fup*thrust*0.35;}
  }
  const spd=Math.hypot(obj.vx,obj.vy);
  if(spd>maxSpd){obj.vx=obj.vx/spd*maxSpd; obj.vy=obj.vy/spd*maxSpd;}
  if(obj.speedBoost>0) obj.speedBoost--;
  obj.angVel*=DAMPING_ANG; obj.vx*=DAMPING_LIN; obj.vy*=DAMPING_LIN;
  obj.angle+=obj.angVel; obj.x+=obj.vx; obj.y+=obj.vy;
}
function asteroidBounce(obj,nearby){
  for(const a of nearby){
    const dx=obj.x-a.wx, dy=obj.y-a.wy, dist=Math.hypot(dx,dy);
    const minD=(obj.radius||SHIP_RADIUS)+a.radius*0.72;
    if(dist<minD&&dist>0.1){
      const nx=dx/dist, ny=dy/dist;
      obj.x+=nx*(minD-dist); obj.y+=ny*(minD-dist);
      // Vitesse relative le long de la normale
      const relV=(obj.vx-a.vx)*nx+(obj.vy-a.vy)*ny;
      if(relV<0){
        // Rebond vaisseau
        obj.vx-=1.45*relV*nx; obj.vy-=1.45*relV*ny;
        obj.angVel+=(Math.random()-0.5)*0.06;
        obj.hit=8;
        // ── Dégâts de collision (proportionnels à la vitesse d'impact) ──
        // relV est négatif : plus il est fort, plus l'impact est frontal et rapide
        const impact=Math.abs(relV);
        if(impact>1.6&&!obj.dead&&obj.immuneTimer===0){
          // 1 dégât si impact modéré (>1.6), 2 si fort (>3.0), 3 si très fort (>5.0)
          const dmg=impact>5.0?3:impact>3.0?2:1;
          addSpark(obj.x,obj.y, obj.team||'blue');
          playSound('shield',0.2,obj.x,obj.y);
          let remaining=dmg;
          while(remaining>0){
            if(!takeHit(obj)){obj.hp-=1;}
            remaining--;
          }
          if(obj.hp<=0&&!obj.dead){
            obj.dead=true; obj.respawnTimer=RESPAWN_FRAMES;
            addExplosion(obj.x,obj.y,obj.team);
            if(!obj.isMercenary) teamLives[obj.team]--; dropPickup(obj.x,obj.y);
            playSound('explode',0.55,obj.x,obj.y);
            if(obj===ship) addLog([{text:ship.name,col:teamCol(ship.team)},{text:' écrasé sur un astéroïde',col:'#888'}]);
            else addLog([{text:obj.name,col:teamCol(obj.team)},{text:' écrasé sur un astéroïde',col:'#888'}]);
          }
        }
        // Impulsion sur l'astéroïde (masse ∝ r² — les gros bougent moins)
        const push=Math.abs(relV)*2.5/(a.radius*0.035+0.6);
        a.vx-=nx*push; a.vy-=ny*push;
        const aSpd=Math.hypot(a.vx,a.vy), aCap=aSpeedCap(a.radius);
        if(aSpd>aCap){a.vx=a.vx/aSpd*aCap;a.vy=a.vy/aSpd*aCap;}
        // Rotation due au choc (tangente de l'impact)
        a.rotVel+=(-ny*(obj.vx-a.vx)+nx*(obj.vy-a.vy))*0.0018/(a.radius*0.04+0.5);
        const maxRot=0.12; if(Math.abs(a.rotVel)>maxRot) a.rotVel=Math.sign(a.rotVel)*maxRot;
      }
    }
  }
}
function wallBounce(obj){
  const dist=Math.hypot(obj.x,obj.y)||0.01;
  const R=MAP_RADIUS-(obj.radius||SHIP_RADIUS);
  if(dist>=R){
    // Rebond dur sur la frontière circulaire
    const nx=obj.x/dist, ny=obj.y/dist;
    obj.x=nx*R; obj.y=ny*R;
    const dot=obj.vx*nx+obj.vy*ny;
    if(dot>0){ obj.vx-=2*dot*nx*0.5; obj.vy-=2*dot*ny*0.5; }
    obj.angVel+=(Math.random()-0.5)*0.08;
  } else if(dist>R-1200){
    // Répulsion douce dans la zone d'avertissement (1200u avant le bord)
    const t=(dist-(R-1200))/1200;
    const nx=obj.x/dist, ny=obj.y/dist;
    obj.vx-=nx*t*0.07;
    obj.vy-=ny*t*0.07;
  }
}

// ── Bouclier ──────────────────────────────────────────────────────────────
function tickShield(obj){
  if(obj.immuneTimer>0) obj.immuneTimer--;
  if(obj.shieldHit>0) obj.shieldHit--;
  if(obj.shieldTimer>0){
    const sMax=obj.maxShield??SHIELD_MAX;
    if(--obj.shieldTimer===0 && obj.shield<sMax){
      obj.shield++;
      if(obj.shield<sMax) obj.shieldTimer=SHIELD_REGEN;
    }
  }
}
function takeHit(obj){
  if(obj._testBot){ obj.hp=obj.maxHp; obj.hit=8; return true; } // bot cible invincible
  if(obj.immuneTimer>0) return true; // immunité spawn
  if(obj.shield>0){
    obj.shield--; obj.shieldHit=22; if(obj===ship) playSound('shield',0.35);
    if(obj.shieldTimer===0) obj.shieldTimer=SHIELD_REGEN;
    return true;
  }
  return false;
}

// ── Capture ───────────────────────────────────────────────────────────────
function updateCaptures(){
  for(const sp of spawns){
    const blueShips=_mpConnected?[...blues]:[...blues,...(ship.dead?[]:[ship])],redShips=reds;
    let atkTeam=null,atkN=0,defN=0;
    if(sp.team==='blue'){
      atkN=redShips.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
      defN=blueShips.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
      if(atkN>0) atkTeam='red';
    } else if(sp.team==='red'){
      atkN=blueShips.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
      defN=redShips.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
      if(atkN>0) atkTeam='blue';
    } else { // neutral
      const bN=blueShips.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
      const rN=redShips.filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS).length;
      if(bN>0&&rN===0){atkN=bN;atkTeam='blue';}
      else if(rN>0&&bN===0){atkN=rN;atkTeam='red';}
      else if(bN>0&&rN>0){sp.progress=Math.max(0,sp.progress-0.5);sp.capTeam=null;continue;}
      defN=0;
    }
    sp.capTeam=atkTeam;
    if(atkTeam&&atkN>0&&defN===0){
      const capRate=atkTeam==='red'?atkN*0.35:atkN;
      // Tracker la contribution du joueur frame par frame
      const _playerInZone=!ship.dead&&atkTeam==='blue'&&Math.hypot(ship.x-sp.x,ship.y-sp.y)<SPAWN_RADIUS;
      if(_playerInZone) sp._playerProgress=(sp._playerProgress||0)+(capRate/atkN);
      sp.progress+=capRate;
      if(sp.progress>=CAPTURE_FRAMES){
        const newTeam=atkTeam;
        const cappers=(newTeam==='blue'?(_mpConnected?[...blues]:[...blues,...(ship.dead?[]:[ship])]):reds).filter(a=>!a.dead&&Math.hypot(a.x-sp.x,a.y-sp.y)<SPAWN_RADIUS);
        const capper=cappers.length?cappers[0]:null;
        const capName=capper?(capper===ship?'JOUEUR':capper.name):'?';
        const capTeam=capper?(capper===ship?'blue':capper.team):'blue';
        addLog([{text:capName,col:teamCol(capTeam)},{text:' capture spawn ',col:'#888'},{text:newTeam==='blue'?'bleu':'rouge',col:teamCol(newTeam)}]);
        sp.team=newTeam;sp.progress=0;sp.capTeam=null;playSound('capture',0.55);
        // Points proportionnels à la contribution réelle du joueur
        const _playerContrib=sp._playerProgress||0;
        if(_playerContrib>0){
          const _capPts=Math.max(50,Math.round(500*_playerContrib/CAPTURE_FRAMES));
          _score+=_capPts;_caps++;
          playerFeedback.push({type:'cap',life:100,maxLife:100,label:'SPAWN CAPTURE',pts:`+${_capPts}`});
        }
        if(capper&&capper!==ship&&!capper.isMercenary) capper.caps++;
        sp._playerProgress=0;
      }
    } else if(defN>0&&atkN===0&&sp.progress>0){
      sp.progress=Math.max(0,sp.progress-0.5);
    } else if(!atkTeam&&sp.progress>0){
      sp.progress=Math.max(0,sp.progress-0.3);
    }
  }
}


// ── Score de kill avec combo ───────────────────────────────────────────────
function calcKillScore(victim){
  const base=victim.shipType===3?1000:victim.shipType===2?150:250; // T1 plus dur → +250, T2 plus facile → +150
  if(_streakTimer>0){ _killStreak++; } else { _killStreak=1; }
  _streakTimer=360; // 6 sec pour enchaîner
  const mult=_killStreak>=4?3:_killStreak===3?2:_killStreak===2?1.5:1;
  const pts=Math.round(base*mult);
  _score+=pts; _kills++;
  // Feedback visuel
  const W=canvas.width, H=canvas.height;
  const streakLabel=_killStreak>=4?'MASSACRE':_killStreak===3?'TRIPLE KILL':_killStreak===2?'DOUBLE KILL':'KILL';
  const multLabel=mult>1?` x${mult}`:'';
  playerFeedback.push({type:'kill',life:110,maxLife:110,label:`${streakLabel}${multLabel}`,pts:`+${pts}`,streak:_killStreak});
  return pts;
}

// ── IA ────────────────────────────────────────────────────────────────────
function updateAI(ai,enemies){
  if(ai.dead&&ai.respawnTimer>=999999) return; // MAP TEST : bot supprimé
  if(ai.dead){
    if(ai.isMercenary){
      // Mercenaire : ne respawn que si la balise est tenue par son équipe
      if(BEACON.capTeam!==ai.team) return;
      if(--ai.respawnTimer<=0){
        const _eAngle=Math.random()*Math.PI*2;
        const _eR=MAP_RADIUS*0.85+Math.random()*500;
        ai.x=Math.cos(_eAngle)*_eR; ai.y=Math.sin(_eAngle)*_eR;
        ai.vx=ai.vy=ai.angVel=0; ai.angle=ai.team==='blue'?-Math.PI/2:Math.PI/2;
        ai.hp=ai.maxHp; ai.dead=false; ai.burstLeft=0; ai.burstTarget=null;
        ai.shield=ai.maxShield??SHIELD_MAX; ai.shieldTimer=0; ai.shieldHit=0; ai.immuneTimer=SPAWN_IMMUNE;
        ai.fireTimer=BURST_CD+Math.floor(Math.random()*80);
        ai.strafeDir=Math.sign(Math.random()-0.5);
        ai.strafeTimer=20+Math.floor(Math.random()*90);
      }
      return;
    }
    if(--ai.respawnTimer<=0){
      // Type 3 : jamais de respawn
      if(ai.shipType===3) return;
      // Spawn uniquement sur les T3 alliés vivants
      const t3sp=(ai.team==='blue'?blues:reds).filter(a=>!a.dead&&a.shipType===3);
      const spawnStations=spawns.filter(s=>s.team===ai.team);
      const allSpawnPts=[...t3sp.map(a=>({x:a.x,y:a.y})),...spawnStations];
      if(!allSpawnPts.length) return;
      const aliveN=(ai.team==='blue'?blues.filter(a=>!a.dead&&!a.isMercenary).length+(ship.dead?0:1):reds.filter(a=>!a.dead&&!a.isMercenary).length);
      if(teamLives[ai.team]<=0||teamLives[ai.team]<=aliveN) return;
      const sp=allSpawnPts[Math.floor(Math.random()*allSpawnPts.length)];
      ai.x=sp.x+(Math.random()-0.5)*120; ai.y=sp.y+(Math.random()-0.5)*120;
      ai.vx=ai.vy=ai.angVel=0; ai.angle=ai.team==='blue'?-Math.PI/2:Math.PI/2;
      ai.hp=ai.maxHp; ai.dead=false; ai.burstLeft=0; ai.burstTarget=null;
      ai.shield=ai.maxShield??SHIELD_MAX; ai.shieldTimer=0; ai.shieldHit=0; ai.immuneTimer=SPAWN_IMMUNE;
      ai.fireTimer=BURST_CD+Math.floor(Math.random()*80);
      ai.strafeDir=Math.sign(Math.random()-0.5);
      ai.strafeTimer=20+Math.floor(Math.random()*90);
    }
    return;
  }
  tickShield(ai);

  let target=null, tDist=Infinity;
  for(const e of enemies){
    if(e.dead) continue;
    // Avantage caché : les rouges évitent de cibler le joueur si déjà 4 rouges l'attaquent
    if(ai.team==='red'&&e===ship&&reds.filter(r=>!r.dead&&r.burstTarget===ship).length>=4) continue;
    const d=Math.hypot(e.x-ai.x,e.y-ai.y);
    if(d<tDist){tDist=d;target=e;}
  }

  const eSpawns=spawns.filter(s=>s.team!==ai.team);
  let spTgt=null, sDist=Infinity;
  for(const s of eSpawns){const d=Math.hypot(s.x-ai.x,s.y-ai.y);if(d<sDist){sDist=d;spTgt=s;}}
  // Tourelles ennemies comme cibles secondaires (si aucun vaisseau plus proche)
  for(const sp of eSpawns){
    if(sp.team==='neutral'||!sp.turrets.some(t=>t.hp>0)) continue;
    const _sd=Math.hypot(sp.x-ai.x,sp.y-ai.y);
    if(_sd<tDist&&_sd<FIRE_RANGE*1.4){ tDist=_sd; target=sp; }
  }
  // Pickup le plus proche si blessé
  let pkTgt=null, pkDist=Infinity;
  if(ai.hp<ai.maxHp){for(const pk of pickups){const d=Math.hypot(pk.x-ai.x,pk.y-ai.y);if(d<1400&&d<pkDist){pkDist=d;pkTgt=pk;}}}

  const lx=ai.x+ai.vx*28, ly=ai.y+ai.vy*28;
  let repX=0, repY=0;
  const nearby=nearA(ai.x,ai.y);
  // Répulsion astéroïdes (position actuelle et prédite)
  for(const a of nearby){
    const d1=Math.hypot(ai.x-a.wx,ai.y-a.wy), d2=Math.hypot(lx-a.wx,ly-a.wy);
    const d=Math.min(d1,d2), px=d1<d2?ai.x:lx, py=d1<d2?ai.y:ly;
    const danger=a.radius+115;
    if(d<danger&&d>0.1){const str=Math.pow((danger-d)/danger,1.5)*3;repX+=(px-a.wx)/d*str;repY+=(py-a.wy)/d*str;}
  }
  // Répulsion météores — même logique, position prédite du météore aussi
  for(const m of meteors){
    const LOOK=28;
    // Position prédite du météore dans LOOK frames
    const mx2=m.x+m.vx*LOOK, my2=m.y+m.vy*LOOK;
    // Position prédite de l'IA dans LOOK frames
    const d1=Math.hypot(ai.x-m.x,ai.y-m.y);
    const d2=Math.hypot(lx-m.x,ly-m.y);
    const d3=Math.hypot(ai.x-mx2,ai.y-my2);
    const d4=Math.hypot(lx-mx2,ly-my2);
    const d=Math.min(d1,d2,d3,d4);
    // Point de référence : combinaison la plus proche
    let rpx,rpy,rmx,rmy;
    if(d===d1){rpx=ai.x;rpy=ai.y;rmx=m.x;rmy=m.y;}
    else if(d===d2){rpx=lx;rpy=ly;rmx=m.x;rmy=m.y;}
    else if(d===d3){rpx=ai.x;rpy=ai.y;rmx=mx2;rmy=my2;}
    else{rpx=lx;rpy=ly;rmx=mx2;rmy=my2;}
    const danger=m.r+115;
    if(d<danger&&d>0.1){const str=Math.pow((danger-d)/danger,1.5)*4;repX+=(rpx-rmx)/d*str;repY+=(rpy-rmy)/d*str;}
  }
  // Répulsion douce entre vaisseaux (évite le chevauchement sans collision dure)
  const minSep=SHIP_RADIUS*3.2;
  const teammates=ai.team==='blue'?blues:reds;
  for(const f of teammates){
    if(f===ai||f.dead)continue;
    const fdx=ai.x-f.x,fdy=ai.y-f.y,fd=Math.hypot(fdx,fdy);
    if(fd<minSep&&fd>0.1){const str=Math.pow((minSep-fd)/minSep,2)*1.8;repX+=fdx/fd*str;repY+=fdy/fd*str;}
  }
  // Dispersion à moyenne portée : fuir le centre de masse des voisins trop proches
  const DISP_R=280;
  let nearN=0,nearCx=0,nearCy=0;
  for(const f of teammates){
    if(f===ai||f.dead)continue;
    const fd=Math.hypot(ai.x-f.x,ai.y-f.y);
    if(fd<DISP_R){nearN++;nearCx+=f.x;nearCy+=f.y;}
  }
  if(nearN>3){
    const cmx=nearCx/nearN,cmy=nearCy/nearN;
    const ddx=ai.x-cmx,ddy=ai.y-cmy,dd=Math.hypot(ddx,ddy)||1;
    const str=Math.min(0.9,(nearN-3)*0.18);
    repX+=ddx/dd*str; repY+=ddy/dd*str;
  }
  // Légère répulsion ennemis proches (évite le chevauchement)
  const foes=ai.team==='blue'?reds:(_mpConnected||ship.dead?blues:[...blues,ship]);
  for(const f of foes){
    if(f.dead)continue;
    const fdx=ai.x-f.x,fdy=ai.y-f.y,fd=Math.hypot(fdx,fdy);
    if(fd<SHIP_RADIUS*2.2&&fd>0.1){const str=Math.pow((SHIP_RADIUS*2.2-fd)/(SHIP_RADIUS*2.2),2)*0.9;repX+=fdx/fd*str;repY+=fdy/fd*str;}
  }
  // ── Répulsion planète (obstacle prioritaire) ──────────────────────────────
  {
    const d1=Math.hypot(ai.x-PLANET.x,ai.y-PLANET.y)||0.01;
    const d2=Math.hypot(lx-PLANET.x,ly-PLANET.y)||0.01;
    const d=Math.min(d1,d2);
    const px2=d1<d2?ai.x:lx, py2=d1<d2?ai.y:ly;
    // T3 tourne beaucoup plus lentement → zone de danger plus grande
    const pDanger=PLANET.r+(ai.shipType===3?900:440);
    const pStr=ai.shipType===3?28:14;
    if(d<pDanger){
      const str=Math.pow((pDanger-d)/pDanger,1.2)*pStr;
      repX+=(px2-PLANET.x)/d*str; repY+=(py2-PLANET.y)/d*str;
    }
  }
  // ── Répulsion zones EMP (permanente — les IA fuient toujours) ───────────
  for(const ez of EMP_ZONES){
    const ed=Math.hypot(ai.x-ez.x,ai.y-ez.y)||0.01;
    const elx=Math.hypot(lx-ez.x,ly-ez.y)||0.01;
    const ed2=Math.min(ed,elx);
    const eDanger=ez.r+280;
    if(ed2<eDanger){
      // Plus fort quand vraiment à l'intérieur
      const inside=ed<ez.r?3.5:1;
      const str=(1-ed2/eDanger)*5*inside;
      const px2=ed<elx?ai.x:lx, py2=ed<elx?ai.y:ly;
      repX+=(px2-ez.x)/ed2*str; repY+=(py2-ez.y)/ed2*str;
    }
  }
  const repStr=Math.hypot(repX,repY);

  const fSpawnN=spawns.filter(s=>s.team===ai.team).length;
  const eSpawnN=eSpawns.length;
  const wantCap=spTgt&&repStr<1&&(
    (sDist<1400&&(!target||tDist>350))||(fSpawnN<eSpawnN-1&&sDist<2500)
  );

  const wantPickup=pkTgt&&repStr<1&&(!target||tDist>300||ai.hp===1);
  // Attraction vers la balise : bots désignés "seekers" vont capturer/défendre
  const _beaconDist=Math.hypot(ai.x-BEACON.x,ai.y-BEACON.y);
  const wantBeacon=ai.beaconSeeker&&ai.shipType!==3&&!ai.isMercenary&&repStr<1
    &&(BEACON.capTeam!==ai.team||BEACON.contestTeam!==null)
    &&(!target||tDist>700)&&_beaconDist<8000;

  const wantForm=false;
  // Escorte T3 (toute équipe, actif uniquement si T3 vivant et pas de formSlot joueur)
  const _t3leader=ai.escortOf&&!ai.escortOf.dead?ai.escortOf:null;
  const wantEscort=_t3leader&&!wantForm&&ai.shipType!==3;

  let desAngle=ai.angle;
  if(repStr>1){desAngle=Math.atan2(repY,repX);}
  else if(wantPickup){desAngle=Math.atan2(pkTgt.y-ai.y,pkTgt.x-ai.x);}
  else if(wantBeacon){
    // Dans la zone → viser ennemis proches, sinon foncer vers la balise
    if(_beaconDist<220&&target&&tDist<FIRE_RANGE){
      const t3=Math.min(tDist/BULLET_SPEED,45);
      desAngle=Math.atan2(target.y+target.vy*t3-ai.y,target.x+target.vx*t3-ai.x);
    } else { desAngle=Math.atan2(BEACON.y-ai.y,BEACON.x-ai.x); }
  }
  else if(wantEscort&&!target){
    const _slot=T3_ESCORT_SLOTS[ai.escortSlot];
    const _cosL=Math.cos(_t3leader.angle),_sinL=Math.sin(_t3leader.angle);
    const _tx=_t3leader.x+_cosL*_slot.fwd-_sinL*_slot.lat;
    const _ty=_t3leader.y+_sinL*_slot.fwd+_cosL*_slot.lat;
    desAngle=Math.atan2(_ty-ai.y,_tx-ai.x);
  }
  else if(wantCap){
    // En zone de capture ET ennemi à portée : viser l'ennemi tout en capturant
    if(spTgt&&Math.hypot(ai.x-spTgt.x,ai.y-spTgt.y)<SPAWN_RADIUS&&target&&tDist<FIRE_RANGE){
      const t3=Math.min(tDist/BULLET_SPEED,45);
      desAngle=Math.atan2(target.y+target.vy*t3-ai.y,target.x+target.vx*t3-ai.x);
    } else {
      desAngle=Math.atan2(spTgt.y-ai.y,spTgt.x-ai.x);
    }
  }
  else if(target){
    const t=Math.min(tDist/BULLET_SPEED,45);
    const _tgtAngle=Math.atan2(target.y+target.vy*t-ai.y,target.x+target.vx*t-ai.x);
    if(ai.shipType===3){
      // Type 3 : orient flank toward enemy
      const _o1=_tgtAngle+Math.PI/2, _o2=_tgtAngle-Math.PI/2;
      let _d1=_o1-ai.angle; while(_d1>Math.PI)_d1-=Math.PI*2; while(_d1<-Math.PI)_d1+=Math.PI*2;
      let _d2=_o2-ai.angle; while(_d2>Math.PI)_d2-=Math.PI*2; while(_d2<-Math.PI)_d2+=Math.PI*2;
      desAngle=Math.abs(_d1)<Math.abs(_d2)?_o1:_o2;
    } else {
      desAngle=_tgtAngle;
      if(repStr>0.2){
        const blend=Math.min(repStr,1)*0.42, rs=repStr||1;
        desAngle=Math.atan2(Math.sin(desAngle)*(1-blend)+repY/rs*blend,Math.cos(desAngle)*(1-blend)+repX/rs*blend);
      }
    }
  }

  // ── Rally : converger vers la cible T3 désignée (override escorte + patrol)
  if(ai.rallyTarget){
    if(ai.rallyTarget.dead||ai.rallyTimer<=0){ ai.rallyTarget=null; ai.rallyTimer=0; }
    else {
      ai.rallyTimer--;
      const _rDist=Math.hypot(ai.rallyTarget.x-ai.x,ai.rallyTarget.y-ai.y);
      if(_rDist<600){ ai.rallyTarget=null; ai.rallyTimer=0; } // arrivé
      else if(!target||tDist>1800){
        // Override la direction même si escorte/patrol, sauf si ennemi très proche
        desAngle=Math.atan2(ai.rallyTarget.y-ai.y,ai.rallyTarget.x-ai.x);
      }
    }
  }
  // ── Patrouille : dispersion sur la map quand pas d'objectif ───────────────
  const _idle=!target&&!wantCap&&!wantPickup&&!wantForm&&!wantBeacon&&repStr<0.5&&!ai.rallyTarget;
  if(_idle){
    const _pd=Math.hypot(ai.x-ai.patrolX,ai.y-ai.patrolY);
    // Beacon seeker idle : patrouiller autour de la balise si proche
    if(ai.beaconSeeker&&_beaconDist<1200){
      const _ba=Math.random()*Math.PI*2;
      ai.patrolX=BEACON.x+Math.cos(_ba)*300; ai.patrolY=BEACON.y+Math.sin(_ba)*300;
      ai.patrolTimer=300+Math.floor(Math.random()*200);
    }
    if(_pd<350||--ai.patrolTimer<=0){
      if(ai.shipType===3&&eSpawns.length){
        // Type 3 : fonce vers un spawn ennemi, en évitant la planète
        const _eS=eSpawns[Math.floor(Math.random()*eSpawns.length)];
        let _px=_eS.x+(Math.random()-0.5)*900, _py=_eS.y+(Math.random()-0.5)*900;
        // Si la cible est trop proche de la planète, la décaler latéralement
        const _ptPlanetD=Math.hypot(_px-PLANET.x,_py-PLANET.y);
        if(_ptPlanetD<PLANET.r+800){
          const _pa=Math.atan2(_py-PLANET.y,_px-PLANET.x);
          const _side=(Math.random()<0.5?1:-1)*Math.PI*0.55;
          _px=PLANET.x+Math.cos(_pa+_side)*(PLANET.r+900);
          _py=PLANET.y+Math.sin(_pa+_side)*(PLANET.r+900);
        }
        ai.patrolX=_px; ai.patrolY=_py;
        ai.patrolTimer=480+Math.floor(Math.random()*200);
      } else {
        // Nouveau waypoint : aléatoire mais éloigné des coéquipiers proches
        let _bx=0,_by=0,_best=-1;
        for(let _pi=0;_pi<6;_pi++){
          const _ang=Math.random()*Math.PI*2, _dist=2500+Math.random()*4500;
          const _cx=ai.x+Math.cos(_ang)*_dist, _cy=ai.y+Math.sin(_ang)*_dist;
          const _cl=Math.min(Math.abs(_cx),Math.abs(_cy));
          if(_cl>MAP_HALF*0.95) continue; // hors map
          let _minF=Infinity;
          for(const _f of teammates){if(_f===ai||_f.dead)continue;_minF=Math.min(_minF,Math.hypot(_cx-_f.x,_cy-_f.y));}
          if(_minF===Infinity) _minF=9999;
          if(_minF>_best){_best=_minF;_bx=_cx;_by=_cy;}
        }
        ai.patrolX=_bx||ai.patrolX; ai.patrolY=_by||ai.patrolY;
        ai.patrolTimer=360+Math.floor(Math.random()*240);
      }
    }
    desAngle=Math.atan2(ai.patrolY-ai.y,ai.patrolX-ai.x);
  }
  if(--ai.strafeTimer<=0){ai.strafeDir*=-1;ai.strafeTimer=75+Math.floor(Math.random()*80);}

  // ── Désengagement : s'éloigner avant de revenir ───────────────────────
  const DISENGAGE_DIST=ENGAGE_DIST*0.58; // ~128 unités
  if(ai.disengageTimer>0){
    ai.disengageTimer--;
    // Voler à l'opposé de la cible (pas de strafe, pas de circling)
    if(target&&repStr<0.8) desAngle=Math.atan2(ai.y-target.y, ai.x-target.x);
  } else if(target&&tDist<DISENGAGE_DIST&&repStr<0.8&&!wantCap&&!wantForm&&ai.shipType!==3){
    // Trop proche → déclencher la fuite
    ai.disengageTimer=75+Math.floor(Math.random()*55);
  }
  const disengaging=ai.disengageTimer>0;

  const inZone=wantCap&&spTgt&&Math.hypot(ai.x-spTgt.x,ai.y-spTgt.y)<SPAWN_RADIUS;
  // Pas de strafe pendant le désengagement (évite le cercle)
  const sScale=disengaging?0:(inZone?0.1:(target?Math.min(1,Math.max(0,1-(tDist-ENGAGE_DIST*0.4)/(FIRE_RANGE*0.7))):0));
  const steerAngle=desAngle+(repStr>1?0:ai.strafeDir*0.75*sScale);

  let diff=steerAngle-ai.angle;
  while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
  const corr=diff-ai.angVel*11;
  const simL=corr>0.07, simR=corr<-0.07;

  let simFwd=true;
  if(!disengaging&&repStr<1&&target&&!wantCap&&ai.shipType!==3){
    const approach=(ai.vx*(target.x-ai.x)+ai.vy*(target.y-ai.y))/tDist;
    if(tDist<ENGAGE_DIST*0.35&&approach>3.5) simFwd=false;
  }

  const fwd=Math.cos(ai.angle), fup=Math.sin(ai.angle);
  // ── Zones EMP : coupure continue + répulsion magnétique ──────────────────
  let aiEmpBlocked=false;
  for(const ez of EMP_ZONES){
    const d=Math.hypot(ai.x-ez.x,ai.y-ez.y)||0.01;
    if(d<ez.r){
      aiEmpBlocked=true;
      ai.vx+=(ai.x-ez.x)/d*0.09;
      ai.vy+=(ai.y-ez.y)/d*0.09;
    }
  }
  const _thrMult=ai.thrustMult||1, _angMult=ai.angMult||1;
  if(!aiEmpBlocked){
    if(simL&&!simR){ai.angVel+=THRUST_ANG*_angMult;if(simFwd){ai.vx+=fwd*THRUST_FWD*_thrMult*0.35;ai.vy+=fup*THRUST_FWD*_thrMult*0.35;}}
    else if(simR&&!simL){ai.angVel-=THRUST_ANG*_angMult;if(simFwd){ai.vx+=fwd*THRUST_FWD*_thrMult*0.35;ai.vy+=fup*THRUST_FWD*_thrMult*0.35;}}
    else if(simFwd){ai.vx+=fwd*THRUST_FWD*_thrMult;ai.vy+=fup*THRUST_FWD*_thrMult;}
  }
  const _aiMaxSpd=MAX_SPEED*(ai.speedMult||1)*(ai.speedBoost>0?1.45:1);
  const spd=Math.hypot(ai.vx,ai.vy);
  if(spd>_aiMaxSpd){ai.vx=ai.vx/spd*_aiMaxSpd;ai.vy=ai.vy/spd*_aiMaxSpd;}
  if(ai.speedBoost>0) ai.speedBoost--;
  ai.angVel*=DAMPING_ANG; ai.vx*=DAMPING_LIN; ai.vy*=DAMPING_LIN;
  ai.angle+=ai.angVel; ai.x+=ai.vx; ai.y+=ai.vy;
  asteroidBounce(ai,nearby);
  if(ai.hit>0) ai.hit--;
  if(ai._hitImmune>0) ai._hitImmune--;

  if(ai.burstLeft>0){
    if(--ai.burstTimer<=0){
      if(ai.shipType===3){
        // Type 3 : 2 lasers latéraux (gauche + droite) ciblant indépendamment
        const foes=ai.team==='blue'?[...reds]:(_mpConnected||ship.dead?[...blues]:[...blues,ship]);
        const _lfw2=Math.cos(ai.angle),_lfu2=Math.sin(ai.angle);
        const _llx2=-_lfu2,_lly2=_lfw2;
        for(const _side of ['left','right']){
          if(lasers.length>=MAX_LASERS) break;
          const _sign=_side==='left'?1:-1;
          // Chercher l'ennemi le plus proche de ce côté
          let _stgt=null,_sd=Infinity;
          for(const f of foes){
            if(f.dead) continue;
            const _dot=(f.x-ai.x)*_llx2*_sign+(f.y-ai.y)*_lly2*_sign;
            if(_dot<=0) continue; // mauvais côté
            const _fd=Math.hypot(f.x-ai.x,f.y-ai.y);
            if(_fd<_sd&&_fd<FIRE_RANGE*1.3){_sd=_fd;_stgt=f;}
          }
          if(_stgt){
            lasers.push({shooter:ai,target:_stgt,team:ai.team,side:_side,
              life:TYPE3_LASER_LIFE,maxLife:TYPE3_LASER_LIFE,dmgTimer:0,owner:null});
            sfxShoot(ai.x,ai.y);
          }
        }
      } else {
        if(bullets.length<MAX_BULLETS){
          {const _bspd=ai.shipType===2?TYPE2_BULLET_SPD:BULLET_SPEED;
          const _bhome=ai.shipType===2;
          const _bvx=Math.cos(ai.angle)*_bspd+ai.vx*0.25,_bvy=Math.sin(ai.angle)*_bspd+ai.vy*0.25;
          fireBulletHitscan(ai,_bvx,_bvy,_bspd,_bhome,!!ai._testBot);}
        }
      }
      ai.burstLeft--; ai.burstTimer=BURST_DELAY;
    }
  } else if(target){
    ai.fireTimer--;
    const t2=Math.min(tDist/BULLET_SPEED,45);
    let fd=Math.atan2(target.y+target.vy*t2-ai.y,target.x+target.vx*t2-ai.x)-ai.angle;
    while(fd>Math.PI)fd-=Math.PI*2; while(fd<-Math.PI)fd+=Math.PI*2;
    // Avantage caché : imprécision + cooldown allongé quand un rouge vise le joueur
    const vsPlayer=ai.team==='red'&&(target===ship||target._netPid!==undefined);
    const aimNoise=vsPlayer?(Math.random()-0.5)*0.09:0;
    // Légère pénalité CD vs joueur pour les deux équipes
    const cdBonus=vsPlayer?20:-(BURST_CD+35);
    if(ai.shipType===3){
      // Type 3 : tir uniquement si ennemi PAS dans l'arc avant
      if(ai.fireTimer<=0&&tDist<FIRE_RANGE*1.2&&Math.abs(fd)>TYPE3_FWDBLK&&repStr<1){
        ai.burstLeft=1; ai.burstTimer=1; ai.fireTimer=TYPE3_CD+Math.floor(Math.random()*25);
        ai.burstTarget=target;
      }
    } else if(ai.fireTimer<=0&&tDist<FIRE_RANGE&&Math.abs(fd+aimNoise)<0.22&&repStr<1){
      ai.burstLeft=ai.burstSz||BURST_SIZE; ai.burstTimer=1; ai.fireTimer=Math.max(16,BURST_CD+cdBonus+Math.floor(Math.random()*12));
      ai.burstTarget=target;
    }
  }
}

// ── Systèmes de jeu dynamiques ───────────────────────────────────────────
function updateSpawnTurrets(){
  const TURRET_RANGE=680;
  const TURRET_OFFSET=30;
  for(const sp of spawns){
    if(sp.team==='neutral') continue;
    const foes=sp.team==='blue'?[...reds]:(_mpConnected||ship.dead?[...blues]:[...blues,ship]);
    sp.dead=!sp.turrets.some(t=>t.hp>0); // mise à jour pour ciblage IA
    for(const tr of sp.turrets){
      if(tr.hp<=0){
        if(--tr.respawnTimer<=0){tr.hp=tr.maxHp;tr.fireTimer=60;}
        continue;
      }
      // Position physique de cette tourelle
      const tx=sp.x+Math.cos(tr.offsetAngle)*(tr.offsetRadius||0);
      const ty=sp.y+Math.sin(tr.offsetAngle)*(tr.offsetRadius||0);
      // Tracking angulaire vers l'ennemi le plus proche
      let nearest=null,nearDist=TURRET_RANGE;
      for(const f of foes){
        if(f.dead) continue;
        const d=Math.hypot(f.x-tx,f.y-ty);
        if(d<nearDist){nearDist=d;nearest=f;}
      }
      if(nearest){
        let da=Math.atan2(nearest.y-ty,nearest.x-tx)-tr.angle;
        while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
        tr.angle+=Math.sign(da)*Math.min(Math.abs(da),0.055);
      }
      if(nearest){
        if(tr.offsetRadius===0){
          // Tourelle centrale : laser type 3
          if(--tr.fireTimer<=0){
            tr.fireTimer=90+Math.floor(Math.random()*20);
            if(lasers.length<MAX_LASERS){
              const _msh={x:tx,y:ty,angle:tr.angle,dead:false,name:'STATION',team:sp.team,shipType:3};
              // cible fictive dans la direction courante
              const _fakeTarget={x:tx+Math.cos(tr.angle)*800,y:ty+Math.sin(tr.angle)*800,dead:false};
              lasers.push({shooter:_msh,target:_fakeTarget,team:sp.team,side:'center',
                life:TYPE3_LASER_LIFE,maxLife:TYPE3_LASER_LIFE,dmgTimer:0,owner:null,_station:true,_spawnIdx:spawns.indexOf(sp)});
              sfxShoot(tx,ty);
            }
          }
        } else {
          // Tourelles bras : rafale type 1
          if(tr.burstLeft>0){
            if(--tr.burstTimer<=0){
              if(bullets.length<MAX_BULLETS){
                bullets.push({x:tx+Math.cos(tr.angle)*18,y:ty+Math.sin(tr.angle)*18,
                  vx:Math.cos(tr.angle)*BULLET_SPEED,vy:Math.sin(tr.angle)*BULLET_SPEED,
                  team:sp.team,life:BULLET_LIFE,target:null,shooter:{name:'TOURELLE',team:sp.team},
                  wx:tx,wy:ty,homing:false});
                sfxShoot(tx,ty);
              }
              tr.burstLeft--; tr.burstTimer=BURST_DELAY;
            }
          } else if(--tr.fireTimer<=0){
            tr.burstLeft=TYPE1_BURST; tr.burstTimer=1;
            tr.fireTimer=80+Math.floor(Math.random()*20);
          }
        }
      }
    } // end for tr
  } // end for sp
}
function updateWorldSystems(){
  // ─ Zones EMP (timer visuel uniquement — coupure gérée dans la physique) ─
  for(const ez of EMP_ZONES) ez.t++;
  // ─ Pluie de météores ─
  if(!_mpConnected&&--meteorTimer<=0){
    meteorTimer=1400+Math.floor(Math.random()*800);
    meteorDir*=-1;
    meteorWarn=180; meteorNotif=240;
  }
  if(!_mpConnected&&meteorWarn>0){
    meteorWarn--;
    if(meteorWarn===120){ // lancer la pluie au milieu de l'avertissement
      // Direction aléatoire : angle d'entrée quelconque
      const ang=Math.random()*Math.PI*2; // côté d'où viennent les météores
      const vx0=-Math.cos(ang), vy0=-Math.sin(ang); // vitesse vers le centre
      const px=-Math.sin(ang), py=Math.cos(ang);    // axe perpendiculaire (étalement)
      for(let i=0;i<35;i++){
        const t=-MAP_HALF*0.7+i*(MAP_HALF*1.4/34);
        const spd=4.5+Math.random()*3;
        const jitter=(Math.random()-0.5)*400;
        {
          const _mr=20+Math.random()*35;
          const _mpts=7+Math.floor(Math.random()*5), _mverts=[];
          for(let _mi=0;_mi<_mpts;_mi++){
            const _ma=(_mi/_mpts)*Math.PI*2+(Math.random()-0.5)*0.38;
            const _mrr=_mr*(0.82+Math.random()*0.22);
            _mverts.push([Math.cos(_ma)*_mrr,Math.sin(_ma)*_mrr]);
          }
          meteors.push({
            x:Math.cos(ang)*MAP_HALF*1.05+px*(t+jitter),
            y:Math.sin(ang)*MAP_HALF*1.05+py*(t+jitter),
            vx:vx0*spd+px*(Math.random()-0.5)*1.5,
            vy:vy0*spd+py*(Math.random()-0.5)*1.5,
            r:_mr, verts:_mverts,
            rot:Math.random()*Math.PI*2,
            rotVel:(Math.random()-0.5)*0.018,
            life:6000,hitCooldown:0,trail:[],
            hp:rockHp(_mr),maxHp:rockHp(_mr)
          });
        }
      }
    }
  }
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    m.x+=m.vx; m.y+=m.vy; m.life--;
    // Rotation et friction (comme astéroïde)
    if(m.rot!==undefined){ m.rot+=m.rotVel; m.rotVel*=0.999; }
    m.vx*=0.999; m.vy*=0.999;
    if(m.hitCooldown>0) m.hitCooldown--;
    // Traînée : longueur proportionnelle à la vitesse (invisible si quasi-immobile)
    if(!m.trail) m.trail=[];
    const _mspd=Math.hypot(m.vx,m.vy);
    const _maxTrail=Math.floor(_mspd*6); // 0 pts à vitesse nulle, ~55 pts à v=9
    const _lt=m.trail[0];
    if(_mspd>0.4&&(!_lt||Math.hypot(m.x-_lt.x,m.y-_lt.y)>2)){
      m.trail.unshift({x:m.x,y:m.y});
      if(m.trail.length>_maxTrail) m.trail.length=_maxTrail;
    } else if(_mspd<=0.4){
      // Quasi-immobile : vider progressivement la traînée
      if(m.trail.length>0) m.trail.pop();
    }
    // Sortie de la map circulaire (l'autre côté)
    if(m.life<=0||Math.hypot(m.x,m.y)>MAP_HALF*1.3){meteors.splice(i,1);continue;}
    // Collision avec la planète
    {
      const pd=Math.hypot(m.x-PLANET.x,m.y-PLANET.y)||0.01;
      const surface=PLANET.r+m.r;
      if(pd<surface){
        const pnx=(m.x-PLANET.x)/pd, pny=(m.y-PLANET.y)/pd;
        const dot=m.vx*pnx+m.vy*pny;
        if(dot<0){ m.vx-=2*dot*pnx*0.55; m.vy-=2*dot*pny*0.55; }
        m.x=PLANET.x+pnx*(surface+1); m.y=PLANET.y+pny*(surface+1);
        addSpark(m.x,m.y,'blue');
        if(_astSfxThrottle===0){playSound('shield',0.28,m.x,m.y);_astSfxThrottle=8;}
      }
    }
    // Collision avec les astéroïdes permanents
    for(const a of nearA(m.x,m.y)){
      const ad=Math.hypot(m.x-a.wx,m.y-a.wy)||0.01;
      if(ad<m.r+a.radius*0.72){
        const anx=(m.x-a.wx)/ad, any=(m.y-a.wy)/ad;
        const relVx=m.vx-a.vx, relVy=m.vy-a.vy;
        const relV=relVx*anx+relVy*any;
        if(relV<0){ // approche — collision élastique avec rapports de masse
          const mM=m.r*m.r, aM=a.radius*a.radius, mT=mM+aM, e=0.65;
          const dvM=-(1+e)*aM/mT*relV;
          const dvA= (1+e)*mM/mT*relV;
          m.vx+=anx*dvM; m.vy+=any*dvM;
          a.vx-=anx*dvA; a.vy-=any*dvA;
          const aSpd=Math.hypot(a.vx,a.vy), aCap2=aSpeedCap(a.radius)*1.6;
          if(aSpd>aCap2){a.vx=a.vx/aSpd*aCap2;a.vy=a.vy/aSpd*aCap2;}
          // Rotation de l'astéroïde + du météore
          const tang=(-any*(m.vx-a.vx)+anx*(m.vy-a.vy));
          a.rotVel+=tang*0.0015/(a.radius*0.04+0.5);
          if(m.rotVel!==undefined) m.rotVel+=tang*0.0008/(m.r*0.04+0.5);
          // Séparation
          m.x=a.wx+anx*(m.r+a.radius*0.72+1); m.y=a.wy+any*(m.r+a.radius*0.72+1);
          addSpark(m.x,m.y,'blue');
          if(_astSfxThrottle===0){playSound('shield',0.18,m.x,m.y);_astSfxThrottle=8;}
          // Dégâts de choc
          const _maImpV=Math.abs(relV);
          if(_maImpV>1.5){
            const _maDmg=Math.floor(_maImpV/1.8);
            if(m.hp===undefined){m.hp=rockHp(m.r);m.maxHp=m.hp;}
            if(a.hp===undefined){a.hp=rockHp(a.radius);a.maxHp=a.hp;}
            m.hp-=_maDmg; a.hp-=_maDmg;
            if(a.hp<=0){
              addExplosion(a.wx,a.wy,'blue'); splitAsteroid(a);
              const _ai=ASTEROIDS.indexOf(a); if(_ai>=0){ASTEROIDS.splice(_ai,1);rebuildAGrid();}
            }
            if(m.hp<=0){
              addExplosion(m.x,m.y,'blue'); splitMeteor(m,meteors);
              meteors.splice(i,1); continue;
            }
          }
        }
      }
    }
    // Collision avec vaisseaux — déviation + dégâts selon vitesse
    const all=[...blues,...reds,...(_mpConnected||ship.dead?[]:[ship])];
    for(const s of all){
      if(s.dead||s.immuneTimer>0||m.hitCooldown>0) continue;
      const dist=Math.hypot(m.x-s.x,m.y-s.y)||0.01;
      if(dist<m.r+(s.radius||SHIP_RADIUS)){
        const nx=(s.x-m.x)/dist, ny=(s.y-m.y)/dist; // normal météore→vaisseau
        const relVx=m.vx-s.vx, relVy=m.vy-s.vy;
        const relV=relVx*nx+relVy*ny; // vitesse d'approche relative
        if(relV>0){
          // Légère déviation du météore (très massif)
          m.vx-=nx*relV*0.06; m.vy-=ny*relV*0.06;
          // Forte impulsion sur le vaisseau
          s.vx+=nx*relV*1.5; s.vy+=ny*relV*1.5;
          s.angVel+=(Math.random()-0.5)*0.14;
          m.hitCooldown=35; s.hit=14;
          addSpark(s.x,s.y,s.team); playSound('shield',0.45,s.x,s.y);
          // Dégâts basés sur la vitesse du météore
          const impact=Math.hypot(m.vx,m.vy);
          const dmg=impact>6?4:impact>4?3:2;
          let rem=dmg;
          while(rem>0){if(!takeHit(s)){s.hp-=1;}rem--;}
          if(s.hp<=0&&!s.dead){
            s.dead=true; s.respawnTimer=RESPAWN_FRAMES;
            addExplosion(s.x,s.y,s.team);
            if(!s.isMercenary) teamLives[s.team]--; dropPickup(s.x,s.y);
            playSound('explode',0.55,s.x,s.y);
            if(s===ship){
              _playerLives--;
              if(_playerLives<=0&&!_playerGameOver){_playerGameOver=true;if(_score>_highScore){_highScore=_score;localStorage.setItem(_hiKey,_highScore);}}
              addLog([{text:ship.name,col:teamCol(ship.team)},{text:' écrasé par un météore',col:'#888'}]);
            } else addLog([{text:s.name,col:teamCol(s.team)},{text:' écrasé par un météore',col:'#888'}]);
          }
        }
      }
    }
  }
  // ─ Collisions météore–météore ─
  const _mmImpPend=[];
  for(let mi=0;mi<meteors.length;mi++){
    const ma=meteors[mi];
    for(let mj=mi+1;mj<meteors.length;mj++){
      const mb=meteors[mj];
      const mcd=Math.hypot(ma.x-mb.x,ma.y-mb.y)||0.01;
      if(mcd>=ma.r+mb.r) continue;
      const mnx=(ma.x-mb.x)/mcd, mny=(ma.y-mb.y)/mcd;
      const mvRel=(ma.vx-mb.vx)*mnx+(ma.vy-mb.vy)*mny;
      if(mvRel>=0) continue;
      const mmA=ma.r*ma.r, mmB=mb.r*mb.r, mmT=mmA+mmB;
      const me=0.75;
      const mdvA=-(1+me)*mmB/mmT*mvRel;
      const mdvB= (1+me)*mmA/mmT*mvRel;
      ma.vx+=mdvA*mnx; ma.vy+=mdvA*mny;
      mb.vx+=mdvB*mnx; mb.vy+=mdvB*mny;
      // Séparation
      const mov=ma.r+mb.r-mcd+0.2;
      ma.x+=mnx*mov*mmB/mmT; ma.y+=mny*mov*mmB/mmT;
      mb.x-=mnx*mov*mmA/mmT; mb.y-=mny*mov*mmA/mmT;
      addSpark((ma.x+mb.x)*0.5,(ma.y+mb.y)*0.5,'blue');
      // Dégâts de choc météore-météore
      const _mmImpV=Math.abs(mvRel);
      if(_mmImpV>1.8){
        const _mmDmg=Math.floor(_mmImpV/2.0);
        if(ma.hp===undefined){ma.hp=rockHp(ma.r);ma.maxHp=ma.hp;}
        if(mb.hp===undefined){mb.hp=rockHp(mb.r);mb.maxHp=mb.hp;}
        ma.hp-=_mmDmg; mb.hp-=_mmDmg;
        _mmImpPend.push([mi,mj]);
      }
    }
  }
  // Destructions météore-météore
  const _mmDead=new Set();
  for(const [mia,mjb] of _mmImpPend){
    const _mma=meteors[mia], _mmb=meteors[mjb];
    if(_mma&&_mma.hp<=0&&!_mmDead.has(mia)){_mmDead.add(mia);addExplosion(_mma.x,_mma.y,'blue');splitMeteor(_mma,meteors);}
    if(_mmb&&_mmb.hp<=0&&!_mmDead.has(mjb)){_mmDead.add(mjb);addExplosion(_mmb.x,_mmb.y,'blue');splitMeteor(_mmb,meteors);}
  }
  if(_mmDead.size){const _sorted=[..._mmDead].sort((a,b)=>b-a);for(const _di of _sorted)meteors.splice(_di,1);}
  // ─ Balise de signal ─
  // Orbite autour de la planète centrale
  _beaconAngle+=BEACON_ORBIT_SPD;
  BEACON.x=PLANET.x+Math.cos(_beaconAngle)*BEACON_ORBIT_R;
  BEACON.y=PLANET.y+Math.sin(_beaconAngle)*BEACON_ORBIT_R;
  // Rotation propre du satellite
  _beaconSelfAngle+=0.004;
  // Capture station-like : contestation/possession permanente
  {
    const _bNear=[...blues,...reds,...(_mpConnected||ship.dead?[]:[ship])].filter(s=>!s.dead&&Math.hypot(s.x-BEACON.x,s.y-BEACON.y)<200);
    if(_bNear.length>0){
      const _bt=_bNear[0].team;
      const _bSame=_bNear.every(s=>s.team===_bt);
      if(_bSame){
        if(BEACON.capTeam===_bt){
          // Déjà possédé par cette équipe → stable, pas d'action
        } else {
          // Contestation ou capture neutre
          BEACON.contestTeam=_bt;
          if(_bt==='blue'&&!ship.dead&&Math.hypot(ship.x-BEACON.x,ship.y-BEACON.y)<200){
            BEACON._playerProgress=(BEACON._playerProgress||0)+0.6/_bNear.length;
          }
          BEACON.progress+=_bNear.length*0.6;
          if(BEACON.progress>=BEACON_CAP){
            BEACON.capTeam=_bt; BEACON.contestTeam=null; BEACON.progress=0;
            spawnMercenaries(_bt);
            if(!ship.dead&&_bt==='blue'){
            const _satPts=Math.hypot(ship.x-BEACON.x,ship.y-BEACON.y)<400?Math.max(80,Math.round(500*(BEACON._playerProgress||0)/BEACON_CAP)):0;
            if(_satPts>0){_score+=_satPts;_caps++;playerFeedback.push({type:'cap',life:120,maxLife:120,label:'SATELLITE CAPTURE',pts:`+${_satPts}`});}
          }
          BEACON._playerProgress=0;
            addLog([{text:_bt==='blue'?'BLEUS':'ROUGES',col:teamCol(_bt)},{text:' prennent le satellite ! 10 mercenaires deployes !',col:'#ffdd44'}]);
            playSound('respawn',0.4);
          }
        }
      } else {
        // Équipes mixtes → pas de progrès
        BEACON.progress=Math.max(0,BEACON.progress-0.8);
        if(BEACON.progress===0) BEACON.contestTeam=null;
      }
    } else {
      // Personne à proximité → léger retour vers neutre si contesté
      if(BEACON.contestTeam){
        BEACON.progress=Math.max(0,BEACON.progress-0.25);
        if(BEACON.progress===0) BEACON.contestTeam=null;
      }
    }
  }
  // ─ Épave & loot rare ─
  if(wreckLoot===null){
    if(--wreckSpawnTimer<=0){
      wreckSpawnTimer=1800+Math.floor(Math.random()*1200);
      const type=Math.random()<0.5?'shield':'speed';
      wreckLoot={x:WRECK_SPAWN.x+(Math.random()-0.5)*300,y:WRECK_SPAWN.y+(Math.random()-0.5)*300,type,life:2400,rot:0,pulse:0};
    }
  } else {
    wreckLoot.life--; wreckLoot.rot+=0.02; wreckLoot.pulse=(wreckLoot.pulse+0.06)%(Math.PI*2);
    if(wreckLoot.life<=0){wreckLoot=null;return;}
    const all=[...blues,...reds,...(_mpConnected||ship.dead?[]:[ship])];
    for(const s of all){
      if(s.dead||s.shipType===3) continue; // Type 3 : pas de loot
      if(Math.hypot(s.x-wreckLoot.x,s.y-wreckLoot.y)<SHIP_RADIUS*4){
        if(wreckLoot.type==='shield'){s.shield=Math.min((s===ship?SHIELD_MAX:s.maxShield??SHIELD_MAX),(s.shield||0)+6);s.shieldTimer=0;}
        else {s.speedBoost=900;}
        const col=wreckLoot.type==='shield'?'#44aaff':'#ffaa22';
        for(let p=0;p<16;p++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*3;particles.push({x:s.x,y:s.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:35,maxLife:35,r:2+Math.random()*2,col:wreckLoot.type==='shield'?[60,180,255]:[255,170,40]});}
        addLog([{text:s.name||'?',col:teamCol(s.team)},{text:` a récupéré le loot (${wreckLoot.type==='shield'?'bouclier':'vitesse'})`,col:col}]);
        playSound('respawn',0.45,wreckLoot.x,wreckLoot.y);
        wreckLoot=null; break;
      }
    }
  }
}

// ── Gravité planétaire ────────────────────────────────────────────────────
// Retourne true si l'objet doit être détruit (bullet dans la planète)
function applyGravity(obj, isBullet){
  const dx=PLANET.x-obj.x, dy=PLANET.y-obj.y;
  const dist=Math.hypot(dx,dy)||0.01;
  if(dist>PLANET.gravR) return false;
  const surface=PLANET.r+(isBullet?0:(obj.radius||SHIP_RADIUS));
  if(dist<=surface){
    if(isBullet) return true; // détruire la balle
    // Rebond : pousser hors de la surface + inverser composante radiale
    const nx=dx/dist, ny=dy/dist;
    const dot=obj.vx*nx+obj.vy*ny; // vitesse d'approche vers la planète
    if(dot>0){ obj.vx-=2*dot*nx*0.6; obj.vy-=2*dot*ny*0.6; }
    obj.x=PLANET.x-nx*(PLANET.r+(obj.radius||SHIP_RADIUS)+1);
    obj.y=PLANET.y-ny*(PLANET.r+(obj.radius||SHIP_RADIUS)+1);
    // ── Dégâts de collision planétaire ──
    if(!obj.dead&&obj.immuneTimer===0&&dot>1.0){
      const dmg=dot>4.0?3:dot>2.5?2:1;
      addSpark(obj.x,obj.y,obj.team||'blue');
      playSound('shield',0.3,obj.x,obj.y);
      let remaining=dmg;
      while(remaining>0){if(!takeHit(obj)){obj.hp-=1;}remaining--;}
      if(obj.hp<=0&&!obj.dead){
        obj.dead=true; obj.respawnTimer=RESPAWN_FRAMES;
        addExplosion(obj.x,obj.y,obj.team);
        if(!obj.isMercenary) teamLives[obj.team]--; dropPickup(obj.x,obj.y);
        playSound('explode',0.55,obj.x,obj.y);
        if(obj===ship){
          _playerLives--;
          if(_playerLives<=0&&!_playerGameOver){_playerGameOver=true;if(_score>_highScore){_highScore=_score;localStorage.setItem(_hiKey,_highScore);}}
          addLog([{text:ship.name,col:teamCol(ship.team)},{text:' s\'est écrasé sur la planète',col:'#888'}]);
        } else addLog([{text:obj.name,col:teamCol(obj.team)},{text:' s\'est écrasé sur la planète',col:'#888'}]);
      }
    }
    return false;
  }
  // Attraction linéaire : plus fort à courte distance
  const strength=PLANET.G*(1-dist/PLANET.gravR);
  obj.vx+=dx/dist*strength;
  obj.vy+=dy/dist*strength;
  return false;
}

// ── Update principale ─────────────────────────────────────────────────────
function update(){
  if(gameOver) return;
  _gameTick++;
  if(_streakTimer>0) _streakTimer--;
  // ── Marqueurs de rally (minimap) ─────────────────────────────────────────
  for(let _ri=_rallyMarkers.length-1;_ri>=0;_ri--){_rallyMarkers[_ri].life--;if(_rallyMarkers[_ri].life<=0)_rallyMarkers.splice(_ri,1);}
  if(_rallyNotif){_rallyNotif.life--;if(_rallyNotif.life<=0)_rallyNotif=null;}
  // ── Ticker de rally ───────────────────────────────────────────────────────
  if(--_rallyTimer<=0){
    _rallyTimer=7200+Math.floor(Math.random()*3600);
    // Choisir une équipe attaquante (les deux peuvent lancer un rally)
    const _rTeam=Math.random()<0.5?'blue':'red';
    const _rEnemyTeam=_rTeam==='blue'?'red':'blue';
    const _rFleet=_rTeam==='blue'?blues:reds;
    const _rFoes=_rTeam==='blue'?reds:blues;
    // Trouver un T3 ennemi vivant à attaquer
    const _rT3targets=_rFoes.filter(a=>!a.dead&&a.shipType===3);
    if(_rT3targets.length>0){
      const _rT3=_rT3targets[Math.floor(Math.random()*_rT3targets.length)];
      // Trier tous les alliés vivants par distance à la cible (pas de limite de rayon)
      const _rCandidates=_rFleet.filter(a=>!a.dead&&a.shipType!==3);
      _rCandidates.sort((a,b)=>Math.hypot(a.x-_rT3.x,a.y-_rT3.y)-Math.hypot(b.x-_rT3.x,b.y-_rT3.y));
      const _rAllies=_rCandidates.slice(0,RALLY_ALLY_COUNT);
      // Caller = le plus proche du T3 parmi les alliés, ou aléatoire
      const _rCaller=_rAllies.length>0?_rAllies[0]:{name:'Inconnu'};
      // Assigner la cible rally à chaque allié
      for(const _ra of _rAllies){ _ra.rallyTarget=_rT3; _ra.rallyTimer=RALLY_DURATION+Math.floor(Math.random()*200); }
      // Notification centrale + journal
      if(_rTeam==='blue'){
        _rallyNotif={type:'attack',life:300,maxLife:300,fromTeam:'blue',lines:[
          {text:'— RENFORT —',col:'#4aadff'},
          {text:_rCaller.name+' : Attaque sur',col:'#aaccff'},
          {text:'[ '+_rT3.name+' ]',col:'#ff6050'},
        ]};
        addLog([{text:_rCaller.name,col:'#4aadff'},{text:' → Renfort sur ',col:'#aaccff'},{text:'['+_rT3.name+']',col:'#ff6050'},{text:' !',col:'#aaccff'}]);
        _rallyMarkers.push({t3:_rT3,team:'red',life:RALLY_DURATION,maxLife:RALLY_DURATION,type:'attack'});
      } else {
        _rallyNotif={type:'defend',life:300,maxLife:300,fromTeam:'red',lines:[
          {text:'— ALERTE —',col:'#ff4444'},
          {text:'Ennemi attaque',col:'#ffaaaa'},
          {text:'[ '+_rT3.name+' ]',col:'#4aadff'},
        ]};
        addLog([{text:'⚠ ATTAQUE',col:'#ff4444'},{text:' sur ',col:'#ffaaaa'},{text:'['+_rT3.name+']',col:'#4aadff'},{text:' — Renfort !',col:'#ffaaaa'}]);
        _rallyMarkers.push({t3:_rT3,team:'blue',life:RALLY_DURATION,maxLife:RALLY_DURATION,type:'defend'});
      }
    }
  }
  // ── Rally défensif : T3 sous attaque massive ─────────────────────────────
  if(_defRallyCD>0) _defRallyCD--;
  if(_gameTick%180===0&&_defRallyCD===0&&_gameStarted){
    // Vérifier les deux équipes
    for(const _dTeam of ['blue','red']){
      const _dFoeTeam=_dTeam==='blue'?'red':'blue';
      const _dFleet=_dTeam==='blue'?blues:reds;
      const _dFoes=_dTeam==='blue'?reds:blues;
      const _dT3list=_dFleet.filter(a=>!a.dead&&a.shipType===3);
      for(const _dT3 of _dT3list){
        // Compter les ennemis proches de ce T3
        const _dAttackers=_dFoes.filter(e=>!e.dead&&Math.hypot(e.x-_dT3.x,e.y-_dT3.y)<900);
        if(_dAttackers.length<10) continue;
        // Pas de rally déjà actif sur ce T3
        if(_rallyMarkers.some(_m=>_m.t3===_dT3)) continue;
        // Déclencher un rally de défense d'urgence
        _defRallyCD=600; // cooldown 10s avant le prochain rally défensif
        const _dCandidates=_dFleet.filter(a=>!a.dead&&a.shipType!==3);
        _dCandidates.sort((a,b)=>Math.hypot(a.x-_dT3.x,a.y-_dT3.y)-Math.hypot(b.x-_dT3.x,b.y-_dT3.y));
        const _dAllies=_dCandidates.slice(0,RALLY_ALLY_COUNT);
        const _dCaller=_dAllies.length>0?_dAllies[0]:{name:'Inconnu'};
        for(const _da of _dAllies){ _da.rallyTarget=_dT3; _da.rallyTimer=RALLY_DURATION+Math.floor(Math.random()*200); }
        if(_dTeam==='blue'){
          // Notre T3 est attaqué → bannière d'urgence bleue
          _rallyNotif={type:'defend',life:300,maxLife:300,fromTeam:'blue',lines:[
            {text:'— DÉFENSE URGENTE —',col:'#ff9900'},
            {text:_dCaller.name+' : À la rescousse de',col:'#aaccff'},
            {text:'[ '+_dT3.name+' ]',col:'#4aadff'},
          ]};
          addLog([{text:'[!] '+_dAttackers.length+' ennemis',col:'#ff6050'},{text:' sur ',col:'#ffaaaa'},{text:'['+_dT3.name+']',col:'#4aadff'},{text:' — Défense !',col:'#ff9900'}]);
          _rallyMarkers.push({t3:_dT3,team:'blue',life:RALLY_DURATION,maxLife:RALLY_DURATION,type:'defend'});
        } else {
          // T3 ennemi attaqué par les bleus → bannière offensive
          _rallyNotif={type:'attack',life:300,maxLife:300,fromTeam:'blue',lines:[
            {text:'— OFFENSIVE ALLIÉE —',col:'#44ffaa'},
            {text:_dAttackers.length+' alliés attaquent',col:'#aaccff'},
            {text:'[ '+_dT3.name+' ]',col:'#ff6050'},
          ]};
          addLog([{text:'[>] '+_dAttackers.length+' alliés',col:'#4aadff'},{text:' attaquent ',col:'#aaccff'},{text:'['+_dT3.name+']',col:'#ff6050'}]);
          _rallyMarkers.push({t3:_dT3,team:'red',life:RALLY_DURATION,maxLife:RALLY_DURATION,type:'attack'});
        }
        break; // un seul rally défensif par cycle
      }
    }
  }
  // ── Tension musicale ─────────────────────────────────────────────────────
  // ── Soin station : ships alliés dans la zone récupèrent 1 HP / 4s ──────
  if(_gameTick%240===0&&_gameTick>0){
    for(const sp of spawns){
      if(sp.team==='neutral') continue;
      const _healR=SPAWN_RADIUS*1.6;
      const _healShips=[...(sp.team==='blue'?(_mpConnected?blues:[...blues,...(ship.dead?[]:[ship])]):reds)]
        .filter(a=>!a.dead&&a.team===sp.team&&Math.hypot(a.x-sp.x,a.y-sp.y)<_healR);
      for(const h of _healShips){
        if(h.hp<h.maxHp) h.hp=Math.min(h.maxHp,h.hp+1);
        const _hShMax=h.maxShield??SHIELD_MAX;
        if(h.shield<_hShMax){ h.shield=Math.min(_hShMax,h.shield+3); h.shieldTimer=0; }
      }
    }
  }
  if(_gameTick%60===0&&_gameStarted){
    // Mise à jour filtre nébuleuse : étouffement progressif quand le joueur est dans une nébuleuse
    if(_nebulaLPF&&_ac){
      const _inNeb=nebulaFactor(_camX,_camY)<1;
      const _targetFreq=_inNeb?520:18000;
      _nebulaLPF.frequency.setTargetAtTime(_targetFreq,_ac.currentTime,0.8); // lissage ~0.8s
    }
    const _nearEn=reds.filter(r=>!r.dead&&Math.hypot(r.x-ship.x,r.y-ship.y)<1400).length;
    const _hpRatio=ship.dead?0:ship.hp/(ship.maxHp||PLAYER_HP);
    const _lowHp=_hpRatio<0.4?0.35:0;
    const _t3Threat=blues.filter(b=>b.shipType===3&&!b.dead)
      .some(b=>reds.filter(r=>!r.dead&&Math.hypot(r.x-b.x,r.y-b.y)<800).length>=3)?0.3:0;
    const _rallyBonus=_rallyMarkers.length>0?0.2:0;
    const _targetT=Math.min(1,_nearEn/7+_lowHp+_t3Threat+_rallyBonus);
    _musicTension+=(_targetT-_musicTension)*0.12; // lissage
  }
  // Revenu de tickets supprimé (option A — pas de snowball spawn)
  const _wasShipAlive=!ship.dead;
  if(_astSfxThrottle>0) _astSfxThrottle--;

  if(!_mpConnected){ // Solo uniquement — en MP le joueur est géré via _mpMyShip
  if(ship.dead){
    if(_playerLives>0&&--ship.respawnTimer<=0){
      // Spawn joueur uniquement sur T3 bleus vivants
      const _t3live=blues.filter(a=>!a.dead&&a.shipType===3).map(a=>({x:a.x,y:a.y}));
      const _spStations=spawns.filter(s=>s.team==='blue');
      const allSpawnSrc=[..._t3live,..._spStations];
      if(allSpawnSrc.length&&teamLives.blue>0){
        const sp=allSpawnSrc[Math.floor(Math.random()*allSpawnSrc.length)];
        ship.x=sp.x+(Math.random()-0.5)*120; ship.y=sp.y+(Math.random()-0.5)*120;
        ship.vx=ship.vy=ship.angVel=0;
        // Appliquer les stats du type choisi
        ship.shipType=playerShipType;
        const _isT3p=playerShipType===3;
        ship.maxHp  =_isT3p?TYPE3_HP:(playerShipType===2?TYPE2_HP:PLAYER_HP);
        ship.hp     =ship.maxHp;
        ship.maxShield=_isT3p?TYPE3_SHIELD:(playerShipType===2?TYPE2_SHIELD:SHIELD_MAX);
        ship.shield =ship.maxShield;
        ship.radius =_isT3p?TYPE3_RADIUS:SHIP_RADIUS;
        ship.speedMult  =playerShipType===2?TYPE2_SPEED :_isT3p?TYPE3_SPDDMLT:1;
        ship.thrustMult =playerShipType===2?TYPE2_THRUST:_isT3p?TYPE3_THRST   :1;
        ship.angMult    =playerShipType===2?TYPE2_ANG   :_isT3p?TYPE3_ANGMLT  :1;
        ship.burstSz    =playerShipType===1?TYPE1_BURST :BURST_SIZE;
        ship.shieldTimer=0; ship.shieldHit=0; ship.immuneTimer=SPAWN_IMMUNE;
        ship.burstLeft=0; ship.fireTimer=0; ship.dead=false; playSound('respawn',0.5);
      }
    }
  } else {
    const pNear=nearA(ship.x,ship.y);
    applyPhysics(ship,keys.left,keys.right);
    applyGravity(ship,false);
    asteroidBounce(ship,pNear); wallBounce(ship);
    tickShield(ship);
    if(ship.hit>0) ship.hit--;

    // Tir automatique joueur : parmi les ennemis à portée, choisir le mieux aligné
    let pTgt=null, pTDist=Infinity, pBestAfd=Infinity;
    // Vaisseaux ennemis
    for(const e of reds){
      if(e.dead) continue;
      const d=Math.hypot(e.x-ship.x,e.y-ship.y);
      if(d>=FIRE_RANGE) continue;
      const t2=Math.min(d/BULLET_SPEED,45);
