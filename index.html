      let fd=Math.atan2(e.y+e.vy*t2-ship.y,e.x+e.vx*t2-ship.x)-ship.angle;
      while(fd>Math.PI)fd-=Math.PI*2; while(fd<-Math.PI)fd+=Math.PI*2;
      const afd=Math.abs(fd);
      if(pTgt===null||afd<pBestAfd||(afd<0.30&&d<pTDist)){
        pTgt=e; pTDist=d; pBestAfd=afd;
      }
    }
    // Tourelles ennemies (stations rouges avec tourelles vivantes)
    for(const sp of spawns){
      if(sp.team!=='red'||!sp.turrets.some(t=>t.hp>0)) continue;
      const d=Math.hypot(sp.x-ship.x,sp.y-ship.y);
      if(d>=FIRE_RANGE) continue;
      let fd=Math.atan2(sp.y-ship.y,sp.x-ship.x)-ship.angle;
      while(fd>Math.PI)fd-=Math.PI*2; while(fd<-Math.PI)fd+=Math.PI*2;
      const afd=Math.abs(fd);
      if(pTgt===null||afd<pBestAfd||(afd<0.30&&d<pTDist)){
        pTgt=sp; pTDist=d; pBestAfd=afd;
      }
    }
    if(ship.burstLeft>0){
      if(--ship.burstTimer<=0){
        if(ship.shipType===3){
          // Cuirassé joueur : 4 lasers latéraux
          if(ship.burstTarget&&!ship.burstTarget.dead&&lasers.length<MAX_LASERS){
            lasers.push({shooter:ship,target:ship.burstTarget,team:'blue',
              life:TYPE3_LASER_LIFE,maxLife:TYPE3_LASER_LIFE,dmgTimer:0,owner:'player'});
            playSound('shoot',0.3);
          }
        } else {
          if(bullets.length<MAX_BULLETS){
            const _pbspd=(ship.shipType===2)?TYPE2_BULLET_SPD:BULLET_SPEED;
            const _pbhome=(ship.shipType===2);
            bullets.push({x:ship.x,y:ship.y,vx:Math.cos(ship.angle)*_pbspd+ship.vx*0.25,vy:Math.sin(ship.angle)*_pbspd+ship.vy*0.25,team:'blue',life:BULLET_LIFE,target:ship.burstTarget,owner:'player',shooter:ship,homing:_pbhome});
            playSound('shoot',0.3);
          }
        }
        ship.burstLeft--; ship.burstTimer=BURST_DELAY;
      }
    } else if(pTgt){
      // Type 3 joueur : ne peut pas tirer devant lui
      if(ship.shipType===3){
        const _ptDist=Math.hypot(pTgt.x-ship.x,pTgt.y-ship.y);
        const _t2p=Math.min(_ptDist/BULLET_SPEED,45);
        let _pfd=Math.atan2(pTgt.y+pTgt.vy*_t2p-ship.y,pTgt.x+pTgt.vx*_t2p-ship.x)-ship.angle;
        while(_pfd>Math.PI)_pfd-=Math.PI*2; while(_pfd<-Math.PI)_pfd+=Math.PI*2;
        if(Math.abs(_pfd)<=TYPE3_FWDBLK) pTgt=null; // cible dans l'arc avant → pas de tir
      }
      if(pTgt){
        ship.fireTimer--;
        const t2=Math.min(pTDist/BULLET_SPEED,45);
        let fd=Math.atan2(pTgt.y+pTgt.vy*t2-ship.y,pTgt.x+pTgt.vx*t2-ship.x)-ship.angle;
        while(fd>Math.PI)fd-=Math.PI*2; while(fd<-Math.PI)fd+=Math.PI*2;
        const _pcd=ship.shipType===3?TYPE3_CD:Math.max(8,BURST_CD-(BURST_CD+35));
        if(ship.fireTimer<=0&&Math.abs(fd)<(ship.shipType===3?Math.PI:0.30)){
          ship.burstLeft=ship.burstSz||BURST_SIZE; ship.burstTimer=1; ship.fireTimer=_pcd+Math.floor(Math.random()*12);
          ship.burstTarget=pTgt;
        }
      }
    }
  }
  } // fin !_mpConnected

  updateAsteroids();
  for(const ai of blues){
    if(ai._netPid!==undefined){
      if(ai.dead){ mpNetRespawn(ai,'blue'); }
      else {
        const _isOwnShip=(_mpIsHost&&ai._netSlot===_mpMySlot&&ai._netTeam===_mpMyTeam);
        if(_isOwnShip){
          // Vaisseau propre de l'hôte : physique normale depuis les touches
          updateNetPlayer(ai,_mpNetKeys.get('blue_'+ai._netSlot));
        } else {
          // Joueur distant : position CLIENT autoritaire
          const _np=_mpNetPos.get('blue_'+ai._netSlot);
          if(_np&&_np._fresh){
            _np._fresh=false;
            ai.x=_np.x; ai.y=_np.y;
            ai.vx=_np.vx; ai.vy=_np.vy; ai.angle=_np.angle; ai.angVel=_np.angVel||0;
          }
          ai.x+=ai.vx; ai.y+=ai.vy;
          ai.angle+=ai.angVel; ai.angVel*=DAMPING_ANG;
          ai.vx*=DAMPING_LIN; ai.vy*=DAMPING_LIN;
          updateNetPlayer(ai,null,true,true);
        }
      }
    } else updateAI(ai,reds);
    applyGravity(ai,false); wallBounce(ai);
  }
  for(const ai of reds){
    if(ai._netPid!==undefined){
      if(ai.dead){ mpNetRespawn(ai,'red'); }
      else {
        const _isOwnShip=(_mpIsHost&&ai._netSlot===_mpMySlot&&ai._netTeam===_mpMyTeam);
        if(_isOwnShip){
          updateNetPlayer(ai,_mpNetKeys.get('red_'+ai._netSlot));
        } else {
          const _np=_mpNetPos.get('red_'+ai._netSlot);
          if(_np&&_np._fresh){
            _np._fresh=false;
            ai.x=_np.x; ai.y=_np.y;
            ai.vx=_np.vx; ai.vy=_np.vy; ai.angle=_np.angle; ai.angVel=_np.angVel||0;
          }
          ai.x+=ai.vx; ai.y+=ai.vy;
          ai.angle+=ai.angVel; ai.angVel*=DAMPING_ANG;
          ai.vx*=DAMPING_LIN; ai.vy*=DAMPING_LIN;
          updateNetPlayer(ai,null,true,true);
        }
      }
    } else updateAI(ai,_mpConnected?blues:[...blues,ship]);
    applyGravity(ai,false); wallBounce(ai);
  }
  updateCaptures();
  updateSpawnTurrets();
  updateWorldSystems();
  processPendingHits(); // Hitscan : appliquer les dégâts différés

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0){bullets.splice(i,1);continue;}
    if(applyGravity(b,true)){addSpark(b.x,b.y,b.team);bullets.splice(i,1);continue;}
    // Guidage missile / magnétique type 2
    if(b.homing){
      // Aimantation : trouver la cible la plus proche si la cible courante est morte
      let _htgt=b.target&&!b.target.dead?b.target:null;
      if(!_htgt){
        const _pool=b.team==='blue'?reds:(_mpConnected?blues:[...blues,ship]);
        let _hd=Infinity;
        for(const _he of _pool){
          if(_he.dead) continue;
          const _d2=Math.hypot(_he.x-b.x,_he.y-b.y);
          if(_d2<_hd&&_d2<FIRE_RANGE*1.5){_hd=_d2;_htgt=_he;}
        }
        if(_htgt) b.target=_htgt;
      }
      if(_htgt){
        let da2=Math.atan2(_htgt.y-b.y,_htgt.x-b.x)-Math.atan2(b.vy,b.vx);
        while(da2>Math.PI)da2-=Math.PI*2; while(da2<-Math.PI)da2+=Math.PI*2;
        const turn2=Math.max(-TYPE2_HOME,Math.min(TYPE2_HOME,da2));
        const spd2=Math.hypot(b.vx,b.vy);
        const na2=Math.atan2(b.vy,b.vx)+turn2;
        b.vx=Math.cos(na2)*spd2; b.vy=Math.sin(na2)*spd2;
      }
    } else if(b.target&&!b.target.dead){
      let da=Math.atan2(b.target.y-b.y,b.target.x-b.x)-Math.atan2(b.vy,b.vx);
      while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
      const turn=Math.max(-0.07,Math.min(0.07,da));
      const spd=Math.hypot(b.vx,b.vy);
      const na=Math.atan2(b.vy,b.vx)+turn;
      b.vx=Math.cos(na)*spd; b.vy=Math.sin(na)*spd;
    }

    const tgts=b.team==='blue'?reds:blues;
    let hit=false;
    if(b.cosmetic){/* missile cosmétique — pas de collision */}
    else
    for(const e of tgts){
      if(e.dead) continue;
      // HOST est autoritaire pour tous les dégâts (y compris les joueurs distants)
      // CLIENT : ne vérifier que son propre vaisseau (les autres se gèrent eux-mêmes)
      if(_mpConnected&&!_mpIsHost&&e!==_mpMyShip) continue;
      const _eHR=(e.radius||SHIP_RADIUS)*(b.owner==='player'?1.4:1.1); if(Math.hypot(b.x-e.x,b.y-e.y)<_eHR){
        addSpark(b.x,b.y,b.team);
        if(b.zeroDmg){ hit=true; break; } // balle 0 dégâts du bot test
        const wasPlayer=b.owner==='player';
        if(!takeHit(e)){
          e.hp--; e.hit=10;
          if(e.hp<=0){
            e.dead=true;e.respawnTimer=RESPAWN_FRAMES;addExplosion(e.x,e.y,e.team);if(!e.isMercenary)teamLives[e.team]--;dropPickup(e.x,e.y);playSound('explode',0.55,e.x,e.y);
            if(_mpConnected) mpLog(`DEATH ${e.name} tué par balle ${b.team}`);
            if(wasPlayer){ calcKillScore(e); _dmgDealt+=e.maxHp; }
            else if(b.shooter&&!b.shooter.isMercenary){ b.shooter.kills++; b.shooter.dmgDealt+=e.maxHp; }
            const sn=b.shooter?.name||'?';
            addLog([{text:sn,col:teamCol(b.team)},{text:' ✕ ',col:'#888'},{text:e.name,col:teamCol(e.team)}]);
          } else if(wasPlayer){
            _score+=8; _dmgDealt+=1;
            playerFeedback.push({type:'hit',life:40,maxLife:40});
            playerFeedback.push({type:'hitmarker',life:10,maxLife:10});
          }
        } else if(wasPlayer){
          playerFeedback.push({type:'hit',life:50,maxLife:50});
          playerFeedback.push({type:'hitmarker',life:10,maxLife:10});
        }
        hit=true; break;
      }
    }
    if(hit){bullets.splice(i,1);continue;}

    // Bullets rouges vs joueur (solo uniquement — en MP le joueur est dans blues[]/reds[])
    if(!_mpConnected&&b.team==='red'&&!ship.dead&&Math.hypot(b.x-ship.x,b.y-ship.y)<(ship.radius||SHIP_RADIUS)*0.9){
      addSpark(b.x,b.y,'red');
      if(b.zeroDmg){ bullets.splice(i,1); continue; } // balle 0 dégâts du bot test
      if(!takeHit(ship)){
        ship.hp--; ship.hit=10;
        if(ship.hp<=0){ship.dead=true;ship.respawnTimer=RESPAWN_FRAMES;addExplosion(ship.x,ship.y,'blue');teamLives.blue--;_playerLives--;dropPickup(ship.x,ship.y);playSound('explode',0.7);
          if(_playerLives<=0&&!_playerGameOver){_playerGameOver=true;if(_score>_highScore){_highScore=_score;localStorage.setItem(_hiKey,_highScore);}}
          addLog([{text:b.shooter?.name||'?',col:teamCol('red')},{text:' ✕ ',col:'#888'},{text:ship.name,col:teamCol(ship.team)}]);}
      }
      bullets.splice(i,1); continue;
    }

    // Bullets vs tourelles de stations
    let turretHit=false;
    for(const sp of spawns){
      if(sp.team==='neutral'||sp.team===b.team) continue;
      for(const tr of sp.turrets){
        if(tr.hp<=0) continue;
        const _tox=sp.x+Math.cos(tr.offsetAngle)*(tr.offsetRadius||0);
        const _toy=sp.y+Math.sin(tr.offsetAngle)*(tr.offsetRadius||0);
        if(Math.hypot(b.x-_tox,b.y-_toy)<22){
          tr.hp--;
          addSpark(b.x,b.y,b.team);
          if(tr.hp<=0){tr.respawnTimer=1800;addLog([{text:'TOURELLE',col:teamCol(sp.team)},{text:' détruite',col:'#888'}]);}
          bullets.splice(i,1); turretHit=true; break;
        }
      }
      if(turretHit) break;
    }
    if(turretHit) continue;

    let astHit=false;
    for(const a of nearA(b.x,b.y)){
      if(Math.hypot(b.x-a.wx,b.y-a.wy)<a.radius*0.72){
        addSpark(b.x,b.y,b.team);
        // Poussée de l'astéroïde par le tir
        const push=0.9/(a.radius*0.03+0.4);
        a.vx+=b.vx*push; a.vy+=b.vy*push;
        const aSpd=Math.hypot(a.vx,a.vy), aBCap=aSpeedCap(a.radius);
        if(aSpd>aBCap){a.vx=a.vx/aSpd*aBCap;a.vy=a.vy/aSpd*aBCap;}
        const idx=b.x-a.wx, idy=b.y-a.wy, id=Math.hypot(idx,idy)||1;
        a.rotVel+=(idx/id*b.vy-idy/id*b.vx)*0.0025/(a.radius*0.04+0.5);
        const maxRot=0.12; if(Math.abs(a.rotVel)>maxRot) a.rotVel=Math.sign(a.rotVel)*maxRot;
        // Dégâts HP
        if(a.hp===undefined){a.hp=rockHp(a.radius);a.maxHp=a.hp;}
        a.hp--;
        if(a.hp<=0){
          addExplosion(a.wx,a.wy,'blue');
          splitAsteroid(a);
          ASTEROIDS.splice(ASTEROIDS.indexOf(a),1);
          rebuildAGrid();
        }
        astHit=true;break;
      }
    }
    if(astHit){bullets.splice(i,1);continue;}
    // Météores — les balles les dévient mais ne les détruisent pas
    let metHit=false;
    for(let _mi=meteors.length-1;_mi>=0;_mi--){
      const m=meteors[_mi];
      if(Math.hypot(b.x-m.x,b.y-m.y)<m.r){
        addSpark(b.x,b.y,b.team);
        const bd=Math.hypot(b.x-m.x,b.y-m.y)||0.01;
        const bnx=(m.x-b.x)/bd, bny=(m.y-b.y)/bd;
        m.vx+=bnx*0.25; m.vy+=bny*0.25;
        m.rotVel+=(bnx*b.vy-bny*b.vx)*0.003/(m.r*0.04+0.5);
        if(m.hp===undefined){m.hp=rockHp(m.r);m.maxHp=m.hp;}
        m.hp--;
        if(m.hp<=0){
          addExplosion(m.x,m.y,'blue');
          splitMeteor(m,meteors);
          meteors.splice(_mi,1);
        }
        metHit=true; break;
      }
    }
    if(metHit){bullets.splice(i,1);continue;}
  }

  // ── Lasers type 3 ────────────────────────────────────────────────────────
  for(let _li=lasers.length-1;_li>=0;_li--){
    const _lz=lasers[_li];
    _lz.life--;
    if(_lz.life<=0||_lz.shooter.dead){lasers.splice(_li,1);continue;}
    const _lfw=Math.cos(_lz.shooter.angle),_lfu=Math.sin(_lz.shooter.angle);
    const _llx=-_lfu,_lly=_lfw;
    const _lsh=_lz.shooter;
    // 1 canon par laser (côté gauche ou droit)
    const _lsign=(_lz.side==='right')?-1:1; // défaut gauche si side absent
    const _lc0=_lz._station
      ?{x:_lsh.x,y:_lsh.y}  // tourelle centrale : canon au centre
      :{x:_lsh.x+_llx*_lsign*26,y:_lsh.y+_lly*_lsign*26};
    const _lcpos=[_lc0];
    _lz.cannons=_lcpos;
    // Déterminer direction de chaque canon (vers la cible si vivante)
    const _ltgt=_lz.target&&!_lz.target.dead?_lz.target:null;
    // Dégâts périodiques
    if(++_lz.dmgTimer>=TYPE3_LASER_DMG_CD){
      _lz.dmgTimer=0;
      if(_ltgt){
        const _lrange=FIRE_RANGE*1.35;
        const _lfoes=_lz.team==='blue'?reds:(_mpConnected||ship.dead?blues:[...blues,ship]);
        for(const _lc of _lcpos){
          const _lang=Math.atan2(_ltgt.y-_lc.y,_ltgt.x-_lc.x);
          // Vérifier arc avant bloqué
          let _lfd=_lang-_lz.shooter.angle;
          while(_lfd>Math.PI)_lfd-=Math.PI*2;while(_lfd<-Math.PI)_lfd+=Math.PI*2;
          if(Math.abs(_lfd)<=TYPE3_FWDBLK&&!_lz._station) continue;
          const _ldx=Math.cos(_lang),_ldy=Math.sin(_lang);
          for(const _le of _lfoes){
            if(_le.dead) continue;
            const _lex=_le.x-_lc.x,_ley=_le.y-_lc.y;
            const _lproj=Math.max(0,Math.min(_lrange,_lex*_ldx+_ley*_ldy));
            const _lcx=_lc.x+_ldx*_lproj,_lcy=_lc.y+_ldy*_lproj;
            if(Math.hypot(_le.x-_lcx,_le.y-_lcy)<(_le.radius||SHIP_RADIUS)+6){
              addSpark(_le.x,_le.y,_lz.team);
              const _lwp=_lz.owner==='player';
              if(!takeHit(_le)){
                _le.hp--; _le.hit=10;
                if(_le.hp<=0){
                  _le.dead=true;_le.respawnTimer=RESPAWN_FRAMES;
                  addExplosion(_le.x,_le.y,_le.team);if(!_le.isMercenary)teamLives[_le.team]--;
                  dropPickup(_le.x,_le.y);playSound('explode',0.55,_le.x,_le.y);
                  if(_lwp){calcKillScore(_le);_dmgDealt+=_le.maxHp;}
                  else if(_lsh&&!_lsh.isMercenary&&!_lsh._station){_lsh.kills++;_lsh.dmgDealt+=_le.maxHp;}
                  addLog([{text:_lsh.name||'?',col:teamCol(_lz.team)},{text:' ✕ ',col:'#888'},{text:_le.name||'?',col:teamCol(_le.team)}]);
                } else if(_lwp){_score+=8;_dmgDealt+=1;playerFeedback.push({type:'hit',life:40,maxLife:40});playerFeedback.push({type:'hitmarker',life:10,maxLife:10});}
              } else if(_lwp){playerFeedback.push({type:'hit',life:50,maxLife:50});}
            }
          }
          // Laser vs joueur (solo uniquement — en MP le joueur est dans blues[]/reds[])
          if(!_mpConnected&&_lz.team==='red'&&!ship.dead){
            const _spex=ship.x-_lc.x,_spey=ship.y-_lc.y;
            const _sproj=Math.max(0,Math.min(_lrange,_spex*_ldx+_spey*_ldy));
            const _spcx=_lc.x+_ldx*_sproj,_spcy=_lc.y+_ldy*_sproj;
            if(Math.hypot(ship.x-_spcx,ship.y-_spcy)<(ship.radius||SHIP_RADIUS)+6){
              addSpark(ship.x,ship.y,'red');
              if(!takeHit(ship)){
                ship.hp--;ship.hit=10;
                if(ship.hp<=0){
                  ship.dead=true;ship.respawnTimer=RESPAWN_FRAMES;
                  addExplosion(ship.x,ship.y,'blue');teamLives.blue--;_playerLives--;
                  dropPickup(ship.x,ship.y);playSound('explode',0.7);
                  if(_playerLives<=0&&!_playerGameOver){_playerGameOver=true;if(_score>_highScore){_highScore=_score;localStorage.setItem(_hiKey,_highScore);}}
                  addLog([{text:_lsh.name||'?',col:teamCol('red')},{text:' ✕ ',col:'#888'},{text:ship.name,col:teamCol(ship.team)}]);
                }
              }
            }
          }
        }
      }
    }
  }

  // Pickups (cubes de soin)
  for(let i=pickups.length-1;i>=0;i--){
    const pk=pickups[i];
    pk.rot+=0.04; pk.life--;
    if(pk.life<=0){pickups.splice(i,1);continue;}
    // Collecte par n'importe quel vaisseau vivant
    const collectors=[...blues,...reds,...(ship.dead?[]:[ship])];
    let taken=false;
    for(const s of collectors){
      if(s.dead) continue;
      if(s.shipType===3) continue; // Type 3 : pas de soin par pickup
      if(Math.hypot(s.x-pk.x,s.y-pk.y)<(s.radius||SHIP_RADIUS)*5){
        const maxHp=s.maxHp??(s===ship?PLAYER_HP:AI_HP);
        if(s.hp<maxHp||s.shield<(s.maxShield??SHIELD_MAX)){
          s.hp=Math.min(maxHp,s.hp+Math.max(1,Math.round(maxHp*0.25)));
          if(s.shield<(s.maxShield??SHIELD_MAX)){s.shield=Math.min((s.maxShield??SHIELD_MAX),s.shield+1);s.shieldTimer=0;}
          addPickupEffect(pk.x,pk.y);
          pickups.splice(i,1); taken=true; break;
        }
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.ring){p.r+=(p.maxR-4)/p.maxLife*1.8;}else{p.x+=p.vx;p.y+=p.vy;p.vx*=0.93;p.vy*=0.93;}
    p.life--; if(p.life<=0) particles.splice(i,1);
  }
  for(let i=playerFeedback.length-1;i>=0;i--){playerFeedback[i].life--;if(playerFeedback[i].life<=0)playerFeedback.splice(i,1);}
  for(let i=gameLog.length-1;i>=0;i--){gameLog[i].life--;if(gameLog[i].life<=0)gameLog.splice(i,1);}

  // Détection mort du joueur → effet dramatique
  if(_wasShipAlive&&ship.dead) _deathFxTimer=75;
  if(_deathFxTimer>0) _deathFxTimer--;

  const sB=spawns.filter(s=>s.team==='blue').length;
  const sR=spawns.filter(s=>s.team==='red').length;
  // Partie terminée : solo = tous morts, MP = tickets épuisés + aucun survivant
  if(!gameOver){
    const redAliveAny=reds.some(a=>!a.dead&&!a.isMercenary);
    const blueAliveAny=blues.some(a=>!a.dead&&!a.isMercenary)||(!_mpConnected&&!ship.dead);
    if(_mpConnected&&_mpIsHost){
      // MP : seulement si les tickets sont aussi à zéro (pas de faux positif mid-battle)
      if(teamLives.red<=0&&!redAliveAny) gameOver='blue';
      if(teamLives.blue<=0&&!blueAliveAny) gameOver='red';
    } else if(!_mpConnected){
      if(!redAliveAny) gameOver='blue';
      if(!blueAliveAny) gameOver='red';
    }
  }
}

// ── Rendu ─────────────────────────────────────────────────────────────────
function drawPlanet(){
  const cx=canvas.width/2, cy=canvas.height/2;
  const sx=PLANET.x-_camX+cx, sy=PLANET.y-_camY+cy;
  const R=PLANET.r, GR=PLANET.gravR;
  // Champ gravitationnel (cercles concentriques en pointillés)
  ctx.save();
  ctx.setLineDash([14,12]);
  for(let i=1;i<=4;i++){
    const fr=GR*(i/4.5);
    const alpha=0.07*(1-i/5);
    ctx.beginPath(); ctx.arc(sx,sy,fr,0,Math.PI*2);
    ctx.strokeStyle=`rgba(140,100,255,${alpha})`; ctx.lineWidth=1; ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
  // Lueur atmosphérique externe
  const atmo=ctx.createRadialGradient(sx,sy,R*0.88,sx,sy,R*1.6);
  atmo.addColorStop(0,'rgba(80,140,255,0.22)');
  atmo.addColorStop(0.5,'rgba(60,90,200,0.08)');
  atmo.addColorStop(1,'rgba(40,60,160,0)');
  ctx.beginPath(); ctx.arc(sx,sy,R*1.6,0,Math.PI*2);
  ctx.fillStyle=atmo; ctx.fill();
  // Anneau (partie arrière, derrière la planète)
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.ellipse(sx,sy,R*2.05,R*0.38,0.18,Math.PI,Math.PI*2);
  const rg1=ctx.createLinearGradient(sx-R*2.05,sy,sx+R*2.05,sy);
  rg1.addColorStop(0,'rgba(200,180,120,0)');
  rg1.addColorStop(0.2,'rgba(200,175,110,0.8)');
  rg1.addColorStop(0.5,'rgba(180,160,100,0.5)');
  rg1.addColorStop(0.8,'rgba(200,175,110,0.8)');
  rg1.addColorStop(1,'rgba(200,180,120,0)');
  ctx.strokeStyle=rg1; ctx.lineWidth=14; ctx.stroke();
  ctx.restore();
  // Corps de la planète
  const grad=ctx.createRadialGradient(sx-R*0.3,sy-R*0.3,R*0.04,sx,sy,R);
  grad.addColorStop(0,'#4a82d8');
  grad.addColorStop(0.28,'#2a5888');
  grad.addColorStop(0.62,'#1a3860');
  grad.addColorStop(1,'#08182e');
  ctx.beginPath(); ctx.arc(sx,sy,R,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();
  // Continents (clippés dans le cercle planète)
  ctx.save();
  ctx.beginPath(); ctx.arc(sx,sy,R,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='rgba(55,125,70,0.58)';
  for(const [ox,oy,rx,ry,rot] of [
    [-R*0.18,-R*0.28,R*0.38,R*0.24,0.35],
    [ R*0.38, R*0.08,R*0.30,R*0.20,-0.18],
    [-R*0.08, R*0.38,R*0.24,R*0.15,0.85],
    [ R*0.12,-R*0.52,R*0.20,R*0.13,0.10],
    [-R*0.50, R*0.10,R*0.18,R*0.28,1.10],
  ]){
    ctx.beginPath(); ctx.ellipse(sx+ox,sy+oy,rx,ry,rot,0,Math.PI*2); ctx.fill();
  }
  // Calottes polaires
  ctx.fillStyle='rgba(215,235,255,0.38)';
  ctx.beginPath(); ctx.ellipse(sx,sy-R*0.75,R*0.40,R*0.20,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx,sy+R*0.80,R*0.30,R*0.14,0,0,Math.PI*2); ctx.fill();
  // Nuages
  ctx.fillStyle='rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.ellipse(sx-R*0.20,sy-R*0.05,R*0.55,R*0.09,0.22,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx+R*0.15,sy+R*0.25,R*0.40,R*0.07,-0.15,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Reflet spéculaire
  const spec=ctx.createRadialGradient(sx-R*0.38,sy-R*0.40,0,sx-R*0.38,sy-R*0.40,R*0.60);
  spec.addColorStop(0,'rgba(255,255,255,0.18)'); spec.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(sx,sy,R,0,Math.PI*2); ctx.fillStyle=spec; ctx.fill();
  // Anneau (partie avant, devant la planète)
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.beginPath(); ctx.ellipse(sx,sy,R*2.05,R*0.38,0.18,0,Math.PI);
  ctx.strokeStyle=rg1; ctx.lineWidth=14; ctx.stroke();
  ctx.restore();
  // Bordure planète
  ctx.beginPath(); ctx.arc(sx,sy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(80,150,240,0.35)'; ctx.lineWidth=2.5; ctx.stroke();
}

function drawMPRoster(){
  if(!_mpConnected||_mpPlayers.size===0) return;
  const W=canvas.width, H=canvas.height;
  ctx.save();
  const ROW=16, PAD=6, COL_W=110, GAP=6;
  // Separer bleus et rouges
  const _blues=[..._mpPlayers.values()].filter(p=>p.team==='blue');
  const _reds=[..._mpPlayers.values()].filter(p=>p.team==='red');
  const maxRows=Math.max(_blues.length,_reds.length);
  if(maxRows===0){ctx.restore();return;}
  const panelW=COL_W*2+GAP+PAD*2;
  const panelH=PAD*2+14+maxRows*ROW+2;
  const px=10, py=10;
  // Fond
  ctx.fillStyle='rgba(4,8,24,0.72)';
  ctx.beginPath(); ctx.roundRect(px,py,panelW,panelH,6); ctx.fill();
  ctx.strokeStyle='rgba(100,120,200,0.22)'; ctx.lineWidth=1;
  ctx.stroke();
  // En-tetes equipes
  ctx.font='bold 8px monospace'; ctx.textAlign='left';
  ctx.fillStyle='rgba(70,160,255,0.8)';
  ctx.fillText('BLEUS',px+PAD, py+PAD+8);
  ctx.fillStyle='rgba(255,90,60,0.8)';
  ctx.fillText('ROUGES',px+PAD+COL_W+GAP, py+PAD+8);
  // Separateur
  ctx.strokeStyle='rgba(120,130,180,0.18)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(px+PAD,py+PAD+12); ctx.lineTo(px+panelW-PAD,py+PAD+12); ctx.stroke();
  // Dessiner chaque colonne
  const drawCol=(_list,colX)=>{
    for(let i=0;i<_list.length;i++){
      const p=_list[i];
      const fl=p.team==='blue'?blues:reds;
      const ai=fl[p.slot];
      const alive=ai&&!ai.dead;
      const isSelf=(p.team===_mpMyTeam&&p.slot===_mpMySlot);
      const ry=py+PAD+14+i*ROW+ROW*0.75;
      // Point de vie color
      const dotCol=alive?(p.team==='blue'?'#4aadff':'#ff5a3a'):'rgba(120,120,120,0.5)';
      ctx.beginPath(); ctx.arc(colX+5,ry-4,3.5,0,Math.PI*2);
      ctx.fillStyle=dotCol; ctx.fill();
      // Nom
      ctx.font=isSelf?'bold 9px monospace':'9px monospace';
      ctx.textAlign='left';
      ctx.fillStyle=alive?(isSelf?'#ffffff':(p.team==='blue'?'rgba(130,190,255,0.9)':'rgba(255,140,110,0.9)')):'rgba(100,100,100,0.55)';
      ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=3;
      const _nm=p.name.slice(0,10)+(p.name.length>10?'…':'');
      ctx.fillText(_nm, colX+13, ry);
      ctx.shadowBlur=0;
      // Barre HP
      if(ai){
        const hpPct=Math.max(0,ai.hp/ai.maxHp);
        const barW=COL_W-20, barH=2;
        const barX=colX+13, barY=ry+2;
        ctx.fillStyle='rgba(255,255,255,0.1)';
        ctx.fillRect(barX,barY,barW,barH);
        const hpCol=hpPct>0.5?'rgba(60,220,100,0.7)':hpPct>0.25?'rgba(255,180,40,0.7)':'rgba(255,60,40,0.7)';
        ctx.fillStyle=hpCol;
        ctx.fillRect(barX,barY,barW*hpPct,barH);
      }
    }
  };
  drawCol(_blues, px+PAD);
  drawCol(_reds,  px+PAD+COL_W+GAP);
  ctx.restore();
}

function drawMPNames(){
  if(!_mpConnected) return;
  const cx=canvas.width/2, cy=canvas.height/2;
  ctx.save();
  ctx.textAlign='center'; ctx.font='bold 11px monospace';
  const _nameCol='#ffe033';
  const _nameColSelf='#ffffff'; // joueur local en blanc pour se reperer
  // Tous les joueurs enregistres (clients + host s'il est dans _mpPlayers)
  for(const [,p] of _mpPlayers){
    const fl=p.team==='blue'?blues:reds;
    const ai=fl[p.slot];
    if(!ai||ai.dead) continue;
    const sx=ai.x-_camX+cx, sy=ai.y-_camY+cy;
    if(sx<-60||sx>canvas.width+60||sy<-60||sy>canvas.height+60) continue;
    const isSelf=(p.team===_mpMyTeam&&p.slot===_mpMySlot);
    const col=isSelf?_nameColSelf:_nameCol;
    const tw=ctx.measureText(p.name).width;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(sx-tw/2-4,sy-36-13,tw+8,15);
    ctx.fillStyle=col;
    ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=4;
    ctx.fillText(p.name,sx,sy-36);
    ctx.shadowBlur=0;
  }
  // Ship de l'host visible par les non-hosts (si pas encore dans _mpPlayers)
  if(_mpHostShipObj&&!_mpHostShipObj.dead&&!_mpIsHost){
    const _hInPlayers=[..._mpPlayers.values()].some(p=>p.team===_mpHostShipObj.team&&blues[p.slot]===_mpHostShipObj||reds[p.slot]===_mpHostShipObj);
    if(!_hInPlayers){
      const sx=_mpHostShipObj.x-_camX+cx, sy=_mpHostShipObj.y-_camY+cy;
      if(sx>-60&&sx<canvas.width+60&&sy>-60&&sy<canvas.height+60){
        const tw=ctx.measureText(_mpHostShipObj.name).width;
        ctx.fillStyle='rgba(0,0,0,0.6)';
        ctx.fillRect(sx-tw/2-4,sy-36-13,tw+8,15);
        ctx.fillStyle=_nameCol;
        ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=4;
        ctx.fillText(_mpHostShipObj.name,sx,sy-36);
        ctx.shadowBlur=0;
      }
    }
  }
  ctx.restore();
}

function drawNebulae(){
  const cx=canvas.width/2, cy=canvas.height/2;
  // ── Version mobile : 1 gradient par nébuleuse, pas d'animation ──────────
  if(isMobile){
    for(const n of NEBULAE){
      const sx=n.x-_camX+cx, sy=n.y-_camY+cy;
      if(sx<-n.r*2||sx>canvas.width+n.r*2||sy<-n.r*2||sy>canvas.height+n.r*2) continue;
      const [r,g,b]=n.c;
      const g1=ctx.createRadialGradient(sx,sy,0,sx,sy,n.r*1.8);
      g1.addColorStop(0,`rgba(${r},${g},${b},0.12)`);
      g1.addColorStop(0.5,`rgba(${r},${g},${b},0.04)`);
      g1.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(sx,sy,n.r*1.8,0,Math.PI*2); ctx.fillStyle=g1; ctx.fill();
    }
    return;
  }
  // ── Version desktop : rendu complet ─────────────────────────────────────
  const _nt=Date.now()*0.00018;
  for(const n of NEBULAE){
    const sx=n.x-_camX+cx, sy=n.y-_camY+cy;
    if(sx<-n.r*2||sx>canvas.width+n.r*2||sy<-n.r*2||sy>canvas.height+n.r*2) continue;
    const [r,g,b]=n.c;
    const pls=0.5+0.5*Math.sin(_nt*0.65+n.x*0.00055);

    // Couleurs dérivées
    // Secondaire : couleur "froide/chaude" complémentaire pour zones de réflexion
    const r2c=[Math.min(255,b*0.6+60)|0, Math.min(255,r*0.3+50)|0, Math.min(255,g*0.5+130)|0];
    // Cœur blanchi
    const rH=Math.min(255,r+90), gH=Math.min(255,g+90), bH=Math.min(255,b+90);

    // ── Génération persistante (une seule fois) ──
    if(!n._blobs){
      n._blobs=[];
      for(let i=0;i<14;i++){
        const ba=Math.random()*Math.PI*2, bd=Math.random()*n.r*0.68;
        n._blobs.push({ox:Math.cos(ba)*bd, oy:Math.sin(ba)*bd,
          r:n.r*(0.18+Math.random()*0.55), a:0.055+Math.random()*0.095,
          phase:Math.random()*Math.PI*2, speed:0.25+Math.random()*0.45,
          sec: i>=10}); // 4 blobs avec couleur secondaire
      }
      n._knots=[];
      for(let i=0;i<6;i++){
        const ka=Math.random()*Math.PI*2, kd=Math.random()*n.r*0.72;
        n._knots.push({ox:Math.cos(ka)*kd, oy:Math.sin(ka)*kd,
          r:n.r*(0.055+Math.random()*0.085), phase:Math.random()*Math.PI*2,
          hot: Math.random()>0.5}); // knots chauds (blancs) ou colorés
      }
      n._dust=[];
      for(let i=0;i<5;i++){
        const a1=Math.random()*Math.PI*2, d1=Math.random()*n.r*0.85;
        const a2=a1+0.8+Math.random()*1.5, d2=Math.random()*n.r*0.85;
        const cpd=n.r*(0.1+Math.random()*0.45), cpa=Math.random()*Math.PI*2;
        n._dust.push({
          x1:Math.cos(a1)*d1, y1:Math.sin(a1)*d1,
          x2:Math.cos(a2)*d2, y2:Math.sin(a2)*d2,
          cpx:Math.cos(cpa)*cpd, cpy:Math.sin(cpa)*cpd,
          w:n.r*(0.07+Math.random()*0.13),
          op:0.15+Math.random()*0.18});
      }
      n._fils=[];
      for(let i=0;i<9;i++){
        n._fils.push({baseA:Math.random()*Math.PI*2,
          len:n.r*(0.4+Math.random()*0.5), w:n.r*(0.05+Math.random()*0.07),
          phase:Math.random()*Math.PI*2, speed:0.25+Math.random()*0.35});
      }
      n._stars=[];
      for(let i=0;i<42;i++){
        const sa=Math.random()*Math.PI*2, sd=Math.random()*n.r*0.92;
        n._stars.push({ox:Math.cos(sa)*sd, oy:Math.sin(sa)*sd,
          sz:0.4+Math.random()*2.2, phase:Math.random()*Math.PI*2,
          bright: Math.random()>0.82});
      }
    }

    // ─── RENDU ──────────────────────────────────────────────

    // 1. Lueur ambiante très large (halo diffus)
    const gBg=ctx.createRadialGradient(sx,sy,0,sx,sy,n.r*2.4);
    gBg.addColorStop(0,`rgba(${r},${g},${b},${0.07+pls*0.025})`);
    gBg.addColorStop(0.3,`rgba(${r},${g},${b},0.025)`);
    gBg.addColorStop(0.7,`rgba(${r},${g},${b},0.008)`);
    gBg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(sx,sy,n.r*2.4,0,Math.PI*2); ctx.fillStyle=gBg; ctx.fill();

    // Lueur secondaire (couleur froide, légèrement décalée)
    const offX=n.r*0.25, offY=n.r*0.15;
    const gBg2=ctx.createRadialGradient(sx+offX,sy+offY,0,sx+offX,sy+offY,n.r*1.3);
    gBg2.addColorStop(0,`rgba(${r2c[0]},${r2c[1]},${r2c[2]},0.045)`);
    gBg2.addColorStop(0.5,`rgba(${r2c[0]},${r2c[1]},${r2c[2]},0.015)`);
    gBg2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(sx+offX,sy+offY,n.r*1.3,0,Math.PI*2); ctx.fillStyle=gBg2; ctx.fill();

    // 2. Blobs nuageux (corps principal multicolore)
    for(const blob of n._blobs){
      const bPls=0.5+0.5*Math.sin(_nt*blob.speed+blob.phase);
      const bx=sx+blob.ox, by=sy+blob.oy;
      const [br,bg2,bb]=blob.sec?r2c:[r,g,b];
      const bRad=blob.r*1.35; // rayon élargi pour plus de diffusion
      const gBlob=ctx.createRadialGradient(bx,by,0,bx,by,bRad);
      gBlob.addColorStop(0,`rgba(${br},${bg2},${bb},${blob.a*(0.65+bPls*0.25)})`);
      gBlob.addColorStop(0.3,`rgba(${br},${bg2},${bb},${blob.a*0.35})`);
      gBlob.addColorStop(0.65,`rgba(${br},${bg2},${bb},${blob.a*0.10})`);
      gBlob.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(bx,by,bRad,0,Math.PI*2); ctx.fillStyle=gBlob; ctx.fill();
    }

    // 3. Filaments gazeux animés
    ctx.save(); ctx.translate(sx,sy);
    for(const fil of n._fils){
      const fa=fil.baseA+Math.sin(_nt*fil.speed+fil.phase)*0.22;
      const fLen=fil.len*(0.82+Math.sin(_nt*0.45+fil.phase)*0.18);
      const fW=fil.w*(0.75+Math.sin(_nt*0.55+fil.phase*1.2)*0.25);
      const ex=Math.cos(fa)*fLen, ey=Math.sin(fa)*fLen;
      const gFil=ctx.createLinearGradient(0,0,ex,ey);
      gFil.addColorStop(0,`rgba(${r},${g},${b},0.07)`);
      gFil.addColorStop(0.45,`rgba(${r},${g},${b},0.028)`);
      gFil.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.ellipse(ex*0.5,ey*0.5,fLen*0.55,fW*1.3,fa,0,Math.PI*2);
      ctx.fillStyle=gFil; ctx.fill();
    }
    ctx.restore();

    // 4. Couloirs de poussière sombres (dust lanes — élément clé des vraies nébuleuses)
    ctx.save(); ctx.translate(sx,sy);
    ctx.lineCap='round';
    for(const d of n._dust){
      // Tracé de la bande de poussière comme chemin épais puis rempli avec gradient sombre
      const mx=(d.x1+d.x2)*0.5+d.cpx*0.5, my=(d.y1+d.y2)*0.5+d.cpy*0.5;
      const gd=ctx.createRadialGradient(mx,my,0,mx,my,d.w*3);
      gd.addColorStop(0,`rgba(0,0,0,${d.op})`);
      gd.addColorStop(0.5,`rgba(0,0,0,${d.op*0.5})`);
      gd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.moveTo(d.x1,d.y1);
      ctx.quadraticCurveTo(d.cpx,d.cpy,d.x2,d.y2);
      ctx.lineWidth=d.w; ctx.strokeStyle=gd; ctx.stroke();
    }
    ctx.restore();

    // 5. Nœuds d'émission brillants (knots — zones de gaz ionisé concentré)
    for(const kn of n._knots){
      const kPls=0.45+0.55*Math.abs(Math.sin(_nt*1.1+kn.phase));
      const kx=sx+kn.ox, ky=sy+kn.oy;
      const [kr,kg,kb]=kn.hot?[rH,gH,bH]:[r,g,b];
      const knRad=kn.r*1.6;
      const gKn=ctx.createRadialGradient(kx,ky,0,kx,ky,knRad);
      gKn.addColorStop(0,`rgba(${kr},${kg},${kb},${0.40+kPls*0.30})`);
      gKn.addColorStop(0.25,`rgba(${kr},${kg},${kb},${0.18*kPls})`);
      gKn.addColorStop(0.65,`rgba(${kr},${kg},${kb},0.03)`);
      gKn.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(kx,ky,knRad,0,Math.PI*2); ctx.fillStyle=gKn; ctx.fill();
    }

    // 6. Noyau central brillant (cœur chaud)
    const gCore=ctx.createRadialGradient(sx,sy,0,sx,sy,n.r*0.16);
    gCore.addColorStop(0,`rgba(${rH},${gH},${bH},${0.30+pls*0.18})`);
    gCore.addColorStop(0.55,`rgba(${r},${g},${b},0.08)`);
    gCore.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(sx,sy,n.r*0.16,0,Math.PI*2); ctx.fillStyle=gCore; ctx.fill();

    // 8. Étoiles internes (scintillement + brillantes avec halo)
    for(const st of n._stars){
      const stPls=0.25+0.75*Math.abs(Math.sin(_nt*2.1+st.phase));
      const stx=sx+st.ox, sty=sy+st.oy;
      if(st.bright){
        // Étoile brillante : halo coloré + point blanc
        const sg=ctx.createRadialGradient(stx,sty,0,stx,sty,st.sz*6);
        sg.addColorStop(0,`rgba(255,255,255,${0.65+stPls*0.35})`);
        sg.addColorStop(0.25,`rgba(${rH},${gH},${bH},${0.35*stPls})`);
        sg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath(); ctx.arc(stx,sty,st.sz*6,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
        // Petite croix diffraction
        ctx.save();
        ctx.strokeStyle=`rgba(255,255,255,${0.35*stPls})`; ctx.lineWidth=0.7;
        ctx.beginPath(); ctx.moveTo(stx-st.sz*8,sty); ctx.lineTo(stx+st.sz*8,sty); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(stx,sty-st.sz*8); ctx.lineTo(stx,sty+st.sz*8); ctx.stroke();
        ctx.restore();
        ctx.beginPath(); ctx.arc(stx,sty,st.sz,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,0.95)`; ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(stx,sty,st.sz,0,Math.PI*2);
        ctx.fillStyle=`rgba(${rH},${gH},${bH},${0.30+stPls*0.60})`; ctx.fill();
      }
    }
  }
}

function drawEMP(){
  const cx=canvas.width/2, cy=canvas.height/2;
  for(const ez of EMP_ZONES){
    const sx=ez.x-_camX+cx, sy=ez.y-_camY+cy;
    if(sx<-ez.r-CULL_MG||sx>canvas.width+ez.r+CULL_MG||sy<-ez.r-CULL_MG||sy>canvas.height+ez.r+CULL_MG) continue;
    // Pulsation continue (période ~2s)
    const pulse=0.5+0.5*Math.sin(ez.t*0.065);
    // Zone active en permanence : remplissage + bords
    const gEmp=ctx.createRadialGradient(sx,sy,0,sx,sy,ez.r);
    gEmp.addColorStop(0,`rgba(60,200,255,${0.06+pulse*0.06})`);
    gEmp.addColorStop(0.7,`rgba(40,160,220,${0.04+pulse*0.04})`);
    gEmp.addColorStop(1,'rgba(20,80,160,0)');
    ctx.beginPath(); ctx.arc(sx,sy,ez.r,0,Math.PI*2);
    ctx.fillStyle=gEmp; ctx.fill();
    // Bord en pointillés animés
    ctx.save();
    ctx.setLineDash([14,9]);
    ctx.lineDashOffset=-ez.t*0.4;
    ctx.beginPath(); ctx.arc(sx,sy,ez.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(80,220,255,${0.3+pulse*0.25})`; ctx.lineWidth=2; ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    // Anneau intérieur pulsant (champ magnétique)
    ctx.beginPath(); ctx.arc(sx,sy,ez.r*(0.6+pulse*0.15),0,Math.PI*2);
    ctx.strokeStyle=`rgba(120,230,255,${0.15+pulse*0.2})`; ctx.lineWidth=1.5; ctx.stroke();
    // Lignes de champ électrique (rayons depuis le centre)
    ctx.save();
    ctx.strokeStyle=`rgba(160,240,255,${0.12+pulse*0.12})`; ctx.lineWidth=0.8;
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4+ez.t*0.008;
      const r1=ez.r*0.28, r2=ez.r*(0.55+pulse*0.1);
      ctx.beginPath(); ctx.moveTo(sx+Math.cos(a)*r1,sy+Math.sin(a)*r1);
      ctx.lineTo(sx+Math.cos(a)*r2,sy+Math.sin(a)*r2); ctx.stroke();
    }
    ctx.restore();
    // Icône centrale
    ctx.fillStyle=`rgba(150,235,255,${0.55+pulse*0.3})`; ctx.font='bold 18px monospace'; ctx.textAlign='center';
    ctx.fillText('⚡',sx,sy+6); ctx.textAlign='left';
    // Label "EMP"
    ctx.fillStyle=`rgba(120,210,255,${0.5+pulse*0.2})`; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText('ZONE EMP',sx,sy+ez.r-8); ctx.textAlign='left';
  }
}

function drawMeteors(){
  const cx=canvas.width/2, cy=canvas.height/2;
  for(const m of meteors){
    // ── Traînée réaliste : chemin de positions passées ──────────────────
    if(m.trail&&m.trail.length>1){
      const n=m.trail.length;
      for(let ti=0;ti<n;ti++){
        const f=1-(ti/n);           // 1 = tout près du corps, 0 = extrémité
        const tp=m.trail[ti];
        const tsx=tp.x-_camX+cx, tsy=tp.y-_camY+cy;
        const tr=Math.max(0.4, m.r*f*0.52);
        const alpha=f*f*0.62;       // atténuation quadratique = plus naturelle
        const colG=Math.floor(40+90*f);   // orange chaud → rouge sombre
        ctx.beginPath(); ctx.arc(tsx,tsy,tr,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,${colG},8,${alpha})`;
        ctx.fill();
      }
    }
    const sx=m.x-_camX+cx, sy=m.y-_camY+cy;
    if(sx<-CULL_MG||sx>canvas.width+CULL_MG||sy<-CULL_MG||sy>canvas.height+CULL_MG) continue;
    // ── Corps rocheux (polygone avec rotation, physique astéroïde) ──────
    ctx.save(); ctx.translate(sx,sy);
    const _mRot=m.rot||0;
    const pts=m.verts||(()=>{
      const p=[]; const n=7+Math.floor(Math.random()*3);
      for(let i=0;i<n;i++){const a=i/n*Math.PI*2+(Math.random()-0.5)*0.5;p.push([Math.cos(a)*m.r*(0.65+Math.random()*0.42),Math.sin(a)*m.r*(0.65+Math.random()*0.42)]);}
      m.verts=p; return p;
    })();
    ctx.rotate(_mRot);
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.closePath();
    ctx.fillStyle='#4a3828'; ctx.fill();
    ctx.strokeStyle='rgba(255,150,50,0.85)'; ctx.lineWidth=1.5; ctx.stroke();
    // Lueur de friction
    const glow=ctx.createRadialGradient(0,0,m.r*0.2,0,0,m.r*1.4);
    glow.addColorStop(0,'rgba(255,200,80,0.30)'); glow.addColorStop(1,'rgba(255,60,0,0)');
    ctx.beginPath(); ctx.arc(0,0,m.r*1.4,0,Math.PI*2); ctx.fillStyle=glow; ctx.fill();
    ctx.restore();
  }
  // Avertissement pluie d'astéroïdes (dans le monde 3D — affiché en espace écran)
  if(meteorWarn>120){
    const t=(meteorWarn-120)/60;
    ctx.fillStyle=`rgba(255,150,0,${Math.min(1,t*1.5)*0.85})`;
    ctx.font=`bold ${14+Math.floor(t*4)}px monospace`; ctx.textAlign='center';
    ctx.fillText('⚠  PLUIE D\'ASTÉROÏDES  ⚠',canvas.width/2,canvas.height/2-40); ctx.textAlign='left';
  }
}

function spawnMercenaries(team){
  // Tuer les anciens mercenaires (quelle que soit leur équipe)
  for(const m of mercenaries){ m.dead=true; m.respawnTimer=999999; }
  mercenaries.length=0;
  for(let i=0;i<BEACON_MERC_COUNT;i++){
    const edgeAngle=Math.random()*Math.PI*2;
    const edgeR=MAP_RADIUS*0.85+Math.random()*MAP_RADIUS*0.08;

    ai.isMercenary=true;
    mercenaries.push(ai);
    if(team==='blue') blues.push(ai); else reds.push(ai);
  }
}

  // Mât de connexion
  ctx.fillStyle='#303050'; ctx.strokeStyle='rgba(180,180,220,0.5)'; ctx.lineWidth=1;

function drawBounds(){
  const cx=canvas.width/2, cy=canvas.height/2;
  // Centre de la map en coordonnées écran
  const ox=cx-_camX, oy=cy-_camY;
  const distFromCenter=Math.hypot(_camX,_camY);
  const WARN_START=MAP_RADIUS-2000;
  if(distFromCenter>WARN_START){
    // Gradient radial d'avertissement sur la bordure
    const t=Math.max(0,Math.min(1,(distFromCenter-WARN_START)/2000));
    const g=ctx.createRadialGradient(ox,oy,MAP_RADIUS-400,ox,oy,MAP_RADIUS+200);
    g.addColorStop(0,`rgba(200,30,10,${t*0.28})`);
    g.addColorStop(1,'rgba(200,30,10,0)');
    ctx.beginPath(); ctx.arc(ox,oy,MAP_RADIUS+200,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
  // Cercle de limite
  ctx.beginPath(); ctx.arc(ox,oy,MAP_RADIUS,0,Math.PI*2);
  ctx.strokeStyle='rgba(220,60,30,0.65)'; ctx.lineWidth=2.5; ctx.setLineDash([18,10]);
  ctx.stroke(); ctx.setLineDash([]);
  // Avertissement texte HUD
  const dEdge=MAP_RADIUS-distFromCenter;
  if(dEdge<700){
    const t=1-dEdge/700;
    ctx.fillStyle=`rgba(255,60,30,${t*0.85})`; ctx.font=`bold ${12+Math.floor(t*6)}px monospace`;
    ctx.textAlign='center'; ctx.fillText('⚠  LIMITE DE ZONE  ⚠',canvas.width/2,58); ctx.textAlign='left';
  }
}

function drawSpawns(){
  const cx=canvas.width/2, cy=canvas.height/2;
  for(const sp of spawns){
    const sx=sp.x-_camX+cx, sy=sp.y-_camY+cy;
    if(sx<-CULL_MG||sx>canvas.width+CULL_MG||sy<-CULL_MG||sy>canvas.height+CULL_MG) continue;
    const col=sp.team==='red'?[220,60,40]:sp.team==='neutral'?[170,170,190]:[40,120,220];
    const capCol=sp.capTeam==='red'?[220,60,40]:sp.capTeam==='blue'?[40,120,220]:[170,170,190];
    const rc=`rgba(${col[0]},${col[1]},${col[2]}`;
    // Zone de capture
    ctx.beginPath(); ctx.arc(sx,sy,SPAWN_RADIUS,0,Math.PI*2);
    ctx.fillStyle=`${rc},0.05)`; ctx.fill();
    ctx.strokeStyle=`${rc},0.3)`; ctx.lineWidth=1.2;
    ctx.setLineDash([7,5]); ctx.stroke(); ctx.setLineDash([]);
    // Corps de la station : hub central
    ctx.save(); ctx.translate(sx,sy);
    // Bras + panneaux solaires (4 directions)
    ctx.strokeStyle=`${rc},0.85)`; ctx.lineWidth=3;
    for(let _arm=0;_arm<4;_arm++){
      const _aang=_arm*Math.PI/2;
      const _ax=Math.cos(_aang),_ay=Math.sin(_aang);
      ctx.beginPath(); ctx.moveTo(_ax*10,_ay*10); ctx.lineTo(_ax*26,_ay*26); ctx.stroke();
      // Panneau solaire
      ctx.save(); ctx.translate(_ax*30,_ay*30); ctx.rotate(_aang+Math.PI/2);
      ctx.fillStyle=`${rc},0.7)`;
      ctx.fillRect(-10,-4,20,8);
      ctx.strokeStyle=`${rc},0.4)`; ctx.lineWidth=0.8;
      ctx.strokeRect(-10,-4,20,8);
      // Lignes de cellules
      ctx.beginPath(); ctx.moveTo(-3,-4); ctx.lineTo(-3,4); ctx.moveTo(3,-4); ctx.lineTo(3,4);
      ctx.stroke();
      ctx.restore();
    }
    // Hub central (octogone)
    ctx.beginPath();
    for(let _i=0;_i<8;_i++){const _a=_i*Math.PI/4;ctx.lineTo(Math.cos(_a)*11,Math.sin(_a)*11);}
    ctx.closePath();
    ctx.fillStyle=`${rc},0.25)`; ctx.fill();
    ctx.strokeStyle=`${rc},0.9)`; ctx.lineWidth=1.5; ctx.stroke();
    // Tourelles : 1 centre + 4 bouts de bras
    for(const tr of sp.turrets){
      const _tox=Math.cos(tr.offsetAngle)*(tr.offsetRadius||0), _toy=Math.sin(tr.offsetAngle)*(tr.offsetRadius||0);
      ctx.save(); ctx.translate(_tox,_toy);
      if(tr.hp>0){
        // Base
        ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2);
        ctx.fillStyle=sp.team==='neutral'?'rgba(150,150,170,0.8)':`${rc},0.9)`; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1; ctx.stroke();
        // Canon
        ctx.save(); ctx.rotate(tr.angle);
        ctx.fillStyle='rgba(220,230,255,0.95)'; ctx.fillRect(3,-2,11,4);
        ctx.restore();
        // HP dots
        for(let _h=0;_h<tr.maxHp;_h++){
          ctx.beginPath(); ctx.arc(-4+_h*8,9,2,0,Math.PI*2);
          ctx.fillStyle=_h<tr.hp?`${rc},0.9)`:'rgba(60,60,80,0.6)'; ctx.fill();
        }
      } else {
        // Détruite — débris
        ctx.fillStyle='rgba(80,80,90,0.6)';
        ctx.beginPath(); ctx.arc(2,-1,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(-2,3,2,0,Math.PI*2); ctx.fill();
        if(tr.respawnTimer>0){
          const _tp=1-tr.respawnTimer/1800;
          ctx.beginPath(); ctx.arc(0,0,6,0,_tp*Math.PI*2-Math.PI/2);
          ctx.strokeStyle='rgba(255,200,50,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
        }
      }
      ctx.restore();
    }
    ctx.restore();
    // Barre de progression capture
    if(sp.progress>0&&sp.capTeam){
      const endA=(sp.progress/CAPTURE_FRAMES)*Math.PI*2-Math.PI/2;
      ctx.beginPath(); ctx.arc(sx,sy,SPAWN_RADIUS*0.72,-Math.PI/2,endA);
      ctx.strokeStyle=`rgba(${capCol[0]},${capCol[1]},${capCol[2]},0.9)`; ctx.lineWidth=4; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
      ctx.fillText(`${Math.floor(sp.progress/CAPTURE_FRAMES*100)}%`,sx,sy+32); ctx.textAlign='left';
    }
  }
}

function drawAsteroids(){
  const cx=canvas.width/2, cy=canvas.height/2;
  for(const a of ASTEROIDS){
    const sx=a.wx-_camX+cx, sy=a.wy-_camY+cy;
    if(sx<-CULL_MG||sx>canvas.width+CULL_MG||sy<-CULL_MG||sy>canvas.height+CULL_MG) continue;
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(a.rot);
    // Polygone comme chemin de base
    ctx.beginPath(); ctx.moveTo(a.verts[0][0],a.verts[0][1]);
    for(let i=1;i<a.verts.length;i++) ctx.lineTo(a.verts[i][0],a.verts[i][1]);
    ctx.closePath();
    // Clip : tout ce qui suit reste DANS le polygone → pas de débordement visible
    ctx.save(); ctx.clip();
    ctx.beginPath(); ctx.arc(0,0,a.radius*0.9,0,Math.PI*2);
    ctx.fillStyle='rgba(30,22,14,0.55)'; ctx.fill();
    ctx.restore();
    // Remplissage + contour du polygone
    ctx.beginPath(); ctx.moveTo(a.verts[0][0],a.verts[0][1]);
    for(let i=1;i<a.verts.length;i++) ctx.lineTo(a.verts[i][0],a.verts[i][1]);
    ctx.closePath();
    ctx.fillStyle='#3a3228'; ctx.fill(); ctx.strokeStyle='#7a6a54'; ctx.lineWidth=1.2; ctx.stroke();
    // Cratères (détail texture)
    const cr=a.radius*0.28; ctx.strokeStyle='rgba(140,120,90,0.35)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(-cr*.6,cr*.3,cr*.55,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cr*.5,-cr*.5,cr*.35,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawBullets(){
  const cx=canvas.width/2, cy=canvas.height/2;
  const W=canvas.width, H=canvas.height;

    if(sx<-CULL_MG||sx>W+CULL_MG||sy<-CULL_MG||sy>H+CULL_MG) continue;
    const t=b.cosmetic?Math.min(1.0,b.life/12):b.life/(b._maxLife||BULLET_LIFE), isBlue=b.team==='blue';
    const ang=Math.atan2(b.vy,b.vx);
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(ang);
    if(simple){
      // Rendu léger : juste un trait coloré

      ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(7,0); ctx.stroke();
    } else {
      const col=isBlue?`rgba(120,190,255,${0.9*t})`:`rgba(255,110,70,${0.9*t})`;
      ctx.shadowColor=isBlue?'#5af':'#f64'; ctx.shadowBlur=6;

      trail.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=trail;
      ctx.beginPath(); ctx.moveTo(-7,-2); ctx.lineTo(-18,0); ctx.lineTo(-7,2); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

function drawLasers(){
  if(!lasers.length) return;
  const cx=canvas.width/2, cy=canvas.height/2;
  for(const _lz of lasers){
    if(!_lz.shooter) continue;
    // Calculer cannons si absent (CLIENT ne reçoit pas ce champ de l'HOST)
    if(!_lz.cannons){
      const _fw=Math.cos(_lz.shooter.angle),_fu=Math.sin(_lz.shooter.angle);
      const _lx=-_fu,_ly=_fw;
      const _sgn=(_lz.side==='right')?-1:1;
      const _lc0=_lz._station?{x:_lz.shooter.x,y:_lz.shooter.y}:{x:_lz.shooter.x+_lx*_sgn*26,y:_lz.shooter.y+_ly*_sgn*26};
      _lz.cannons=[_lc0];
    }
    const _ltgt=_lz.target&&!_lz.target.dead?_lz.target:null;
    if(!_ltgt) continue;
    const _alpha=(_lz.life/_lz.maxLife)*0.9+0.1;
    const _flicker=0.85+Math.random()*0.15;
    const _isBlue=_lz.team==='blue';
    const _lrange=FIRE_RANGE*1.35;
    for(const _lc of _lz.cannons){
      const _lang=Math.atan2(_ltgt.y-_lc.y,_ltgt.x-_lc.x);
      // Arc avant bloqué
      let _lfd=_lang-_lz.shooter.angle;
      while(_lfd>Math.PI)_lfd-=Math.PI*2;while(_lfd<-Math.PI)_lfd+=Math.PI*2;
      if(Math.abs(_lfd)<=TYPE3_FWDBLK&&!_lz._station) continue;
      const _ldx=Math.cos(_lang),_ldy=Math.sin(_lang);
      const _sx=_lc.x-_camX+cx, _sy=_lc.y-_camY+cy;
      const _ex=_sx+_ldx*_lrange, _ey=_sy+_ldy*_lrange;
      // Halo extérieur
      ctx.beginPath();ctx.moveTo(_sx,_sy);ctx.lineTo(_ex,_ey);
      ctx.strokeStyle=_isBlue?`rgba(60,180,255,${_alpha*0.25*_flicker})`:`rgba(255,80,30,${_alpha*0.25*_flicker})`;
      ctx.lineWidth=9;ctx.stroke();
      // Faisceau principal
      ctx.beginPath();ctx.moveTo(_sx,_sy);ctx.lineTo(_ex,_ey);
      ctx.strokeStyle=_isBlue?`rgba(120,220,255,${_alpha*_flicker})`:`rgba(255,150,60,${_alpha*_flicker})`;
      ctx.lineWidth=3;ctx.stroke();
      // Cœur blanc
      ctx.beginPath();ctx.moveTo(_sx,_sy);ctx.lineTo(_ex,_ey);
      ctx.strokeStyle=`rgba(255,255,255,${_alpha*0.7*_flicker})`;
      ctx.lineWidth=1;ctx.stroke();
      // Étincelle au canon
      ctx.beginPath();ctx.arc(_sx,_sy,3+Math.random()*2,0,Math.PI*2);
      ctx.fillStyle=_isBlue?`rgba(180,240,255,${_alpha})`:`rgba(255,200,100,${_alpha})`;
      ctx.fill();
    }
  }
}
function drawShield(sx,sy,rad,obj,rgb){
  if(obj.shield<=0&&obj.shieldHit<=0) return;
  const _sMax=obj.maxShield??SHIELD_MAX;
  const alpha=obj.shield>0?0.4*(obj.shield/_sMax):0;
  const fAlpha=obj.shieldHit>0?obj.shieldHit/22*0.75:0;
  if(alpha>0){
    for(let s=0;s<obj.shield;s++){
      const a0=s*(Math.PI*2/_sMax)-Math.PI/2;
      const a1=a0+(Math.PI*2/_sMax)*0.82;
      ctx.beginPath(); ctx.arc(sx,sy,rad+9,a0,a1);
      ctx.strokeStyle=`rgba(${rgb},${alpha*1.6})`; ctx.lineWidth=2.5; ctx.stroke();
    }
  }
  if(fAlpha>0){
    ctx.beginPath(); ctx.arc(sx,sy,rad+9,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${fAlpha})`; ctx.lineWidth=3; ctx.stroke();
  }
}

function drawFlame(yOff,both){
  const fLen=(both?22:14)+Math.random()*(both?14:12);
  const g=ctx.createLinearGradient(-14,yOff,-14-fLen,yOff);
  g.addColorStop(0,'rgba(255,210,60,0.95)'); g.addColorStop(1,'rgba(255,40,0,0)');
  ctx.fillStyle=g; ctx.beginPath();
  ctx.ellipse(-14-fLen/2,yOff,fLen/2,both?6+Math.random()*3:2.5,0,0,Math.PI*2); ctx.fill();
}

function drawAIFleet(fleet,fillColT1,strokeColT1,barCol,rgb){
  const cx=canvas.width/2, cy=canvas.height/2;
  for(const ai of fleet){
    if(ai.dead) continue;
    // En MP : le vaisseau du joueur est dessiné par drawPlayerShip → ne pas le redessiner ici
    if(_mpConnected&&ai===_mpMyShip) continue;
    const sx=ai.x-_camX+cx, sy=ai.y-_camY+cy;
    if(sx<-CULL_MG||sx>canvas.width+CULL_MG||sy<-CULL_MG||sy>canvas.height+CULL_MG) continue;
    const aiR=ai.radius||SHIP_RADIUS;
    // Fade-in au spawn : de transparent (immuneTimer=SPAWN_IMMUNE) à opaque (en 60 frames)
    const _spA=ai.immuneTimer>0?Math.min(1,(SPAWN_IMMUNE-ai.immuneTimer)/60):1;
    if(_spA<0.03) continue; // encore trop transparent
    if(_spA<1) ctx.globalAlpha=_spA;
    drawShield(sx,sy,aiR,ai,rgb);
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(ai.angle);
    // Couleur uniforme par équipe (palette mercenaire si applicable)
    const _fc=ai.isMercenary?(ai.team==='blue'?'#091830':'#380a08'):fillColT1;
    const _sc=ai.isMercenary?(ai.team==='blue'?'#18c898':'#e07820'):strokeColT1;
    const fc=ai.hit>0?'#c8cce8':_fc, sc=ai.hit>0?'#ffffff':_sc;
    if(ai.shipType===3){
      // ── Type 3 : grand cuirassé ──────────────────────────────────────────
      const S=2.1; ctx.scale(S,S);
      if(Math.hypot(ai.vx,ai.vy)>0.2){drawFlame(-9,false);drawFlame(0,true);drawFlame(9,false);}
      // Corps hexagonal allongé
      ctx.fillStyle=fc; ctx.strokeStyle=sc; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(22,0);ctx.lineTo(14,-11);ctx.lineTo(-12,-12);
      ctx.lineTo(-18,0);ctx.lineTo(-12,12);ctx.lineTo(14,11);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Noyau central
      ctx.beginPath(); ctx.arc(2,0,6,0,Math.PI*2);
      ctx.fillStyle=ai.hit>0?'rgba(255,255,255,0.5)':`rgba(${rgb},0.5)`; ctx.fill();
      // Canons gauche (haut)
      ctx.fillStyle=sc;
      ctx.fillRect(2,-19,14,4); ctx.fillRect(-8,-19,10,4);
      // Canons droit (bas)
      ctx.fillRect(2,15,14,4); ctx.fillRect(-8,15,10,4);
      // Embouts lumineux
      const _ecol=ai.hit>0?'#fff':`rgba(${rgb},0.9)`;
      ctx.fillStyle=_ecol;
      ctx.fillRect(16,-20,4,6);ctx.fillRect(2,-20,4,6);
      ctx.fillRect(16,14,4,6);ctx.fillRect(2,14,4,6);
      ctx.scale(1/S,1/S);
    } else if(ai.shipType===2){
      // ── Type 2 : sablier agile ───────────────────────────────────────────
      if(Math.hypot(ai.vx,ai.vy)>0.4){drawFlame(-12,false);drawFlame(12,false);}
      ctx.fillStyle=fc; ctx.strokeStyle=sc; ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-18,-12);ctx.lineTo(18,-12);ctx.lineTo(0,0);ctx.closePath();
      ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(-18,12);ctx.lineTo(18,12);ctx.lineTo(0,0);ctx.closePath();
      ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(5,0);ctx.lineTo(0,5);ctx.lineTo(-5,0);ctx.closePath();
      const _df=ai.hit>0?'rgba(255,255,255,0.8)':`rgba(${rgb},0.7)`;
      ctx.fillStyle=_df;ctx.fill();ctx.strokeStyle=sc;ctx.lineWidth=1;ctx.stroke();
    } else {
      // ── Type 1 : flèche ──────────────────────────────────────────────────
      const av=ai.angVel,th=0.003;
      if(Math.hypot(ai.vx,ai.vy)>0.4){
        if(Math.abs(av)<=th)drawFlame(0,true);
        else if(av>th)drawFlame(-7,false);
        else drawFlame(7,false);
      }
      ctx.beginPath();ctx.moveTo(20,0);ctx.lineTo(-14,-10);ctx.lineTo(-7,0);ctx.lineTo(-14,10);ctx.closePath();
      ctx.fillStyle=fc;ctx.fill();ctx.strokeStyle=sc;ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(7,0,3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${rgb},0.5)`;ctx.fill();
    }
    ctx.restore();
    const maxHp=ai.maxHp||AI_HP;
    const hpBarW=ai.shipType===3?64:28;
    const hpBarY=sy-(aiR+12);
    if(ai.hp<maxHp){
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW,4);
      ctx.fillStyle=barCol;ctx.fillRect(sx-hpBarW/2,hpBarY,hpBarW*(ai.hp/maxHp),4);
    }
    if(ai.shipType===3){
      ctx.fillStyle=ai.team==='blue'?'rgba(80,200,255,0.9)':'rgba(255,120,60,0.9)';
      ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText('['+ai.name+']',sx,sy+aiR*2.1+18);
      ctx.textAlign='left';
    }
    if(_spA<1) ctx.globalAlpha=1; // reset alpha après chaque vaisseau
  }
}

// ── Flèches radar ─────────────────────────────────────────────────────────
function drawRadarArrows(){
  if(ship.dead) return;
  const cx=canvas.width/2, cy=canvas.height/2;
  const RADAR_R=Math.min(460, Math.min(canvas.width,canvas.height)*0.41);
  const playerInNebula=nebulaFactor(_camX,_camY)<1;
  // Flèches vaisseaux
  for(const ai of [...blues,...reds]){
    if(ai.dead) continue;
    // Joueur dans nébuleuse → radar complètement brouillé, aucune flèche
    if(playerInNebula) continue;
    const dx=ai.x-_camX, dy=ai.y-_camY;
    const dist=Math.hypot(dx,dy);
    const isEnemy=ai.team!==ship.team;
    // Ennemi caché dans une nébuleuse ?
    if(isEnemy&&nebulaFactor(ai.x,ai.y)<1&&dist>RADAR_RANGE*0.28) continue;
    const ssx=dx+cx, ssy=dy+cy;
    if(ssx>0&&ssx<canvas.width&&ssy>0&&ssy<canvas.height) continue;
    const angle=Math.atan2(dy,dx);
    const ax=cx+Math.cos(angle)*RADAR_R, ay=cy+Math.sin(angle)*RADAR_R;
    const alpha=0.55;
    ctx.save();
    ctx.translate(ax,ay); ctx.rotate(angle);
    ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(-6,5); ctx.lineTo(-3,0); ctx.lineTo(-6,-5); ctx.closePath();
    ctx.fillStyle=ai.team==='blue'?`rgba(80,150,255,${alpha})`:`rgba(255,75,55,${alpha})`;
    ctx.fill();
    ctx.restore();
  }
  // Losanges spawns (toujours visibles si hors écran, sans limite de distance)
  for(const sp of spawns){
    const dx=sp.x-_camX, dy=sp.y-_camY;
    // Masquer uniquement si le spawn est visible à l'écran
    const ssx=dx+cx, ssy=dy+cy;
    if(ssx>0&&ssx<canvas.width&&ssy>0&&ssy<canvas.height) continue;
    const angle=Math.atan2(dy,dx);
    const ax=cx+Math.cos(angle)*(RADAR_R-18), ay=cy+Math.sin(angle)*(RADAR_R-18);
    const alpha=0.75;
    const isBlue=sp.team==='blue', isNeutral=sp.team==='neutral';
    const capProgress=sp.progress>0?sp.progress/CAPTURE_FRAMES:0;
    ctx.save();
    ctx.translate(ax,ay); ctx.rotate(Math.PI/4);
    const s=5+capProgress*2; // légèrement plus grand si en cours de capture
    ctx.fillStyle=isBlue?`rgba(50,120,255,${alpha*0.6})`:isNeutral?`rgba(160,160,180,${alpha*0.6})`:`rgba(255,50,50,${alpha*0.6})`;
    ctx.strokeStyle=isBlue?`rgba(120,180,255,${alpha})`:isNeutral?`rgba(200,200,220,${alpha})`:`rgba(255,120,80,${alpha})`;
    ctx.lineWidth=1.5;
    ctx.fillRect(-s,-s,s*2,s*2);
    ctx.strokeRect(-s,-s,s*2,s*2);
    ctx.restore();
  }
  // Flèche balise hors écran
  {
    const dx=BEACON.x-_camX, dy=BEACON.y-_camY;
    const ssx=dx+cx, ssy=dy+cy;
    if(!(ssx>0&&ssx<canvas.width&&ssy>0&&ssy<canvas.height)){
      const angle=Math.atan2(dy,dx);
      const ax=cx+Math.cos(angle)*(RADAR_R-45), ay=cy+Math.sin(angle)*(RADAR_R-45);
      ctx.save(); ctx.translate(ax,ay); ctx.rotate(angle);
      ctx.fillStyle='rgba(180,150,255,0.65)';
      ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('📡',0,4); ctx.textAlign='left';
      ctx.restore();
    }
  }
}

      ctx.fillStyle=_rl.col.replace(')',`,${_rnAlpha})`).replace('rgb','rgba');
      ctx.fillText(_rl.text,_rnX,_rnY-18+_ri*20);
    });
    ctx.restore();
  }
  if(!isMobile){
    const dEdge=MAP_RADIUS-Math.hypot(_camX,_camY);
    if(dEdge<700){
      rr(ctx,14,14,130,28,5); ctx.fillStyle='rgba(4,8,28,0.75)'; ctx.fill();
      ctx.strokeStyle='rgba(60,80,160,0.5)'; ctx.lineWidth=0.5; ctx.stroke();
      ctx.fillStyle='#ff7050'; ctx.font='11px monospace';
      ctx.fillText(`⚠ Bord : ${dEdge.toFixed(0)} u`,24,28);
    }
  } else {
    // Mobile : juste avertissement bord de map
    const dEdge=MAP_RADIUS-Math.hypot(_camX,_camY);
    if(dEdge<700){ ctx.fillStyle=`rgba(255,100,60,0.85)`; ctx.font='bold 13px monospace'; ctx.fillText('⚠ BORD',14,22); }
  }
  if(!_mpConnected) // ── Score arcade (coin haut-droit) ──────────────────────────────────────
  {
    const scoreStr=String(_score).padStart(6,'0');
    const hiStr=String(_highScore).padStart(6,'0');
    const bW=isMobile?180:220, bH=isMobile?38:46, bX=W-bW-8, bY=8;
    // Fond
    rr(ctx,bX,bY,bW,bH,6);
    ctx.fillStyle='rgba(4,8,28,0.88)'; ctx.fill();
    ctx.strokeStyle='rgba(255,200,60,0.25)'; ctx.lineWidth=1; ctx.stroke();
    // Labels
    const lbF=`bold ${isMobile?8:9}px monospace`;
    ctx.font=lbF; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,210,60,0.75)';
    ctx.fillText('SCORE',bX+bW*0.3,bY+13);
    ctx.fillStyle='rgba(180,160,255,0.6)';
    ctx.fillText('HI-SCORE',bX+bW*0.75,bY+13);
    // Valeurs
    const numF=`bold ${isMobile?14:20}px monospace`;
    ctx.font=numF;
    ctx.fillStyle='#ffe060'; ctx.shadowColor='#cc9900'; ctx.shadowBlur=6;
    ctx.fillText(scoreStr,bX+bW*0.3,bY+bH-10);
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(210,190,255,0.85)';
    ctx.fillText(hiStr,bX+bW*0.75,bY+bH-10);
    ctx.textAlign='left';
  }

  // ── Bouton mute musique ──────────────────────────────────────────────────
  {
    const mx=isMobile?W-38:W-38, my=isMobile?56:56;
    rr(ctx,mx-16,my-14,32,26,5);
    ctx.fillStyle='rgba(4,8,28,0.80)'; ctx.fill();
    ctx.strokeStyle='rgba(60,80,160,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.fillStyle=_musicMuted?'rgba(160,80,80,0.85)':'rgba(100,200,255,0.75)';
    ctx.fillText(_musicMuted?'🔇':'🔊',mx,my+5);
    ctx.textAlign='left';
  }

  const PW=isMobile?Math.min(W-20,340):300, fS=isMobile?10:12, fSm=isMobile?9:11;
  const panH=isMobile?58:76;
  rr(ctx,W/2-PW/2,10,PW,panH,6); ctx.fillStyle='rgba(4,8,28,0.80)'; ctx.fill();
  ctx.strokeStyle='rgba(60,80,160,0.4)'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle='#5aadff'; ctx.font=`bold ${fS}px monospace`; ctx.fillText('BLEUS',W/2-PW*0.3,26);
  ctx.fillStyle='rgba(100,100,160,0.5)'; ctx.fillText('vs',W/2,26);
  ctx.fillStyle='#ff6050'; ctx.fillText('ROUGES',W/2+PW*0.3,26);
  ctx.font=`${fSm}px monospace`;
  const bw=Math.floor(PW*0.42), bh=8, by=isMobile?38:52;
  ctx.fillStyle='rgba(0,0,50,0.7)'; ctx.fillRect(W/2-PW/2+10,by,bw,bh);
  const pctB=Math.max(0,teamLives.blue/initialLives.blue);
  const pctR=Math.max(0,teamLives.red/initialLives.red);
  ctx.fillStyle='#2a80e8'; ctx.fillRect(W/2-PW/2+10,by,bw*pctB,bh);
  ctx.fillStyle=pctB<0.2?'#ff5030':'#5aadff'; ctx.font=`bold ${fSm}px monospace`;
  ctx.fillText(`❤ ${Math.round(pctB*100)}%`,W/2-PW/2+10+bw/2,by+bh+11);
  ctx.fillStyle='rgba(50,0,0,0.7)'; ctx.fillRect(W/2+PW/2-bw-10,by,bw,bh);
  ctx.fillStyle='#e83020'; ctx.fillRect(W/2+PW/2-bw-10,by,bw*pctR,bh);
  ctx.fillStyle=pctR<0.2?'#ff5030':'#ff8060';
  ctx.fillText(`❤ ${Math.round(pctR*100)}%`,W/2+PW/2-bw-10+bw/2,by+bh+11);
  ctx.textAlign='left';

  if(!isMobile){
    const bx2=W/2, by2=H-16;
    rr(ctx,bx2-112,by2-28,100,26,5); ctx.fillStyle=keys.left?'rgba(255,130,0,0.85)':'rgba(20,20,50,0.75)'; ctx.fill();
    ctx.strokeStyle=keys.left?'rgba(255,160,40,0.9)':'rgba(50,50,110,0.6)'; ctx.lineWidth=keys.left?1.2:0.5; ctx.stroke();
    ctx.fillStyle=keys.left?'#fff':'#556'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('◄ GAUCHE  [clic G]',bx2-62,by2-10);
    rr(ctx,bx2+12,by2-28,100,26,5); ctx.fillStyle=keys.right?'rgba(255,130,0,0.85)':'rgba(20,20,50,0.75)'; ctx.fill();
    ctx.strokeStyle=keys.right?'rgba(255,160,40,0.9)':'rgba(50,50,110,0.6)'; ctx.lineWidth=keys.right?1.2:0.5; ctx.stroke();
    ctx.fillStyle=keys.right?'#fff':'#556'; ctx.fillText('DROITE ►  [clic D]',bx2+62,by2-10);
    ctx.textAlign='left';
    ctx.fillStyle='rgba(80,100,180,0.55)'; ctx.font='10px monospace'; ctx.textAlign='center';
    ctx.fillText('Les deux clics → propulsion directe',W/2,by2-36); ctx.textAlign='left';
  }

  // ── Notifs EMP / balise / météores ─────────────────────────────────────
  if(!ship.dead&&ship.empTimer>0){
    const empFlicker=Math.sin(Date.now()*0.025)>0;
    if(empFlicker){
      ctx.fillStyle=`rgba(80,220,255,0.95)`; ctx.font='bold 14px monospace'; ctx.textAlign='center';
      ctx.fillText('⚡  ZONE EMP — MOTEURS COUPÉS  ⚡',W/2,H/2+55); ctx.textAlign='left';
    }
  }
  // (beacon mercenaires : pas d'affichage HUD dédié)
  if(meteorWarn>120){
    const mAlpha=Math.min(1,(meteorWarn-120)/60);
    ctx.fillStyle=`rgba(255,150,0,${mAlpha*0.9})`; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠ PLUIE D\'ASTÉROÏDES IMMINENTE ⚠',W/2,isMobile?30:H/2-42); ctx.textAlign='left';
  }
  if(!ship.dead&&ship.speedBoost>0){
    ctx.fillStyle=`rgba(255,180,40,0.9)`; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText(`⚡ BOOST VITESSE ${Math.ceil(ship.speedBoost/60)}s`,W/2,H/2+70); ctx.textAlign='left';
  }
  // ── Minimap ──────────────────────────────────────────────────────────────
  drawMinimap();
  // ── Mode spectateur ───────────────────────────────────────────────────────
  if(spectMode&&_spectTarget){
    const tCol=_spectTarget.team==='blue'?'#4aadff':'#ff6050';
    const tLabel=_spectTarget.team==='blue'?'BLEU':'ROUGE';
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,38);
    ctx.textAlign='center';
    ctx.fillStyle=tCol; ctx.font='bold 13px monospace';
    ctx.fillText(`👁 SPECTATEUR — ${_spectTarget.name} (${tLabel})`,W/2,16);
    ctx.fillStyle='rgba(150,160,210,0.7)'; ctx.font='10px monospace';
    ctx.fillText(isMobile?'◄ tap gauche   tap droit ►':'[V] quitter  ◄ [Q/A]  [E/D] ►',W/2,30);
    ctx.textAlign='left';
  }
  if(ship.dead&&!_mpConnected){
    // Solo uniquement — en MP on affiche l'état du propre bot
    rr(ctx,W/2-160,H/2-32,320,52,7); ctx.fillStyle='rgba(4,8,28,0.88)'; ctx.fill();
    ctx.fillStyle='#5aadff'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.fillText(`RESPAWN dans ${Math.ceil(ship.respawnTimer/60)}s`,W/2,H/2-8);
    ctx.textAlign='left';
  }
  if(_mpConnected&&_mpMyShip&&_mpMyShip.dead){
    // MP : afficher le compte à rebours du propre bot
    rr(ctx,W/2-160,H/2-32,320,52,7); ctx.fillStyle='rgba(4,8,28,0.88)'; ctx.fill();
    ctx.fillStyle='#5aadff'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
    ctx.fillText(`RESPAWN dans ${Math.ceil((_mpMyShip.respawnTimer||0)/60)}s`,W/2,H/2-8);
    ctx.textAlign='left';
  }

  // ── Journal de combat ────────────────────────────────────────────────────
  if(gameLog.length>0){
    const LW=isMobile?180:230, rowH=isMobile?15:18;
    const LH=gameLog.length*rowH+10;
    // Sur mobile : coin haut-gauche / desktop : coin bas-gauche (hors minimap)
    const LX=isMobile?4:14;
    const LY=isMobile?44:H-LH-14;
    rr(ctx,LX,LY,LW,LH,5);
    ctx.fillStyle='rgba(4,8,24,0.70)'; ctx.fill();
    ctx.strokeStyle='rgba(60,80,160,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.font=`${isMobile?9:11}px monospace`; ctx.textAlign='left';
    for(let i=0;i<gameLog.length;i++){
      const entry=gameLog[i];
      const t=Math.min(1,entry.life/60);
      ctx.globalAlpha=t;
      const y=LY+10+(gameLog.length-1-i)*rowH+rowH*0.6;
      let x=LX+8;
      for(const part of entry.parts){
        ctx.fillStyle=part.col;
        ctx.fillText(part.text,x,y);
        x+=ctx.measureText(part.text).width;
      }
    }
    ctx.globalAlpha=1;
    ctx.textAlign='left';
  }

  // ── Ping MP ──────────────────────────────────────────────────────────────
  if(_mpConnected&&!_mpIsHost){
    const _ping=Math.round(_mpRTT);
    const _pingCol=_ping<60?'#44ff88':_ping<120?'#ffdd44':_ping<200?'#ff8844':'#ff3333';
    const _pW=isMobile?72:86, _pH=isMobile?18:22;
    const _pX=W-_pW-8, _pY=isMobile?90:94;
    rr(ctx,_pX,_pY,_pW,_pH,4);
    ctx.fillStyle='rgba(4,8,28,0.82)'; ctx.fill();
    ctx.strokeStyle=_pingCol.replace('#','rgba(').replace(/(..)(..)(..)$/,(_,r,g,b)=>`${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)},0.4)`);
    ctx.lineWidth=1; ctx.stroke();
    ctx.textAlign='center'; ctx.font=`bold ${isMobile?9:11}px monospace`;
    ctx.fillStyle='rgba(180,190,210,0.6)';
    ctx.fillText('PING',_pX+_pW*0.3,_pY+_pH*0.52);
    ctx.font=`bold ${isMobile?11:13}px monospace`;
    ctx.fillStyle=_pingCol; ctx.shadowColor=_pingCol; ctx.shadowBlur=4;
    ctx.fillText(_ping+'ms',_pX+_pW*0.72,_pY+_pH*0.78);
    ctx.shadowBlur=0; ctx.textAlign='left';
  }
  // DEBUG HUD HOST
  if(_mpConnected&&_mpIsHost&&_gameStarted){
    ctx.save();
    ctx.font='10px monospace'; ctx.textAlign='left';
    const _hdl=['HOST DEBUG rx:'+_mpDbgRx+' keys:'+_mpNetKeys.size];
    _mpNetKeys.forEach(function(v,k){ _hdl.push('KEY '+k+' L:'+(v.left?1:0)+' R:'+(v.right?1:0)); });
    _mpNetPos.forEach(function(np,k){
      _hdl.push(k+' x:'+np.x.toFixed(0)+' vx:'+np.vx.toFixed(2)+' fr:'+(np._fresh?1:0));
    });
    const _hh=_hdl.length*14+8;
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.fillRect(8,canvas.height-_hh-8,240,_hh);
    ctx.fillStyle='#ffcc00';
    _hdl.forEach(function(l,i){ctx.fillText(l,14,canvas.height-_hh+8+i*14);});
    ctx.restore();
  }
  // DEBUG HUD client
  if(_mpConnected&&!_mpIsHost&&_mpMyShip&&_gameStarted){
    const _ms=_mpMyShip;
    ctx.save();
    ctx.font='10px monospace'; ctx.textAlign='left';
    const _dl=[
      'POS x:'+_ms.x.toFixed(0)+' y:'+_ms.y.toFixed(0),
      'VEL vx:'+_ms.vx.toFixed(3)+' vy:'+_ms.vy.toFixed(3),
      'KEYS L:'+(keys.left?1:0)+' R:'+(keys.right?1:0)+' dead:'+(_ms.dead?1:0),
      'SLOT:'+_mpMySlot+'/'+_mpMyTeam+' LAG:'+_mpLAG,
      'HostX:'+(_mpHostReportedX||0).toFixed(0)+' HostY:'+(_mpHostReportedY||0).toFixed(0),
      'TX:'+_mpDbgTx+' wsState:'+(_mpWs?_mpWs.readyState:'null'),
      'isHost:'+_mpIsHost+' connected:'+_mpConnected,
      'ship==b[slot]:'+((_mpMyShip===(_mpMyTeam==='blue'?blues:reds)[_mpMySlot])?'YES':'NO')+' xTyp:'+(typeof _ms.x),
    ];
    const _dh=_dl.length*14+8;
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.fillRect(8,canvas.height-_dh-8,215,_dh);
    ctx.fillStyle='#00ff88';
    _dl.forEach(function(l,i){ctx.fillText(l,14,canvas.height-_dh+8+i*14);});
    ctx.restore();
  }
}


function drawGameOver(){
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  const col=gameOver==='blue'?'#4a9ff5':'#ff5040';
  const _goWinnerLabel=gameOver==='blue'?'VICTOIRE — BLEUS':'VICTOIRE — ROUGES';
  // En MP : afficher VICTOIRE ou DÉFAITE selon l'équipe du joueur
  const _goMyTeam=_mpConnected?_mpMyTeam:(gameOver==='blue'?'blue':'red');
  const _goWon=_goMyTeam===gameOver;
  const _goPersonal=_mpConnected?(_goWon?'VICTOIRE !':'DÉFAITE'):''; // solo: pas de label perso
  const label=_goWinnerLabel;
  ctx.textAlign='center';
  ctx.fillStyle=col; ctx.font='bold 52px monospace';
  ctx.shadowColor=col; ctx.shadowBlur=24;
  ctx.fillText(label,W/2,H/2-60);
  // Label personnel VICTOIRE/DÉFAITE en MP
  if(_mpConnected&&_goPersonal){
    const _pCol=_goWon?'#ffe060':'rgba(200,100,80,0.9)';
    ctx.font='bold 28px monospace';
    ctx.fillStyle=_pCol; ctx.shadowColor=_pCol; ctx.shadowBlur=16;
    ctx.fillText(_goPersonal,W/2,H/2-20);
    ctx.shadowBlur=0;
  }
  ctx.shadowBlur=0;
  // Score joueur
  ctx.strokeStyle='rgba(200,200,255,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-180,H/2-36); ctx.lineTo(W/2+180,H/2-36); ctx.stroke();
  const scoreStr=String(_score).padStart(6,'0');
  const hiStr=String(_highScore).padStart(6,'0');
  const isNew=_score>0&&_score>=_highScore;
  ctx.font='bold 13px monospace'; ctx.fillStyle='rgba(255,220,80,0.55)';
  ctx.fillText('VOTRE SCORE',W/2,H/2-10);
  ctx.font='bold 36px monospace'; ctx.fillStyle='#ffe060';
  ctx.shadowColor='#ffaa00'; ctx.shadowBlur=12;
  ctx.fillText(scoreStr,W/2,H/2+26);
  ctx.shadowBlur=0;
  if(isNew){
    ctx.font='bold 11px monospace'; ctx.fillStyle='#ff9900';
    ctx.shadowColor='#ff6600'; ctx.shadowBlur=8;
    ctx.fillText('✦ NOUVEAU RECORD ✦',W/2,H/2+48);
    ctx.shadowBlur=0;
  } else {
    ctx.font='11px monospace'; ctx.fillStyle='rgba(180,160,255,0.55)';
    ctx.fillText(`HI-SCORE  ${hiStr}`,W/2,H/2+48);
  }
  ctx.font='11px monospace'; ctx.fillStyle='rgba(150,170,210,0.6)';
  ctx.fillText(`KILLS : ${_kills}   CAPTURES : ${_caps}   DGT : ${_dmgDealt}`,W/2,H/2+68);
  // ── Compte à rebours relance ──────────────────────────────────────────
  const _goSec=Math.ceil(Math.max(0,1200-_goCountdown)/60);
  ctx.font='bold 11px monospace';
  ctx.fillStyle=_goSec<=5?'rgba(255,120,80,0.85)':'rgba(150,170,210,0.5)';
  ctx.fillText(`Nouvelle partie dans ${_goSec}s…`,W/2,H/2+84);
  // ── Leaderboard bots (toutes équipes, multi-colonnes) ──
  if(!isMobile){
    // Entrée joueur synthétique
    const _playerEntry=_mpConnected?null:{name:ship.name,team:ship.team,kills:_kills,caps:_caps,dmgDealt:_dmgDealt,isPlayer:true};
    const _playerEntries=_playerEntry?[_playerEntry]:[];
    const allBots=[..._playerEntries,...blues,...reds].filter(a=>a&&(a.isPlayer||((!a.isMercenary&&a.shipType!==3))));
    allBots.sort((a,b)=>b.kills-a.kills||b.dmgDealt-a.dmgDealt);
    if(allBots.length>0){
      // Layout : 2 colonnes côte à côte, chacune avec son propre tableau
      const rowH=14, colW=W*0.46, colGap=W*0.04;
      const lbTop=H/2+82;
      const lbAvailH=H-lbTop-34;
      const maxRows=Math.floor(lbAvailH/rowH);
      const half=Math.ceil(allBots.length/2);
      const cols=[[allBots.slice(0,half),W*0.03],[allBots.slice(half),W*0.03+colW+colGap]];
      // En-tête séparateur
      ctx.strokeStyle='rgba(200,200,255,0.18)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W*0.03,lbTop-6); ctx.lineTo(W*0.97,lbTop-6); ctx.stroke();
      ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,160,210,0.55)'; ctx.textAlign='left';
      ctx.fillText('CLASSEMENT DES PILOTES',W*0.03,lbTop-10);
      for(const [bots,colX] of cols){
        // En-têtes colonnes
        const hdrY=lbTop+4;
        ctx.font='bold 8px monospace'; ctx.fillStyle='rgba(160,160,210,0.5)';
        ctx.textAlign='left';  ctx.fillText('#  NOM',colX,hdrY);
        ctx.textAlign='center';
        ctx.fillText('K',colX+colW*0.52,hdrY);
        ctx.fillText('CAP',colX+colW*0.64,hdrY);
        ctx.fillText('DGT',colX+colW*0.78,hdrY);
        ctx.textAlign='right'; ctx.fillText('EQ',colX+colW,hdrY);
        ctx.textAlign='left';
        // Ligne séparatrice en-tête
        ctx.strokeStyle='rgba(180,180,255,0.1)'; ctx.lineWidth=0.5;
        ctx.beginPath(); ctx.moveTo(colX,hdrY+3); ctx.lineTo(colX+colW,hdrY+3); ctx.stroke();
        for(let i=0;i<Math.min(bots.length,maxRows);i++){
          const bot=bots[i];
          // Index global pour podium
          const gi=allBots.indexOf(bot);
          const y=lbTop+14+i*rowH;
          const tCol=bot.team==='blue'?'rgba(70,160,255,0.9)':'rgba(255,95,65,0.9)';
          const isPodium=gi<3;
          const podCol=gi===0?'#ffd700':gi===1?'#c0c0c0':'#cd7f32'; // or/argent/bronze
          // Fond léger pour le podium
          if(bot.isPlayer){
            ctx.fillStyle='rgba(80,80,20,0.35)';
            ctx.fillRect(colX-2,y-rowH+3,colW+4,rowH);
          } else if(isPodium){
            ctx.fillStyle=`rgba(${bot.team==='blue'?'30,80,180':'160,40,20'},0.18)`;
            ctx.fillRect(colX-2,y-rowH+3,colW+4,rowH);
          }
          // Rang
          ctx.font=isPodium?'bold 8px monospace':'8px monospace';
          ctx.fillStyle=isPodium?podCol:'rgba(120,120,160,0.6)';
          ctx.textAlign='left';
          ctx.fillText(`${gi+1}.`,colX,y);
          // Nom
          ctx.fillStyle=isPodium?tCol:(bot.team==='blue'?'rgba(100,160,255,0.75)':'rgba(255,120,90,0.75)');
          ctx.fillText(bot.name,colX+18,y);
          // Stats
          ctx.textAlign='center';
          // Kills
          ctx.fillStyle=isPodium?'rgba(255,220,60,0.95)':'rgba(200,190,120,0.65)';
          ctx.fillText(bot.kills,colX+colW*0.52,y);
          // Caps
          ctx.fillStyle='rgba(80,220,140,0.7)';
          ctx.fillText(bot.caps,colX+colW*0.64,y);
          // Dégâts
          ctx.fillStyle='rgba(180,130,255,0.65)';
          ctx.fillText(bot.dmgDealt,colX+colW*0.78,y);
          // Équipe
          ctx.textAlign='right'; ctx.fillStyle=tCol;
          ctx.fillText(bot.team==='blue'?'B':'R',colX+colW,y);
          ctx.textAlign='left';
        }
      }
    }
  }
  const blink=Math.floor(Date.now()/600)%2===0;
  const replayY=isMobile?H/2+96:H-28;
  if(blink){ctx.fillStyle='rgba(200,190,160,0.75)';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(isMobile?'— APPUYEZ POUR REJOUER —':'— APPUYEZ SUR F5 POUR REJOUER —',W/2,replayY);}
  ctx.textAlign='left';
}

function drawMinimap(){
  const W=canvas.width, H=canvas.height;
  const MS=isMobile?90:155;
  const MX=W-MS-6, MY=isMobile?76:H-MS-10;
  const scale=MS/(MAP_RADIUS*2);
  const mcx=MX+MS/2, mcy=MY+MS/2;
  // Fond circulaire
  ctx.beginPath(); ctx.arc(mcx,mcy,MS/2,0,Math.PI*2);
  ctx.fillStyle='rgba(4,8,28,0.85)'; ctx.fill();
  ctx.strokeStyle='rgba(60,80,160,0.4)'; ctx.lineWidth=1; ctx.stroke();
  // Clip circulaire
  ctx.save();
